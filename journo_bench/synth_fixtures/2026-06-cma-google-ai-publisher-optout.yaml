findings: "<source>\n**URL:** https://www.publishers.org.uk/cma-conduct-requirements-for-google-search-publishers-association-statement/  \n**Source:** [full]\n\n---\ntitle: CMA conduct requirements for Google search: Publishers Association statement\nurl: https://www.publishers.org.uk/cma-conduct-requirements-for-google-search-publishers-association-statement/\ndescription: Today (3 June) the Competition and Markets Authority (CMA) announced a new conduct requirement for Google search, which aims to provide publishers with control, transparency and attribution in respect to how their content is used in services such as AI Overviews. This is welcome news for UK publishers and follows constructive engagement by the Publishers Association and other publishing trade bodies with the…\nsitename: The Publishers Association\ndate: 2026-06-03\n---\n# CMA conduct requirements for Google search: Publishers Association statement\n\nToday (3 June) the Competition and Markets Authority (CMA) [announced](https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk) a new conduct requirement for Google search, which aims to provide publishers with control, transparency and attribution in respect to how their content is used in services such as AI Overviews.\n\nThis is welcome news for UK publishers and follows constructive engagement by the Publishers Association and other publishing trade bodies with the CMA.\n\nDan Conway, CEO of the Publishers Association, said: “Investments that professional publishers make to mitigate against mis and disinformation and to ensure high-quality, accurate and trusted content reaches the public have been thwarted for too long.\n\n“Today’s announcement by the CMA that Google can no longer use publishers’ content to train their AI models without consent, and that they can no longer manipulate the search rankings if publishers opt out, is a significant step in the right direction. Although news media publishers have been disproportionately affected by this – with the work of trained journalists suppressed in Google searches – the ramifications of this also impact others, most notably academic publishers.\n\n“We are pleased that the CMA has listened to representations from the sector and recognised the value of high-quality and trusted content, giving back control to publishers over the use of their content. Now the hard work starts of monitoring and enforcing these new conduct requirements for Google.”\n\nAccording to the CMA, the conduct requirements mean that Google must:\n\n- Provide publishers with effective controls over the use of their search content for training (including fine-tuning) and grounding in its generative AI both within and outside search.\n\n- Publish clear, comprehensible and user-friendly information explaining how publishers’ search content is used by Google in its generative AI.\n\n- Provide publishers with clear and detailed metrics (including impressions, clicks, click-through rate, and an ability to calculate click quality) on user engagement with their search content in search generative AI features.\n\n- Take reasonable steps to ensure that search content is attributed clearly and accurately in general search, and that end users have a clear means to access that search content.\n\n- Publish clear, comprehensible and user-friendly information explaining its approach to attribution\n</source>\n\n---\n\n<source>\n**URL:** https://techhq.com/news/google-ai-search-regulation-cma-conduct-requirement/  \n**Source:** [full]\n\n---\ntitle: Google AI Search Rules: The CMA's First Order Won't Be the Last\nauthor: Dashveenjit Kaur\nurl: https://techhq.com/news/google-ai-search-regulation-cma-conduct-requirement/\nhostname: techhq.com\ndescription: The UK CMA has issued a world-first binding order on Google AI search regulation, forcing opt-out controls for publishers over AI Overviews. And the regulator says more is coming.\nsitename: TechHQ\n\
  date: 2026-06-03\ncategories: ['IT and Technology', 'Privacy and Ethics']\n---\n**The UK CMA issues its first binding conduct requirement on Google’s AI search features.****Publishers can opt out of feeding Google AI Overviews.****Deeper question of fair pay remains unanswered.**\n\nThe UK’s Competition and Markets Authority has [issued](https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk) its first binding Google AI search rules – and the regulator is already signalling it is not done. On 3 June 2026, under the Digital Markets, Competition and Consumers Act 2024, the CMA ordered Google to give publishers real control over whether their content powers AI-generated search summaries. It did not frame this as a resolution. It called it a beginning.\n\nThe conduct requirement is specific. Under the new Google AI search regulation, publishers must be given controls to withhold their content from AI Overviews, AI Mode, and broader generative AI services, including Gemini and Vertex AI, at both the directory and page levels.\n\nGoogle must also publish clear explanations of how crawled content is used, provide engagement metrics to publishers whose content appears in AI features, and ensure attribution includes links users can actually follow. The anti-retaliation clause is arguably the most important provision.\n\nGoogle cannot penalise publishers who use these controls, for instance, by down-ranking their content in regular search results. Given the structural use Google holds over any publisher that depends on organic search traffic, that protection matters.\n\nGoogle has nine months to implement the full set of changes, though the CMA expects meaningful controls to be available to publishers well before the deadline.\n\n### The problem these rules do not fix\n\nThe CMA is not wrong that publishers have been losing ground. Zero-click searches, where users find their answer on Google’s results page without ever clicking through, rose by close to 30% in categories like health and local news following the full UK rollout of AI Overviews in late 2025. Publishers supply the underlying information. Google captures the user. The content arrangement, as it stands, is not balanced.\n\nWhat the order does not do is force Google to pay for that content. The CMA has said it will wait at least 12 months before deciding whether to require Google to negotiate fair licensing terms with publishers, a delay that drew immediate criticism from publisher trade bodies. The Professional Publishers Association, while supportive, made clear that opt-out controls alone do not recover lost traffic or revenue. Opting out of AI Overviews preserves a publisher’s content; it does not restore the commercial value already eroded by zero-click behaviour.\n\nThere is also an unresolved tension built into the opt-out logic. Publishers who withdraw their content from AI features protect their IP but risk reduced visibility as Google’s product becomes more AI-driven. Those who stay opted in continue feeding an AI system that, by the CMA’s own account, is reducing referral traffic without compensation. Neither path is straightforward.\n\n### The first requirement, not the last\n\nWhat makes today’s announcement matter beyond its immediate provisions is what it signals. The CMA designated Google with market status in October 2025, recognising that Google controls over 90% of UK general search queries and holds structural power that traditional competition law cannot adequately address. The conduct requirement framework that flows from that designation lets the CMA impose binding, targeted rules without needing to prove Google acted illegally.\n\nThe publisher conduct requirement is, by the CMA’s own description in the formal legal notice, the first such requirement imposed on Google. CMA chief executive Sarah Cardell was direct: “We will be announcing further action in relation to Google’s search business in\
  \ the coming weeks.”\n\nGoogle’s public response has been measured. Mrinalini Loew, general manager at Google Search Ecosystem, said the company would begin testing new controls for a subset of UK website owners before a global rollout, describing it as part of ongoing dialogue with regulators.\n\nWhat Google has not done is contest the CMA’s core premise, that the current relationship between its AI search features and the publishers powering them needs to change.\n\nThat is a meaningful concession, whatever its intent. The framework now exists, the regulator has used it once, and it has said clearly that it will use it again.\n\n**Want to experience the full spectrum of enterprise technology innovation?** Join TechEx in Amsterdam, California, and London. Covering AI, Big Data, Cyber Security, IoT, Digital Transformation, Intelligent Automation, Edge Computing, and Data Centres, TechEx brings together global leaders to share real-world use cases and in-depth insights. Click here for more information.\n\nTechHQ is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars [here](https://techforge.pub/events/).\n\n## Author\n\nDashveenjit is an experienced tech and business journalist with a determination to find and produce stories for online and print daily. She is also an experienced parliament reporter with occasional pursuits in the lifestyle and art industries.\n\nView all posts\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk  \n**Source:** [full]\n\n---\ntitle: CMA secures fairer deal for publishers and improves Google search services in UK\nurl: https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk\ndescription: Conduct requirement introduced today gives publishers more control and stronger bargaining power over the use of their content.\nsitename: GOV.UK\ndate: 2026-06-03\nlicense: Open Government Licence v3.0\n---\n# CMA secures fairer deal for publishers and improves Google search services in UK\n\nConduct requirement introduced today gives publishers more control and stronger bargaining power over the use of their content.\n\n- New conduct requirement imposed under the digital markets competition regime\n- In a world first, publishers will be able to opt out of their content being used to power AI features in Google search\n- CMA monitoring AI developments in Google search and may take further action if needed\n\nThe Competition and Markets Authority (CMA) has today imposed a new conduct requirement for Google search, meaning it must take specific action under the UK’s digital markets competition regime. The requirement will secure a fairer deal for publishers and consumers and improve Google’s search services in the UK.\n\nThe conduct requirement is imposed following the CMA’s decision to designate Google with strategic market status (SMS) in general search services. The designation allows the CMA to introduce targeted rules, known as ‘conduct requirements’, for Google’s search activities if proportionate for the purposes of ensuring fair dealing, open choices or trust and transparency.\n\nIn a world first, publishers will now have effective tools to prevent their content being used to power AI features in search, such as AI Overviews. This will put publishers, like news organisations, in a stronger position to negotiate content deals with Google.\n\nTo boost consumer trust, Google is also now required to make sure that publisher content is properly attributed, using clear links, in AI‑generated search results.\n\nFollowing consultation feedback, Google will now also have to allow publishers to opt-out of allowing their content to be used for the ‘fine-tuning’ of AI models. This provides publishers with confidence that they will have control over the full range of AI use-cases of their content.\n\nIn May, Google announced\
  \ significant changes to its search platform to further embed AI technologies, which could fundamentally change how search results are presented to users in the UK. This conduct requirement will apply to those changes. However, the CMA is actively monitoring how Google is implementing these changes - including assessing the implications for businesses. If needed, the CMA will bring forward work on further measures to ensure a fair exchange of value between Google and publishers.\n\nSarah Cardell, Chief Executive of the CMA, said:\n\nToday, we have introduced a world‑first requirement on Google’s search services in the UK, enabling fair treatment, greater transparency and meaningful choice for businesses and consumers.\n\nWith features like AI Overviews rapidly reshaping online search, it is crucial that content publishers, including news organisations, have appropriate bargaining power over how their content is used. At the same time, these measures will help tens of millions of UK search users better understand and trust the information presented to them.\n\nIt’s also important that any action we take in this space can move with the times. Google has recently announced changes to its search business and the requirements we’ve introduced today are designed to respond to what Google is doing now and in the future. We’ll also continue to use the unique flexibility of the UK regime to monitor and address future concerns as they arise and we will be announcing further action in relation to Google’s search business in the coming weeks.\n\n\nThe CMA will take an active role overseeing how Google applies the new requirement to its search services. It will have nine months to implement all changes but the CMA expects important parts of the controls to become available to publishers well before that deadline. Google will also be required to submit and publish compliance reports, supported by key data and metrics, explaining changes it has made and how it has complied. These are due every six months for the first year, after which the CMA will review the frequency of reporting. The CMA welcomes feedback from interested parties about these changes they are rolled out.\n\nSince the digital markets competition regime came into force last year, the CMA has launched four strategic market status investigations into major technology companies Google, Apple and Microsoft. Conduct requirements are an important part of the regime, allowing the CMA to take proportionate and evidence-based steps that ensure designated businesses act in a way which improve digital markets and protect competition. The requirement imposed today is part of a series of updates over the coming weeks and months on the CMA’s digital markets work.\n\nMore information can be found on the CMA’s Google search page.\n\n## Notes to editors\n\n- To designate a firm with SMS, the CMA must decide that it has substantial and entrenched market power and a position of strategic significance in a digital activity. Google having SMS does not imply that it has acted anti-competitively.\n- Once the CMA has designated a firm as having SMS, it is then able (subject to a legal framework that includes further public consultation and showing that measures are proportionate) to introduce interventions (such as those as set out in today’s decision) to unlock competition, increase innovation, and protect consumers.\n\nFor media enquiries, contact the CMA press office.\n\n- Telephone numbers\n-\n- Phone: 020 3738 6460\n- Out of hours: 020 3738 6878\n\n### Opening hours\n\nMonday to Friday, 9am to 5:30pm. On\n\nbank holidays, use our out of hours number.\n</source>\n\n---\n\n<source>\n**URL:** https://aiweekly.co/alerts/cma-orders-google-ai-search-opt-out-for-publishers  \n**Source:** [full]\n\n---\ntitle: CMA Orders Google AI Search Opt-Out for Publishers\nurl: https://aiweekly.co/alerts/cma-orders-google-ai-search-opt-out-for-publishers\nsitename: AI Weekly\ndate: 2026-06-03\n---\n# CMA Orders Google\
  \ AI Search Opt-Out for Publishers\n\n## Key insights\n\n- The CMA designated Google as holding strategic market status in October 2025, controlling over 90% of UK searches, which enabled binding conduct requirements without proving illegal behavior.\n- Opt-out controls are split across two dimensions: content grounding in AI features and AI model fine-tuning, each operable independently at domain and page level.\n- Google must publish disaggregated engagement metrics including impressions, click-throughs, and CTR through Search Console, giving publishers a data baseline for future compensation negotiations.\n\n## Why this matters\n\n## Summary\n\n## Potential risks and opportunities\n\n### Risks\n\n- If Google designs opt-out mechanisms narrowly or makes them technically burdensome, publishers may find the tools ineffective while traffic losses from AI Overviews continue to accumulate\n- The nine-month compliance window gives Google considerable runway to shape how opt-out tools work before the CMA audits implementation, potentially limiting practical scope for publishers without legal resources to challenge weak tooling\n- AI search competitors without a strategic market status designation face no equivalent obligations, creating an uneven content rights landscape for publishers trying to enforce opt-out preferences across multiple platforms\n\n### Opportunities\n\n- News publishers with strong brand content gain a CMA-validated opt-out lever to enter paid content negotiations with Google from a position of regulatory backing rather than goodwill\n- Content licensing and consent management platforms could see new enterprise demand as publishers need tooling to track and enforce opt-out elections across AI Overviews and model fine-tuning use cases\n- Regulators in the EU, Australia, and Canada that have been watching publisher-platform disputes can now point to the CMA's framework as an operational model for their own AI content rules\n\n## What we don't know yet\n\n- Whether Google will contest any of the CMA's conduct requirements or begin voluntary implementation before the nine-month deadline expires\n- What enforcement mechanisms the CMA holds if Google misses compliance milestones, particularly around the design and accessibility of opt-out tools for smaller publishers\n- Which specific additional CMA actions on Google's broader search business are expected in the coming weeks per the regulator's own statement\n\n## What others are reporting\n\n-\nUK Competition and Markets Authority\n[Read →](https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk)Official first-party source; establishes the six-month compliance reporting cadence, attribution requirements for AI-generated results, and the full phased implementation schedule.\n\n-\nThe Verge\n[Read →](https://www.theverge.com/tech/942302/google-search-ai-overviews-uk-cma-publisher-opt-out)Tier-1 consumer tech framing; covers the ruling's practical scope across AI Overviews, AI Mode, and Gemini for a broad technical readership.\n\nRejoice, website owners.\n\n-\nTechHQ\n[Read →](https://techhq.com/news/google-ai-search-regulation-cma-conduct-requirement/)Foregrounds the forward enforcement trajectory and the publisher opt-out dilemma: withdraw content to protect IP, or stay opted-in and feed a system eroding traffic without compensation.\n\nWe will be announcing further action in relation to Google's search business in the coming weeks.\n\n-\nVideoWeek\n[Read →](https://videoweek.com/2026/06/03/uk-publishers-gain-opt-out-from-googles-ai-features-following-cma-intervention/)Publishing industry angle; includes Movement for an Open Web skepticism about whether nine months is adequate for Google to build effective granular controls.\n\nIt is crucial that content publishers, including news organisations, have appropriate bargaining power over how their content is used.\n\n-\nSimply Wall St (via Yahoo Finance)\n[Read →](https://finance.yahoo.com/sectors/technology/articles/uk-ruling-ai-search-puts-051320739.html)Investor-lens\
  \ framing: analyzes how UK-specific opt-out requirements complicate Alphabet's ability to scale AI Search uniformly across global markets and strengthen publisher leverage in licensing talks.\n\nGoogle must provide clear attribution and links to publisher content within its AI search results.\n\n-\nBusiness Matters\n[Read →](https://bmmagazine.co.uk/news/google-cma-ai-search-publishers-opt-out/)SME publisher focus: frames the ruling as leveling the playing field for independent and niche UK websites that lack the negotiating leverage of large media groups.\n\nWith features like AI Overviews rapidly reshaping online search, it is crucial that content publishers have appropriate bargaining power.\n\n-\nDigital Watch Observatory\n[Read →](https://dig.watch/updates/uk-cma-targets-ai-search-content-use-in-new-google-conduct-requirements)International digital governance framing; positions the ruling within the global regulatory landscape on AI content use and points directly to the official CMA source document.\n\nPublishers will be able to prevent their content from being used in Google's AI-powered search features, including AI Overviews.\n\n\nOriginally reported by\n**perspectivemedia.com**\n\n[Read the original article →](https://www.perspectivemedia.com/google-must-allow-publishers-to-opt-out-of-ai-search-results-under-new-cma-rules/)\n\nOriginal headline: UK CMA Rules Google Must Let Publishers Opt Out of AI Search Summaries and AI Model Training — 'World First' Regulatory Action, Nine-Month Deadline\n</source>\n\n---\n\n<source>\n**URL:** https://news.sky.com/story/google-search-given-nine-months-to-implement-uk-conduct-requirement-13550313  \n**Source:** [snippet/paywall]\n\nNew rules from the Competition and Markets Authority include measures allowing publishers to opt out of training Google's AI models. Wednesday 3 June 2026 ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.reuters.com/legal/litigation/uk-regulator-enforces-new-competition-requirements-google-search-2026-06-03/  \n**Source:** [snippet/paywall]\n\nThe CMA said Google would be required to make sure content from publishers, ​including news organisations, was properly attributed in AI‑ ...\n</source>\n\n---\n\n<source>\n**URL:** https://techforge.pub/events/  \n**Source:** [full]\n\n---\ntitle: Events | Explore Upcoming Tech Events | Tech Marketing Agency\nurl: https://techforge.pub/events/\nhostname: techforge.pub\ndescription: Explore our latest technology events and webinars covering the latest on AI, Digital Transformation, Blockchain, Data Centers & more\nsitename: TechForge Publishing\ndate: 2026-06-02\n---\nTechForge> Events\n\n# Upcoming Events\n\n## On-demand content\n\nExplore our library of on-demand webinars and live event recordings through our TechHub\n\nGet in touch today to find out how we can help your organsiation. Request a media pack or just ask a general question about any of our services by completing the form below.\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/cma-cases/googles-general-search-and-search-advertising-services  \n**Source:** [full]\n\n---\ntitle: Google's general search and search advertising services\nurl: https://www.gov.uk/cma-cases/googles-general-search-and-search-advertising-services\ndescription: The Competition and Markets Authority (CMA) has designated Google as having strategic market status (SMS) in respect of its provision of general search and search advertising services.\nsitename: GOV.UK\ndate: 2025-01-14\nlicense: Open Government Licence v3.0\n---\n# Google's general search and search advertising services\n\nThe Competition and Markets Authority (CMA) has designated Google as having strategic market status (SMS) in respect of its provision of general search and search advertising services.\n\n## Conduct requirements\n\n### Publisher conduct requirement imposed\n\n3 June 2026: The CMA has imposed its publisher conduct requirement on Google.\n\n-\nPublisher conduct requirement(3.6.26) - Press\
  \ release:\nCMA secures fairer deal for publishers and improves Google search services in UK(3.6.26)\n\n### Consultation on conduct requirements\n\n28 January 2026: The CMA launched a consultation on conduct requirements (CRs) relating to Google’s general search and search advertising services.\n\n### Conduct requirement roundtables\n\nIn February 2026, the CMA hosted online roundtables for affected stakeholders, including interested businesses, trade associations and civil society bodies, on each of the conduct requirements.\n\n### Roadmap of possible measures to improve competition in search\n\n24 June 2025: The CMA has today published its roadmap for possible interventions in respect of Google’s general search services. The roadmap sets out how we intend to prioritise our work on potential conduct requirements and pro-competition interventions, should Google be designated as having strategic market status.\n\nThe CMA has launched an ‘initial SMS investigation’ under Part 1 of the Digital Markets, Competition and Consumers (DMCC) Act 2024.\n\nThe intervention roadmap will provide clarity on which issues are likely to be prioritised for earlier action, which the CMA proposes to deprioritise, and which remain subject to further consideration. For the SMS Search investigation, we intend to publish this roadmap document alongside the consultation on the proposed decision on SMS designation in June 2025. The indicative timetable below has been updated to reflect this step. It should be noted that the DMCC Act allows the CMA to consult on proposed conduct requirements (CRs) at the same time as consulting on any proposed decision on whether to designate a firm with SMS. However, CRs may be imposed at any point after a firm is designated.\n\nThe Digital Markets Board Committee (DMBC) oversees and takes certain delegated decisions under the DMCC Act 2024.\n\nSarah Cardell, Chief Executive, CMARobin Foster, Panel Member, CMAWill Hayter, Executive Director for Digital Markets, CMADame Patricia Hodgson, Non-Executive Director, CMACyrus Mehta, Non-Executive Director, CMA\n\n-\nPublisher conduct requirement published.\n</source>\n\n---\n\n<source>\n**URL:** https://www.kennedyslaw.com/en/thought-leadership/article/2026/the-uk-digital-markets-competition-regime-in-action-the-cma-s-first-conduct-requirements-for-google-and-commitments-for-apple-and-google-mobile-platforms/  \n**Source:** [full]\n\n---\ntitle: The UK digital markets competition regime in action: the CMA’s first conduct requirements for Google and commitments for Apple and Google mobile platforms\nurl: https://www.kennedyslaw.com/en/thought-leadership/article/2026/the-uk-digital-markets-competition-regime-in-action-the-cma-s-first-conduct-requirements-for-google-and-commitments-for-apple-and-google-mobile-platforms/\ndescription: The Digital Markets, Competition and Consumers Act 2024 (DMCCA) established the UK’s digital markets competition regime with the aim of creating a more level playing field for businesses and consumers in the UK that rely on digital markets dominated by large technology firms with substantial and entrenched market power.\nsitename: Kennedys Law LLP\ndate: 2026-03-25\n---\n[The Digital Markets, Competition and Consumers Act 2024](https://www.legislation.gov.uk/ukpga/2024/13/contents) (DMCCA) established [the UK’s digital markets competition regime](https://www.gov.uk/guidance/how-the-uks-digital-markets-competition-regime-works) with the aim of creating a more level playing field for businesses and consumers in the UK that rely on digital markets dominated by large technology firms with substantial and entrenched market power.\n\nTo achieve this, the [Competition and Markets Authority](https://www.gov.uk/government/organisations/competition-and-markets-authority) (CMA) has wide-ranging powers to regulate the conduct of large tech companies and to take targeted and proportionate action to improve competition in digital markets in the UK. This includes the\
  \ power to decide whether a firm should be designated as having strategic market status (SMS) and therefore be subject to the rules of the SMS regime.\n\nOnly the very largest digital tech firms that meet the statutory turnover condition fall within scope for possible SMS designation (that is, turnover of greater than £1 billion in the UK or £25 billion globally), and a firm may be designated as having SMS only where the CMA also finds substantial and entrenched market power and a position of strategic significance in relation to the relevant digital activity. [Google was designated as having SMS](https://www.gov.uk/government/news/cma-confirms-google-has-strategic-market-status-in-search-services?utm_source=chatgpt.com) in October 2025 in relation to general search and search advertising services, while [Google and Apple](https://www.gov.uk/government/news/cma-confirms-apple-and-google-have-strategic-market-status-in-mobile-platforms) were both designated as having SMS later that month in relation to their respective mobile platforms. In each case, the CMA found “[substantial, entrenched market power](https://competitionandmarkets.blog.gov.uk/2025/06/24/cma-takes-first-steps-to-improve-competition-in-search-services-in-the-uk/)” and a “[position of strategic significance](https://competitionandmarkets.blog.gov.uk/2025/06/24/cma-takes-first-steps-to-improve-competition-in-search-services-in-the-uk/)”.\n\nSMS itself does not imply wrongdoing or compel the CMA to immediately impose conduct requirements. However, once a firm has been designated with SMS, the CMA can impose conduct requirements (CRs). These are tailored rules which set out how an SMS firm must conduct itself in relation to a digital activity where the CMA considers that doing so is proportionate and for the purposes of “[fair dealing, open choices, or trust and transparency](https://www.gov.uk/guidance/how-the-uks-digital-markets-competition-regime-works)\".\n\n### The CMA’s first proposed conduct requirements for Google\n\nThe CMA proposed its first [CRs](https://www.gov.uk/government/news/cma-proposes-package-of-measures-to-improve-google-search-services-in-uk) in January 2026 to improve how Google delivers search services, which handle 90% of general search queries in the UK and are a key gateway for businesses and consumers to access and navigate the internet.\n\nThe CMA is currently consulting on proposed CRs for Google in four key areas:\n\n- User choice: requiring Google to display a choice screen on the Chrome browser and making existing default choice screens on Android mobiles a legal requirement, to allow users to make an informed choice about the search services they use and making it simple and quick for users to change their default search service at any time to better meet their needs and reduce barriers to switching to rival search services. The aim is to make switching easier and reduce barriers to entry for rival search providers.\n- Publisher choice, transparency and attribution: giving publishers more choice and transparency over how their content is used in Google’s AI Overviews, allowing them to opt out of their content being used to power AI features such as AI Overviews or to train AI models outside Google Search, requiring Google to take practical steps to ensure publisher content is properly attributed in AI results, and clearly explaining how these arrangements operate. These measures are intended to give publishers a fairer deal over the use of their content and to help search service users verify sources in AI-generated results and build greater trust.\n- Fair ranking: requiring Google to ensure that its approach to ranking search results is fair and transparent, including in AI Overviews and AI Mode, and to maintain an effective process for raising and investigating complaints about potential distortions caused by its ranking policies and procedures. Google must also provide appropriate information about ranking policies and material\
  \ updates, subject to limits where disclosure would undermine legitimate aims or reveal commercially sensitive information.\n- Data portability: placing Google’s existing data portability tool on a legal footing to ensure that users can continue to transfer search data between services or use third-party tools alongside Google’s products.\n\n### The CMA’s proposed commitments for Apple and Google mobile platforms\n\nFurther measures were proposed in February 2026 through the [CMA’s publication of proposed commitments](https://www.gov.uk/government/news/cma-secures-commitments-from-apple-and-google-to-improve-fairness-in-app-store-processes-and-enhance-ios-interoperability) from Apple and Google to address the CMA’s concerns around improving the fairness of their app store processes and enhancing iOS interoperability, which would enable third-party apps to better access the features and functionality within Apple’s operating system. Those commitments had not yet been implemented at the date of the CMA’s announcement. The [CMA was seeking views](https://assets.publishing.service.gov.uk/media/698aee6fcfe7ccf77efbc87f/Call_for_evidence_10_February.pdf?utm_source=chatgpt.com) on them, with a proposed start date of 1 April 2026, subject to stakeholder feedback.\n\nWith the largest app economy in Europe, many UK businesses rely on Apple’s App Store and Google’s Play app to review and distribute their apps. However, these two companies’ mobile platforms occupy a duopolistic position in the UK mobile ecosystem (with around 90 - 100% of UK mobile devices running on Apple or Google’s mobile. The CMA has also defined those mobile platforms more broadly than app distribution alone, extending the designations to mobile operating systems, browsers and browser engines on smartphones and tablets. For app developers, Apple’s App Store is the only route to reach Apple users, while Google Play Store is by far the main distribution channel for reaching Android users. In practice, that makes these platforms critical routes to market for UK app developers and helps explain why the CMA has focused on fair treatment, transparency and interoperability. The CMA’s latest measures seek to redress this imbalance. The commitments secured from Apple and Google include:\n\n- App review & ranking: ensuring that they review and rank apps on their app stores fairly, objectively and transparently and that they don’t give priority to their own apps over others that may compete with theirs.\n- Data collection: ensuring that they safeguard the data collected from developers during app review and don’t unfairly use that data.\n- Interoperability: allowing developers to request interoperability access to features and functionality within Apple’s iOS and iPadOS mobile operating systems and consider these requests fairly and objectively, enabling developers to better develop innovative and competing products for customers.\n\nThese commitments represent the first wave of changes since Apple and Google’s mobile platform SMS designations were made and further measures are expected in the near future. The commitments will take effect from 1 April 2026, subject to stakeholder views.\n\nBoth Apple and Google will be subject to continued monitoring and reporting by the CMA to ensure that they comply with these commitments; a failure to do so could result in the imposition of more formal CRs. It is worth noting that from a legal standpoint, those commitments made in February 2026 are not the same as formal conduct requirements under the DMCCA and sit outside the Act’s express statutory commitment mechanisms at this stage of the process.\n\n### What does this mean for businesses?\n\nThese developments will be particularly relevant to app developers, software providers, online publishers and consumer-facing digital businesses that depend materially on Google search, Apple’s App Store or Google Play Store for visibility, distribution or growth. They also show that the CMA is beginning\
  \ to use its new digital markets powers to intervene in issues such as ranking, transparency, app review, distribution and interoperability.\n\nBusinesses affected by those issues should consider now whether to engage with the CMA, particularly where they face constraints around search visibility, app store treatment or access to platform functionality.\n</source>\n\n---\n\n<source>\n**URL:** https://www.cripps.co.uk/thinking/google-and-the-cma-a-test-case-for-dmcca-conduct-requirements/  \n**Source:** [full]\n\n---\ntitle: Google and the CMA: A test case for DMCCA conduct requirements\nurl: https://www.cripps.co.uk/thinking/google-and-the-cma-a-test-case-for-dmcca-conduct-requirements/\ndescription: Google is the first firm designated with strategic market status under the DMCCA. We explore the CMA’s proposed conduct requirements and their impact on AI search.\nsitename: Cripps\ndate: 2026-02-09\n---\n# Google and the CMA: A test case for DMCCA conduct requirements\n\nAfter becoming the first organisation to be designated by the Competition and Markets Authority (“**CMA**”) as having strategic market status (“**SMS**”), Google has now become the first undertaking to be subject to proposed conduct requirements. If imposed, Google will likely be required to make a number of changes, including to its AI Overviews.\n\nThe below article considers what the new SMS regime involves and the potential impact of the CMA’s proposed requirements.\n\n## The Digital Markets, Competition and Consumers Act 2024\n\nThe Digital Markets, Competition and Consumers Act 2024 (“DMCCA”) came into force on 6 April 2025. This gave the CMA the ability to designate undertakings as having SMS where the undertaking has substantial and entrenched market power and a position of strategic significance in respect of a digital activity. Once designated, the CMA can impose so called “conduct requirements”. This requires the designated undertaking to conduct itself in a specific way in relation to the digital activity.\n\nIn accordance with section 19(5) DMCCA, any conduct requirements imposed by the CMA must be proportionate for the purposes of one or more of the following:\n\n- The fair dealing objective;\n- The open choices objective; and\n- The trust and transparency objective.\n\nAdditionally, the CMA must carry out a public consultation on the conduct requirements it proposes.\n\n## Google conduct requirements\n\nIn the case of Google, the CMA published a roadmap of possible interventions concerning the general search services provided by Google in June 2025. The scope of the interventions has since been narrowed with the consultation primarily focussing on the following four issues:\n\n- the option for content producers to opt out of having their content used in Google’s AI overviews or the training of their AI models. Where such content is used in AI results, Google will have to properly attribute the content;\n- ensuring fairness and transparency in Google search rankings, including AI overviews and AI mode. This is to be coupled with a more robust complaints process in respect of ranking issues;\n- the introduction of choice screens, giving users an easy way to switch their default search provider on Android devices and the Chrome browser; and\n- enabling individuals and businesses to use Google search data by placing current data portability mechanisms on a legal footing.\n\nThe CMA’s designation lasts 5 years and, if the above measures are imposed following the public consultation, Google’s failure to comply with the conduct requirements can result in fines of up to 10% of Google’s global turnover.\n\n**AI spotlight**\n\nWhilst the conduct requirements go beyond AI, the ability of content producers to opt out of Google’s AI overviews is a key issue. By displaying content in the AI overview, Google is reducing the need for users to click on a page to obtain information which has an impact on search rankings and the potential for content producers to earn\
  \ revenue from paid advertisements. In the case of many news publishers, it likely reduces the number of users paying a monthly subscription fee to opt out of accepting cookies.\n\nFor Google, if reputable publishers decide to opt out of AI overviews, there could be a reduction in the quality of the service. This could result in alternative incentives being offer, for example, licensing deals or revenue sharing for overviews featuring specific content. However, adopting such a model would increase both the operational and compliance complexity. The impact of any conduct requirements imposed against Google will also likely have far reaching implications for other search engines offering AI powered summaries.\n\n## The consultation\n\nThe CMA’s consultation closes on 25 February 2026 and it will be interesting to see the approach adopted by respondents. There is the potential for there to be a clear divide between businesses seeking to increase revenues and users looking to find information in the most efficient way possible and avoid paying fees or handing over their data to access content. Irrespective of the result of the consultation, the outcome will likely be treated as a test case by the CMA informing the adoption of future conduct requirements under the DMCCA.\n</source>\n\n---\n\n<source>\n**URL:** https://www.scl.org/cma-imposes-new-conduct-requirement-on-google-search-under-the-dmcc-act/  \n**Source:** [full]\n\n---\ntitle: CMA imposes new conduct requirement on Google Search under the DMCC Act - Society for Computers & Law\nurl: https://www.scl.org/cma-imposes-new-conduct-requirement-on-google-search-under-the-dmcc-act/\ndescription: The Competition and Markets Authority (CMA) has imposed a new conduct requirement on Google Search, requiring it to take specific action under the UK’s Digital Markets, Competition and Consumers (DMCC) Act 2024. The CMA says the measure is intended to secure a fairer deal for publishers and consumers, while improving Google’s search services in the... Read More... from CMA imposes new conduct requirement on Google Search under the DMCC Act\nsitename: Society for Computers & Law\ndate: 2026-06-05\n---\nThe Competition and Markets Authority (CMA) has [imposed](https://www.gov.uk/cma-cases/googles-general-search-and-search-advertising-services) a new [conduct requirement](https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement) on Google Search, requiring it to take specific action under the UK’s Digital Markets, Competition and Consumers (DMCC) Act 2024. The CMA says the measure is intended to secure a fairer deal for publishers and consumers, while improving Google’s search services in the UK.\n\nThe CMA imposed the requirement after designating Google as having strategic market status (SMS) in general search services under the DMCC Act. That designation allows the CMA to introduce targeted rules (conduct requirements) for Google’s search activities where these are proportionate and aimed at ensuring fair dealing, open choices, or trust and transparency.\n\nThe CMA says the measures will give publishers effective tools to prevent their content from being used to power AI features in search, such as AI Overviews, and strengthen their position in negotiations over content deals with Google.\n\nIn addition, Google must ensure that publisher content is properly attributed, with clear links, in AI‑generated search results. The CMA says this is intended to improve consumer trust.\n\nFollowing consultation feedback, Google will also have to allow publishers to opt out of the use of their content for the ‘fine-tuning’ of AI models. The CMA says this will give publishers confidence that they retain control over the full range of AI use cases for their content.\n\nIn May, Google announced significant changes to its search platform to further embed AI technologies, which could fundamentally change how search results are presented to users in the UK. This conduct\
  \ requirement will apply to those changes. The CMA is also actively monitoring how Google is implementing them, including by assessing the implications for businesses. If necessary, it will bring forward further measures to ensure a fair exchange of value between Google and publishers.\n\nThe CMA will take an active role in overseeing how Google applies the new requirement to its search services. Google will have nine months to implement all changes, although the CMA expects important parts of the controls to become available to publishers well before that deadline. Google must also submit and publish compliance reports, supported by key data and metrics, explaining the changes it has made and how it has complied. These reports are due every six months for the first year, after which the CMA will review the reporting frequency. The CMA also welcomes feedback from interested parties as these changes are rolled out.\n\nSince the digital markets competition regime came into force last year, the CMA has [launched four strategic market status investigations](https://www.gov.uk/government/collections/digital-markets-unit) into major technology companies, including Google, Apple and Microsoft. Conduct requirements are an important part of the regime, allowing the CMA to take proportionate and evidence-based steps to ensure designated businesses act in ways that improve digital markets and protect competition. The new conduct requirement is part of a broader series of updates expected over the coming weeks and months on the CMA’s digital markets work.\n</source>\n\n---\n\n<source>\n**URL:** https://uk.practicallaw.thomsonreuters.com/w-049-3180?transitionType=Default&contextData=(sc.Default)  \n**Source:** [snippet/paywall]\n\nOn 28 January 2026, the CMA published a consultation on the proposed conduct requirements that it intends to impose in relation to Google's general search ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement  \n**Source:** [full]\n\n---\ntitle: Google search publisher conduct requirement\nurl: https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement\ndescription: The Competition and Markets Authority (CMA) has imposed a conduct requirement on Google, in relation to its general search services.\nsitename: GOV.UK\ndate: 2026-06-03\nlicense: Open Government Licence v3.0\n---\n# Google search publisher conduct requirement\n\nThe Competition and Markets Authority (CMA) has imposed a conduct requirement on Google, in relation to its general search services.\n\n## Imposition of conduct requirement\n\n3 June 2026: Following the CMA’s decision to designate Google as having strategic market status in respect of general search services and public consultation on proposed conduct requirements, the CMA has imposed the publisher conduct requirement (the publisher CR) on Google.\n\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n\nThe publisher CR requires Google to:\n\n- provide publishers with effective controls over the use of their search content in generative AI\n- publish clear, comprehensible and user-friendly information explaining how publishers’ search content is used by Google in its generative AI\n- provide publishers with clear and detailed metrics on user engagement with their search content in search generative AI features\n- take reasonable steps to ensure that search content is attributed clearly and accurately in general search, and that end users have a clear means to access that search content\n- publish clear, comprehensible and user-friendly information explaining its approach to attribution\n\nOur guide to the UK’s digital markets competition regime explains how conduct requirements work.\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/government/collections/digital-markets-unit  \n**Source:** [full]\n\n---\ntitle: Promoting competition and innovation in digital markets\nurl:\
  \ https://www.gov.uk/government/collections/digital-markets-unit\ndescription: The Competition and Markets Authority's (CMA) work to promote competition in digital markets.\nsitename: GOV.UK\ndate: 2021-04-07\nlicense: Open Government Licence v3.0\n---\n# Promoting competition and innovation in digital markets\n\nThe Competition and Markets Authority's (CMA) work to promote competition in digital markets.\n\nThe CMA oversees the digital markets competition regime for the most powerful digital firms, promoting greater competition and innovation in these markets and protecting consumers and businesses from unfair practices.\n\nOur work in this area applies only to the very largest firms. If certain conditions are met, they can be designated with strategic market status (SMS) in relation to a particular digital activity. Once designated, SMS firms can then become subject to certain rules to guide their behaviour, tackling conduct that could undermine fair competition.\n\nLearn more about how the UK’s digital markets competition regime works.\n\n### Business software and cloud services\n\nThe CMA has launched an SMS investigation into Microsoft’s business software ecosystem after announcing a package of action on business software and cloud services in March 2026.\n\n### Improving competition in mobile platforms\n\nAfter determining that Apple and Google have SMS in the provision of their mobile platforms, the CMA is focused on interventions to improve competition.\n\nAs part of our full programme of work on mobile platforms for 2026, we expect to:\n\n-\nupdate on our work in respect of digital wallets for Apple in the first half of 2026\n\n-\ncontinue to engage with Google, Apple and wider stakeholders in relation to steering. We have published a first step on this work and invite views until 22 April 2026. Responses received will inform our own thinking on potential steering measures that we expect to bring forward in the first half of 2026\n\n-\nprogress work in relation to Apple concerning browsers as well as interoperable access to functionality for connected devices in 2026\n\n-\nengage with and monitor Apple’s and Google’s delivery of commitments voluntarily made to us to provide more certainty for developers on app distribution, as well as to enable developers to request interoperable access to functionality from Apple\n\n-\ncontinue to closely monitor developments in relation to mobile platforms, particularly the emergence and adoption of AI, and will consider the need for further action\n\n\n### Improving competition in search\n\nAfter determining Google has SMS in general search services, we consulted on a set of conduct requirements to improve the way search works for businesses and consumers.\n\nWe imposed our first conduct requirement on Google in June 2026. We also continue to assess the other measures on which we consulted on in January.\n\n### How we work in digital markets\n\nGuidance on how the CMA investigates under the digital markets competition regime, and what we can do after an investigation.\n\n### Our other work in digital markets\n\nThe CMA’s work on digital markets before the start of the digital markets competition regime.\n\n### Memorandums of understanding\n\nThe memorandums of understanding between the CMA and other organisations set out how we will work together to avoid duplication of effort and share best practice.\n\n## Updates to this page\n\nshow all updates\n\n-\nGoogle search publisher conduct requirement added.\n\n-\nInformation about business software updated.\n\n-\nInformation on business software and cloud services added.\n\n-\nInformation added about the CMA's work to improve competition in mobile platforms and search services.\n\n-\nUpdated with information about the digital markets competition regime.\n\n-\nUpdated with information about the Digital Markets, Competition and Consumers Act 2024.\n\n-\nGovernment has now published its consultation on proposals for the new pro-competition\
  \ regime.\n\n-\nFirst published.\n</source>\n\n---\n\n<source>\n**URL:** https://www.instagram.com/p/DZHqPT-ArgD/  \n**Source:** [full]\n\n**Instagram post by @adaia_ai** — https://www.instagram.com/p/DZHqPT-ArgD/\nDate: 2026-06-03\nCaption: UK CMA imposes publisher conduct requirement on Google covering generative AI search content use (June 3, 2026)\n\nOn June 3, 2026, the UK government published details of a Competition and Markets Authority (CMA) measure imposing a “publisher conduct requirement” on Google following its designation with Strategic Market Status (SMS) in general search.\n\nAccording to GOV.UK, Google must:\n• Provide publishers with effective controls over how their search content is used in generative AI.\n• Publish clear explanations of how publishers’ search content is used in its generative AI.\n• Provide publishers with clear metrics on user engagement with their content in search generative AI features.\n• Take reasonable steps to ensure clear and accurate attribution in general search and provide a clear means for users to access the underlying publisher content, as well as publish a clear explanation of its approach to attribution.\n\nSource: GOV.UK – “Google Search Publisher Conduct Requirement” (June 3, 2026)\nhttps://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement\nSource link: [gov.uk](https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement)\n</source>\n\n---\n\n<source>\n**URL:** https://techhq.com/news/google-ai-search-regulation-cma-conduct-requirement/  \n**Source:** [full]\n\n---\ntitle: Google AI Search Rules: The CMA's First Order Won't Be the Last\nurl: https://techhq.com/news/google-ai-search-regulation-cma-conduct-requirement/\ndescription: The UK CMA has issued a world-first binding order on Google AI search regulation, forcing opt-out controls for publishers over AI Overviews. And the regulator says more is coming.\nsitename: TechHQ\ndate: 2026-06-03\n---\n**The UK CMA issues its first binding conduct requirement on Google’s AI search features.****Publishers can opt out of feeding Google AI Overviews.****Deeper question of fair pay remains unanswered.**\n\nThe UK’s Competition and Markets Authority has [issued](https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk) its first binding Google AI search rules – and the regulator is already signalling it is not done. On 3 June 2026, under the Digital Markets, Competition and Consumers Act 2024, the CMA ordered Google to give publishers real control over whether their content powers AI-generated search summaries. It did not frame this as a resolution. It called it a beginning.\n\nThe conduct requirement is specific. Under the new Google AI search regulation, publishers must be given controls to withhold their content from AI Overviews, AI Mode, and broader generative AI services, including Gemini and Vertex AI, at both the directory and page levels.\n\nGoogle must also publish clear explanations of how crawled content is used, provide engagement metrics to publishers whose content appears in AI features, and ensure attribution includes links users can actually follow. The anti-retaliation clause is arguably the most important provision.\n\nGoogle cannot penalise publishers who use these controls, for instance, by down-ranking their content in regular search results. Given the structural use Google holds over any publisher that depends on organic search traffic, that protection matters.\n\nGoogle has nine months to implement the full set of changes, though the CMA expects meaningful controls to be available to publishers well before the deadline.\n\n### The problem these rules do not fix\n\nThe CMA is not wrong that publishers have been losing ground. Zero-click searches, where users find their answer on Google’s results page without ever clicking through, rose by close to 30% in categories like health and local\
  \ news following the full UK rollout of AI Overviews in late 2025. Publishers supply the underlying information. Google captures the user. The content arrangement, as it stands, is not balanced.\n\nWhat the order does not do is force Google to pay for that content. The CMA has said it will wait at least 12 months before deciding whether to require Google to negotiate fair licensing terms with publishers, a delay that drew immediate criticism from publisher trade bodies. The Professional Publishers Association, while supportive, made clear that opt-out controls alone do not recover lost traffic or revenue. Opting out of AI Overviews preserves a publisher’s content; it does not restore the commercial value already eroded by zero-click behaviour.\n\nThere is also an unresolved tension built into the opt-out logic. Publishers who withdraw their content from AI features protect their IP but risk reduced visibility as Google’s product becomes more AI-driven. Those who stay opted in continue feeding an AI system that, by the CMA’s own account, is reducing referral traffic without compensation. Neither path is straightforward.\n\n### The first requirement, not the last\n\nWhat makes today’s announcement matter beyond its immediate provisions is what it signals. The CMA designated Google with market status in October 2025, recognising that Google controls over 90% of UK general search queries and holds structural power that traditional competition law cannot adequately address. The conduct requirement framework that flows from that designation lets the CMA impose binding, targeted rules without needing to prove Google acted illegally.\n\nThe publisher conduct requirement is, by the CMA’s own description in the formal legal notice, the first such requirement imposed on Google. CMA chief executive Sarah Cardell was direct: “We will be announcing further action in relation to Google’s search business in the coming weeks.”\n\nGoogle’s public response has been measured. Mrinalini Loew, general manager at Google Search Ecosystem, said the company would begin testing new controls for a subset of UK website owners before a global rollout, describing it as part of ongoing dialogue with regulators.\n\nWhat Google has not done is contest the CMA’s core premise, that the current relationship between its AI search features and the publishers powering them needs to change.\n\nThat is a meaningful concession, whatever its intent. The framework now exists, the regulator has used it once, and it has said clearly that it will use it again.\n\n**Want to experience the full spectrum of enterprise technology innovation?** Join TechEx in Amsterdam, California, and London. Covering AI, Big Data, Cyber Security, IoT, Digital Transformation, Intelligent Automation, Edge Computing, and Data Centres, TechEx brings together global leaders to share real-world use cases and in-depth insights. Click here for more information.\n\nTechHQ is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars [here](https://techforge.pub/events/).\n\n## Author\n\nDashveenjit is an experienced tech and business journalist with a determination to find and produce stories for online and print daily. She is also an experienced parliament reporter with occasional pursuits in the lifestyle and art industries.\n\nView all posts\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement  \n**Source:** [full]\n\n---\ntitle: Google search publisher conduct requirement\nurl: https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement\ndescription: The Competition and Markets Authority (CMA) has imposed a conduct requirement on Google, in relation to its general search services.\nsitename: GOV.UK\ndate: 2026-06-03\nlicense: Open Government Licence v3.0\n---\n# Google search publisher conduct requirement\n\nThe Competition and Markets Authority (CMA) has\
  \ imposed a conduct requirement on Google, in relation to its general search services.\n\n## Imposition of conduct requirement\n\n3 June 2026: Following the CMA’s decision to designate Google as having strategic market status in respect of general search services and public consultation on proposed conduct requirements, the CMA has imposed the publisher conduct requirement (the publisher CR) on Google.\n\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n\nThe publisher CR requires Google to:\n\n- provide publishers with effective controls over the use of their search content in generative AI\n- publish clear, comprehensible and user-friendly information explaining how publishers’ search content is used by Google in its generative AI\n- provide publishers with clear and detailed metrics on user engagement with their search content in search generative AI features\n- take reasonable steps to ensure that search content is attributed clearly and accurately in general search, and that end users have a clear means to access that search content\n- publish clear, comprehensible and user-friendly information explaining its approach to attribution\n\nOur guide to the UK’s digital markets competition regime explains how conduct requirements work.\n</source>\n\n---\n\n<source>\n**URL:** https://www.societyofeditors.org/soe_news/society-responds-to-cma-conduct-requirement-for-google/  \n**Source:** [full]\n\n---\ntitle: Society responds to CMA conduct requirement for Google\nurl: https://www.societyofeditors.org/soe_news/society-responds-to-cma-conduct-requirement-for-google/\ndescription: Society of Editors. Protecting the freedom of the news media\nsitename: societyofeditors.org\ndate: 2026-06-03\n---\nThe Society of Editors has responded to the publication today of the Competition and Markets Authority (CMA) Conduct Requirement for Google saying that steps to secure greater control and a fairer deal for publishers over how their content is used is to be welcomed.\n\nUnder the [new rules](https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk), publishers will now have effective tools to prevent their content being used to power AI features in search, such as AI Overviews. This will put publishers, like news organisations, in a stronger position to negotiate content deals with Google. To boost consumer trust, Google is also now required to make sure that publisher content is properly attributed, using clear links, in AI‑generated search results.\n\nFollowing consultation feedback, Google will now also have to allow publishers to opt-out of allowing their content to be used for the ‘fine-tuning’ of AI models.\n\nResponding to the announcement, Dawn Alford, Chief Executive of the Society of Editors said: “The publication today of the CMA’s Conduct Requirement is a welcome step in achieving greater control and a fairer deal for publishers over how their valuable content is used.\n\n“The requirements must now be fully implemented and enforced and form part of a wider goal to build a digital future that values, respects and properly compensates creative content.”\n</source>\n\n---\n\n<source>\n**URL:** https://www.reuters.com/legal/litigation/uk-regulator-enforces-new-competition-requirements-google-search-2026-06-03/  \n**Source:** [snippet/paywall]\n\nThe CMA said Google would be required to make sure content from publishers, ​including news organisations, was properly attributed in AI‑ ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk  \n**Source:** [full]\n\n---\ntitle: CMA secures fairer deal for publishers and improves Google search services in UK\nurl: https://www.gov.uk/government/news/cma-secures-fairer-deal-for-publishers-and-improves-google-search-services-in-uk\ndescription: Conduct requirement introduced today gives publishers more control and stronger bargaining\
  \ power over the use of their content.\nsitename: GOV.UK\ndate: 2026-06-03\nlicense: Open Government Licence v3.0\n---\n# CMA secures fairer deal for publishers and improves Google search services in UK\n\nConduct requirement introduced today gives publishers more control and stronger bargaining power over the use of their content.\n\n- New conduct requirement imposed under the digital markets competition regime\n- In a world first, publishers will be able to opt out of their content being used to power AI features in Google search\n- CMA monitoring AI developments in Google search and may take further action if needed\n\nThe Competition and Markets Authority (CMA) has today imposed a new conduct requirement for Google search, meaning it must take specific action under the UK’s digital markets competition regime. The requirement will secure a fairer deal for publishers and consumers and improve Google’s search services in the UK.\n\nThe conduct requirement is imposed following the CMA’s decision to designate Google with strategic market status (SMS) in general search services. The designation allows the CMA to introduce targeted rules, known as ‘conduct requirements’, for Google’s search activities if proportionate for the purposes of ensuring fair dealing, open choices or trust and transparency.\n\nIn a world first, publishers will now have effective tools to prevent their content being used to power AI features in search, such as AI Overviews. This will put publishers, like news organisations, in a stronger position to negotiate content deals with Google.\n\nTo boost consumer trust, Google is also now required to make sure that publisher content is properly attributed, using clear links, in AI‑generated search results.\n\nFollowing consultation feedback, Google will now also have to allow publishers to opt-out of allowing their content to be used for the ‘fine-tuning’ of AI models. This provides publishers with confidence that they will have control over the full range of AI use-cases of their content.\n\nIn May, Google announced significant changes to its search platform to further embed AI technologies, which could fundamentally change how search results are presented to users in the UK. This conduct requirement will apply to those changes. However, the CMA is actively monitoring how Google is implementing these changes - including assessing the implications for businesses. If needed, the CMA will bring forward work on further measures to ensure a fair exchange of value between Google and publishers.\n\nSarah Cardell, Chief Executive of the CMA, said:\n\nToday, we have introduced a world‑first requirement on Google’s search services in the UK, enabling fair treatment, greater transparency and meaningful choice for businesses and consumers.\n\nWith features like AI Overviews rapidly reshaping online search, it is crucial that content publishers, including news organisations, have appropriate bargaining power over how their content is used. At the same time, these measures will help tens of millions of UK search users better understand and trust the information presented to them.\n\nIt’s also important that any action we take in this space can move with the times. Google has recently announced changes to its search business and the requirements we’ve introduced today are designed to respond to what Google is doing now and in the future. We’ll also continue to use the unique flexibility of the UK regime to monitor and address future concerns as they arise and we will be announcing further action in relation to Google’s search business in the coming weeks.\n\n\nThe CMA will take an active role overseeing how Google applies the new requirement to its search services. It will have nine months to implement all changes but the CMA expects important parts of the controls to become available to publishers well before that deadline. Google will also be required to submit and publish compliance reports, supported by key data and metrics,\
  \ explaining changes it has made and how it has complied. These are due every six months for the first year, after which the CMA will review the frequency of reporting. The CMA welcomes feedback from interested parties about these changes they are rolled out.\n\nSince the digital markets competition regime came into force last year, the CMA has launched four strategic market status investigations into major technology companies Google, Apple and Microsoft. Conduct requirements are an important part of the regime, allowing the CMA to take proportionate and evidence-based steps that ensure designated businesses act in a way which improve digital markets and protect competition. The requirement imposed today is part of a series of updates over the coming weeks and months on the CMA’s digital markets work.\n\nMore information can be found on the CMA’s Google search page.\n\n## Notes to editors\n\n- To designate a firm with SMS, the CMA must decide that it has substantial and entrenched market power and a position of strategic significance in a digital activity. Google having SMS does not imply that it has acted anti-competitively.\n- Once the CMA has designated a firm as having SMS, it is then able (subject to a legal framework that includes further public consultation and showing that measures are proportionate) to introduce interventions (such as those as set out in today’s decision) to unlock competition, increase innovation, and protect consumers.\n\nFor media enquiries, contact the CMA press office.\n\n- Telephone numbers\n-\n- Phone: 020 3738 6460\n- Out of hours: 020 3738 6878\n\n### Opening hours\n\nMonday to Friday, 9am to 5:30pm. On\n\nbank holidays, use our out of hours number.\n</source>\n\n---\n\n<source>\n**URL:** https://techforge.pub/events/  \n**Source:** [full]\n\n---\ntitle: Events | Explore Upcoming Tech Events | Tech Marketing Agency\nurl: https://techforge.pub/events/\nhostname: techforge.pub\ndescription: Explore our latest technology events and webinars covering the latest on AI, Digital Transformation, Blockchain, Data Centers & more\nsitename: TechForge Publishing\ndate: 2026-06-02\n---\nTechForge> Events\n\n# Upcoming Events\n\n## On-demand content\n\nExplore our library of on-demand webinars and live event recordings through our TechHub\n\nGet in touch today to find out how we can help your organsiation. Request a media pack or just ask a general question about any of our services by completing the form below.\n</source>\n\n---\n\n<source>\n**URL:** https://www.mills-reeve.com/blogs/technology/february-2026/cma-consulting-on-first-proposed-conduct-requirements-for-google-under-new-digital-markets-regime/  \n**Source:** [full]\n\n---\ntitle: CMA Consulting on first proposed Conduct Requirements for Google under new Digital Markets Regime | Mills & Reeve\nurl: https://www.mills-reeve.com/blogs/technology/february-2026/cma-consulting-on-first-proposed-conduct-requirements-for-google-under-new-digital-markets-regime/\ndescription: This blog discusses the CMA’s designation of Google’s general search and search advertising services with Strategic Market Status (SMS) under the Digital Markets, Competition & Consumers Act 2024.\nsitename: Mills & Reeve LLP\ndate: 2026-02-12\n---\nOn 10 October 2025, the UK’s competition law regulator, the Competition & Markets Authority (CMA) used its powers under the Digital Markets Competition & Consumer Act 2024 (DMCCA) to designate Google’s general search and search advertising services with ‘Strategic Market Status’ (SMS). Following this designation, the CMA has now proposed a set of conduct requirements to be imposed on Google. In this briefing, we look at the story so far, what the conduct requirements are, and what they might mean for Google.\n\n### Why was Google designated as an SMS firm, and for what?\n\nThe DMCCA regime, in effect from 01 January 2025, intends to promote competition in digital markets by allowing the CMA to regulate the conduct of firms which meet the\
  \ requirements of designation under the Act and are subsequently designated as having SMS by the CMA. SMS firms are the very largest providers of digital activities and to be designated a firm must meet turnover thresholds and have substantial and entrenched market power.\n\nThe CMA designated Google in respect of its general search function, which it provides to users, and its search advertising service, which it provides to business to enable them to advertise to users.\n\nNeither SMS designation for ‘general search and search advertising services’ came as a surprise. The CMA’s decision stated that more than 90% of user searches in the UK take place on Google and that 200,000 businesses spent a collective £10bn on Google search advertising last year. The CMA considered that Google has held an ‘unparalleled’ position in these digital activities for an extended period.\n\nThe CMA’s designation decision also stated that it will monitor whether the significance of Google’s AI assistant ‘Gemini’ progresses to such a point that it will need to amend the scope of its designation (which would require a similar process to designation itself).\n\n### What it means\n\nOnce a firm is designated as having SMS, the DMCCA allows the CMA to regulate its conduct in two main ways:\n\n- Conduct requirements. These are bespoke requirements which the CMA imposes on the SMS undertaking, which dictate how it must or must not conduct itself in relation to digital activities.\n- Pro-Competition Interventions. These are orders to the SMS undertaking which set out how it must conduct itself or recommendations to regulatory authorities to take steps in relation to the SMS undertaking which allow the CMA to remedy an existing adverse effect on competition.\n\n### What conduct requirements has the CMA proposed?\n\nThe CMA is proposing a set of Conduct Requirements (CRs) specifically targeted at Google’s general search services. These are presented in several detailed documents ([linked here](https://connect.cma.gov.uk/google-search-conduct-requirements)), each addressing a particular concern:\n\n#### Data Portability:\n\nThe right to data portability entitles individuals to obtain and reuse the personal search-related data they have provided to a controller by moving, copying, or transferring it securely between services. This enables individuals to make use of tools and applications that can analyse their data to secure better deals or gain insights into their own habits.\n\n#### Publishers:\n\nThis is aimed at ensuring publishers receive fair treatment and to prevent discriminatory behaviour in how Google displays, ranks, or uses publisher content. The CMA’s three main areas of concern are that\n\n- publishers lack meaningful choice over how Google uses their search indexed content in AI generated responses, which limits their ability to monetise that content while giving Google access to material that competitors cannot match;\n- publishers have insufficient transparency over how their content is used in AI generated responses or how users engage with it, making it harder for them to make informed decisions about whether, and for what purposes, their content should be used; and\n- effective attribution in AI generated responses is essential, as it enables consumers to verify information and helps publishers maintain brand value and support continued content creation.\n\n#### Fair Ranking:\n\nThis seeks to prevent Google from manipulating search results unfairly, in particular where Google may favour its own services. The CMA is seeking to address how Google modifies the ranking and presentation of organic search results through changes to its algorithms, search policies, and new features such as AI Overviews and AI Mode. Stakeholders are concerned that these practices may lead to unfair ranking outcomes, limited transparency, insufficient consideration of wider market impacts, and inadequate ways for businesses to raise and resolve issues.\n\n#### User\
  \ Choice:\n\nThe CMA’s proposed User Choice CR aims to improve Google’s search choice screens and related choice architecture so that UK users are more aware of the range of available search providers, more confident in choosing between them, and better able to switch quickly and easily on key Google‑controlled access points. The measure aims to ensure users can freely and easily select between Google’s search services and those offered by competitors, and it falls within the permitted type allowing obligations on how Google presents options or default settings to support informed and effective decision‑making. The CMA suggests that this requirement may improve consumer awareness, engagement, and switching, while also strengthening competition by enabling rival search providers to attract more users and enhance their services, ultimately increasing competitive pressure on Google.\n\nAs required under the DMCCA, the CMA must consult with stakeholders before imposing the conduct requirements on Google. The consultation period runs until 25 February 2026.\n\nOur competition team has extensive experience of engagement with the CMA. We can support you in crafting or reviewing responses to the consultation or discussing any aspect of the CMA’s proposals.\n\n**Consultation Phase** (Open Now)\n\n- Closes: 25 February 2026 at 5pm\n- Stakeholders are invited to submit comments via:\n\n- An online form linked\n[here](https://connect.cma.gov.uk/google-search-conduct-requirements) - Email to\n[[email protected]](https://www.mills-reeve.com/cdn-cgi/l/email-protection#deadbbbfacbdb6adb3ad9ebdb3bff0b9b1a8f0abb5)\n\nThe CMA:\n\n- Asks respondents to specify which proposed CR(s) they are commenting on.\n- Will publish non-confidential versions of submissions.\n\n*Our content explained*\n\n*Every piece of content we create is correct on the date it’s published but please don’t rely on it as legal advice. If you’d like to speak to us about your own legal requirements, please contact one of our expert lawyers.*\n</source>\n\n---\n\n<source>\n**URL:** https://itif.org/publications/2026/02/25/comments-uk-competition-markets-authority-regarding-googles-general-search-services/  \n**Source:** [full]\n\n---\ntitle: Comments to UK Competition and Markets Authority Regarding Google's General Search Services\nurl: https://itif.org/publications/2026/02/25/comments-uk-competition-markets-authority-regarding-googles-general-search-services/\ndescription: Amidst this time of increasing technological dynamism and global tensions, and given the special relationship that exists between the United States and the UK, the CMA should reassess how it can implement the Digital Markets, Competition and Consumers Act 2024 in a more light-touch way.\nsitename: Information Technology and Innovation Foundation | ITIF\ndate: 2026-02-25\n---\n# Comments to UK Competition and Markets Authority Regarding Google's General Search Services\n\nContents\n\n2. Data Portability Conduct Requirement 3\n\n3. Publisher Conduct Requirement 4\n\nOn October 10, 2025, the UK’s Competition and Markets Authority (CMA) designated Google as having strategic market status (SMS) in the market for general search services using its authority under the Digital Markets, Competition and Consumers Act 2024 (Act).[[1]](https://itif.org#_edn1) On January 26, 2026, the CMA issued proposed conduct requirements (PCRs) to be imposed upon Google’s general search services, which specify how Google “must conduct itself in relation to the digital activity in respect of which it has SMS.”[[2]](https://itif.org#_edn2)\n\nThe PCRs encompass four broad conduct requirements. First, a data portability requirement that “give[s] consumers who use Google’s general search services the right to port their data to other businesses.”[[3]](https://itif.org#_edn3) Next, a publisher conduct requirement which “provide[s] publishers with informed and meaningful choice over how Google uses their content, crawled for general search,\
  \ for the purpose of generative AI.”[[4]](https://itif.org#_edn4) Third, a fair ranking conduct requirement with the aim to ensure that “publishers are treated fairly where their content is used in general search.”[[5]](https://itif.org#_edn5) Finally, a user choice conduct requirement “to enable consumers to make informed and effective choices and promote greater competition among search providers.”[[6]](https://itif.org#_edn6)\n\nThe structure of this comment mirrors the structure of the PCRs: *first*, a discussion of why the data portability conduct requirement is disproportionately harmful; *second*, an analysis of how the publisher conduct requirement is not the least restrictive alternative by virtue of extending into AI markets; *third*, an assessment of how the fair ranking conduct requirement is far more onerous than what is necessary to address anticompetitive behavior; and *fourth*, an examination of why the user choice requirement is unlikely to have any significant effect toward helping rival search engines. Recommendations and a brief conclusion follow.\n\nThe CMA explains that the “aim for our intervention is to ensure that UK consumers who use Google’s general search services can effectively port their data to other businesses to develop new services or otherwise share the value of that data” pursuant to the “fair dealing” objective in section 19(6) of the Act.[[7]](https://itif.org#_edn7) While, as the CMA describes, Google offers a voluntary application programming interface (API) for data portability, its “provisional assessment is that this uncertainty risks negatively impacting investment decisions, and therefore growth and innovation”; indeed, the CMA notes that “Google submitted that the incremental costs of formalizing the API are likely to be negligible, given that Google already voluntarily provides the API.”[[8]](https://itif.org#_edn8)\n\n3. Publisher Conduct Requirement\n\nWith its publisher PCR, the CMA attempts to satisfy not just the fair dealing objective in section 19(6) of the Act but also the trust and transparency objective in section 19(8) of the Act.[[9]](https://itif.org#_edn9) The CMA envisions Google “implementing a new control allowing publishers to opt out of their Search Content being used in the grounding of content in its search generative AI features”; indeed, as the CMA notes, “Google-Extended already enables publishers to control whether their Search Content is used in training Google’s foundation models and grounding Google’s broader generative AI services,” such that it should be “technically feasible” for Google to develop similar controls for AI search features.[[10]](https://itif.org#_edn10)\n\nIt is far from clear that the publisher PCR is the least onerous of equally effective options to achieve the Act’s aims. Specifically, rather than addressing behavior by Google that protects its general search services position for which it was designated as having SMS, the CMA is seeking to prevent Google from competing in next-generation AI markets—well outside the scope of what the CMA should be focusing on. In fact, there is no competitive problem in the nascent and dynamic AI search space that the Act needs to solve. For example, OpenAI’s chief financial officer recently stated that AI is “blowing open the search markets,” noting that the company doubled its search share from roughly 6 percent to 12 percent in just 6 months.[[11]](https://itif.org#_edn11)\n\n[Like the publisher PCR, the fair ranking PCR is similarly justified by the CMA in terms of fair dealing as well as trust and transparency.][[12]](https://itif.org#_edn12) This PCR requires both that “Google’s relevant ranking decisions should be based on objective and non-discriminatory factors that provide users with the most relevant and high-quality results to their specific query” and that Google provide information about its search rankings that is “sufficiently detailed to allow publishers to understand how ranking decisions\
  \ are made and to identify possible instances of discrimination or distortion.”[[13]](https://itif.org#_edn13)\n\nDespite the CMA’s arguments to the contrary, it is far from clear that the fair ranking PCR is no more onerous than necessary to achieve the Act’s aims. Indeed, rather than focus on instances of where Google may have engaged in anticompetitive self-preferencing, the fair ranking PCR’s non-discrimination provision applies much more broadly to any search ranking—even if Google’s own products and services are not implicated and it thus lacks any *prima facie* incentive to leverage its purported market power in general search services. What’s more, a blanket ban on discrimination is not only bound to have negative welfare effects for consumers by limiting the ability for content that may be more desirable for a user to compete for better placement, but may be undermined by the transparency requirements that open the door to publishers “cheating” such that their content features prominently instead of that which consumers actually want to see.\n\nFinally, the CMA’s user choice PCR, which is designed to further the open choices objective in section 19(7) of the Act, requires that “Google shall provide Users, or ensure that Users are provided, with a Search Choice Screen that cannot be skipped on all Relevant Browsers and all Relevant Devices that enables Users to select a Default Search Provider.”[[14]](https://itif.org#_edn14) For the CMA, appropriately designed choice screens are “key to ensuring that users can make active and informed choices” about their use of a search engine.[[15]](https://itif.org#_edn15) This design is detailed at length by the CMA to satisfy criteria associated with greater coverage, balanced prompts, and more.[[16]](https://itif.org#_edn16)\n\n▪ **Publisher Conduct Requirement:** While the PCRs are ostensibly designed to address Google’s SMS status in general search services, the publisher PCR attempts to limit Google’s ability to compete in dynamic, next-generation search markets that require no regulatory intervention by the CMA. Rather than overly burden Google with unnecessary measures, the CMA should focus solely on PCRs that target the general search services market where it was deemed to have SMS.\n\n▪ **Fair Ranking Conduct Requirement:** The CMA’s decision to impose a broad fair ranking PCR opts for heavy-handed regulation of the general search market rather than addressing the self-preferencing behavior that would in theory involve Google leveraging market power in general search to gain an advantage in a second market. To minimize false positives, the CMA should tailor its PCRs to address conduct that can constitute anticompetitive behavior.\n\n▪ **User Choice Conduct Requirement:** Rather than put forward a user choice PCR that might meaningfully address Google’s purported dominance in general search services, the CMA doubles down on a well-worn remedy that has demonstrably not achieved significant procompetitive benefits while degrading user experience. As such, the CMA should drop this PCR and go back to the drawing board to determine how the Act can actually be used to improve user choice.\n\nHaving implemented the Act, the CMA faces a fundamental choice as to how it will approach the regulation of digital platforms: faithfully apply its proportionality analysis in a way that focuses on effective, necessary, unburdensome, and on balance pro-innovation conduct requirements, or simply roll out the standard fare of remedial measures that have long been thrown at firms like Google but which have dubious merits at best. Amidst this time of increasing technological dynamism and global tensions, and given the special relationship that exists between the United States and the UK, the CMA should reassess how it can implement the Act in a more light-touch way that ensures not just that British innovation and consumers will be made better off, but that Britain will avoid being subject to potential\
  \ retaliatory actions leveled at jurisdictions that implement digital antitrust regulations that target America’s leading technology companies.\n\n[[1]](https://itif.org#_ednref1). CMA, Strategic market status investigation into Google’s general search services, final decision (Oct. 10, 2025), [https://assets.publishing.service.gov.uk/media/68e8b643cf65bd04bad76724/Final_decision_-_strategic_market_status_investigation_into_Google_s_general_search_services.pdf](https://assets.publishing.service.gov.uk/media/68e8b643cf65bd04bad76724/Final_decision_-_strategic_market_status_investigation_into_Google_s_general_search_services.pdf).\n\n[[2]](https://itif.org#_ednref2). CMA, Google’s general search services: Proposed Conduct Requirements, Introduction ¶ 1.6 (Jan. 28, 2026), [https://assets.publishing.service.gov.uk/media/6979ce781c24881f40a4d6dc/Introduction_to_the_consultation.pdf](https://assets.publishing.service.gov.uk/media/6979ce781c24881f40a4d6dc/Introduction_to_the_consultation.pdf)\n\n[[3]](https://itif.org#_ednref3). CMA, Consultation: Data Portability Conduct Requirement, Google’s general search services ¶ 1.1 (Jan. 28, 2026), [https://assets.publishing.service.gov.uk/media/6979ce981c24881f40a4d6dd/_Data_portability_conduct_requirement_v2.pdf](https://assets.publishing.service.gov.uk/media/6979ce981c24881f40a4d6dd/_Data_portability_conduct_requirement_v2.pdf) [hereinafter Data Portability Conduct Requirement].\n\n[[4]](https://itif.org#_ednref4). CMA, Consultation: Publisher Conduct Requirement, Google’s general search services ¶ 1.1 (Jan. 28, 2026), [https://assets.publishing.service.gov.uk/media/6979ceae75d443709655209c/Publisher_conduct_requirement.pdf](https://assets.publishing.service.gov.uk/media/6979ceae75d443709655209c/Publisher_conduct_requirement.pdf) [hereinafter Publisher Conduct Requirement].\n\n[[5]](https://itif.org#_ednref5). CMA, Consultation: Fair Ranking Conduct Requirement, Google’s general search services ¶ 1.2 (Jan. 28, 2026), [https://assets.publishing.service.gov.uk/media/6979cebd5da1fd4ddea98c6f/Fair_ranking_conduct_requirement.pdf](https://assets.publishing.service.gov.uk/media/6979cebd5da1fd4ddea98c6f/Fair_ranking_conduct_requirement.pdf) [hereinafter Fair Ranking Conduct Requirement].\n\n[[6]](https://itif.org#_ednref6). CMA, Consultation: User Choice Conduct Requirement, Google’s general search services ¶ 1.1 (Jan. 28, 2026), [https://assets.publishing.service.gov.uk/media/6979cec91c24881f40a4d6de/_User_choice_conduct_requirement_v2.pdf](https://assets.publishing.service.gov.uk/media/6979cec91c24881f40a4d6de/_User_choice_conduct_requirement_v2.pdf) [hereinafter User Choice Conduct Requirement].\n\nMarch 31, 2026\n</source>\n\n---\n\n<source>\n**URL:** https://assets.publishing.service.gov.uk/media/69b970dc635612b767a46668/Public_Interest_News_Foundation.pdf  \n**Source:** [full]\n\n---\nurl: https://assets.publishing.service.gov.uk/media/69b970dc635612b767a46668/Public_Interest_News_Foundation.pdf\n---\n\nGoogle’s general search services: \nproposed conduct requirements  \n25th February 2026 \nA sustainable future for public interest journalism \nThe following document sets out the response of the Public Interest News Foundation \n(PINF) to the CMA’s proposed conduct requirements in relation to Google’s general \nsearch services. \nPINF is a charity which promotes public interest news. We do not promote the \ncommercial or political interests of particular news providers. We believe that citizens \nand consumers benefit from a sustainable, plural and innovative news industry. \nWe are responding to the CMA’s consultation because we believe that there should be \nno delay to redressing the balance between Google and the news industry, thereby \ndecreasing Google’s dominance, restoring a sustainable, plural and innovative news \nindustry, and ensuring the interests of citizens and consumers. \nWithout publisher conduct requirement, trustworthy news will diminish \nWe welcome the CMA’s proposed\
  \ conduct requirements in relation to Google’s general \nsearch services. In particular, we strongly agree with the draft publisher conduct \nrequirement’s identification of the potentially catastrophic results for audiences, given \nthat publishers cannot currently withdraw their content from use in Google’s AI \noverviews without being de-ranked in Google search. \nWe have known for some time that AI overviews in search run the risk of cannibalising \nnews content online, so the conduct requirement is a desperately needed first step. If \npublishers can’t sustain their businesses, due to rapidly decreasing traffic to their sites, \nthere will be less and less trustworthy content to draw on, with misinformation filling \nthe gaps and dominating the information environment, causing further tension and \neven violence within our communities.\n\nThe IPPR’s recent report AI’s got news for you found that publishers are predicting a 43 \nper cent reduction in search traffic over the next three years, as AI overviews in search \nreduce the likelihood that users will click through to news sites.1 This seriously \nthreatens already dwindling advertising and subscription revenues as AI tools nearly \nalways reproduce news content without payment. \nIt also finds a total lack of transparency in how AI tools select their source material, \nwith some news outlets prioritised over others, creating a new generation of winners \nand losers, and potentially amplifying particular viewpoints or agendas without users’ \nknowledge. Local news outlets are already under extreme pressure, meaning that they \nare particularly vulnerable to the financial impacts threatened by the rise of AI tools.  \nDelay undermines the purpose of the DMCC act \nWe would also like to take the opportunity to express our significant concern around \nthe CMA's announcement delaying the next set of conduct requirements. Local news \npublishers and the communities they serve cannot wait - they need action to be taken \nnow.  \nThe Digital Markets, Competition and Consumers Act was created with the intention, \namong others, of rebalancing the relationship between publishers and online \nplatforms. This key purpose of legislation cannot be delayed, especially as a timeline \nhas already been set out for its implementation.  \nFurman and Cairncross Reviews  \nThe history of the Act makes it very clear that rebalancing the platform-publisher \nrelationship is a core intention. Beginning in 2019, the Furman Review  called for the \ncreation of a mandatory ‘code of conduct so the largest digital companies know the \ncompetitive rules of the game.’2 The review highlighted that existing competition rules \nwere inadequate to prevent ‘bullying tactics by market leaders,’ emphasising the \nneed for new mechanisms ensuring fair dealing. \nMarket failure in public interest news was first identified in the 2019 Cairncross Review, \nwhich recommended a new regulatory code to rebalance the severe ‘uneven balance \nof power’ between platforms and publishers. The review warned that the imbalance of \npower ‘eroded revenue’ for public‑interest journalism and strengthened platforms’ \nability to control distribution without compensating publishers fairly, calling for \ngovernment action to be taken.  \nThe Government’s own intentions\n\n1 See: https://www.ippr.org/articles/ais-got-news-for-you \n2 See: https://www.gov.uk/government/news/tech-giants-do-not-face-enough-competition-reducing-\nconsumer-choice-and-innovation\n\nThe Government’s response to these reviews formally acknowledged these concerns \nregarding the imbalance of power and signalled political recognition that platform \nconduct rules were required.3 The House of Lords debate on the Cairncross review \nemphasised the ‘huge power of online platforms’ and the ‘asymmetry of power’ \nbetween platforms and publishers, urging reforms to prevent platforms from degrading \nnews quality and controlling revenue flows.4 \nDuring the passage\
  \ of the bill, the Government was clear that redressing the balance \nbetween the tech giant and UK news organisations was central to the intention of the \nAct, with the Parliamentary Under-Secretary of State for Science, Innovation and \nTechnology remarking that ‘we recognise the traditional business model of news media, \nparticularly print media, which has been substantially disrupted by the growth of digital. \nThe regime is designed to help rebalance the relationship between major platforms \nand those who rely on them, including news publishers. That could include creating \nan obligation to offer fair and reasonable payment terms for the use or acquisition of \ndigital, including news, content.’5 \nThe Parliamentary Under-Secretary of State for Science, Innovation and Technology \nalso remarked that ‘it is important that news publishers can benefit from the robust \nprotections offered by the new regime’6 and that ‘the Digital Markets, Competition and \nConsumers Act will help rebalance the relationship between news publishers and \ndominant online platforms, which has been at the root of many challenges the \nindustry has faced in recent years.’7 \nReasonable expectations \nThe DMCC Act embedded enforceable conduct requirements for firms designated with \nStrategic Market Status (SMS), including ‘fair dealing,’ ‘open choices,’ and ‘trust and \ntransparency,’ directly addressing the concerns raised and empowering the CMA to \nrequire platforms to treat news publishers on fair, reasonable and non‑discriminatory \nterms.  \nThe Roadmap published in July 2025 said that the regulator would consider fair and \nreasonable terms in relation to publisher content in the first half of 2026. The proposal \nidentified that Google’s bargaining position can impact fair and reasonable terms for\n\nThe search engine is clearly dominant in an uncompetitive market. But, Google search \nis valuable because users are granted access to a wide range of news content, from \nboth large news brands and small, independent news providers. \nGoogle generated £16.7 billion from search advertising in the UK in 2023 (IAB Europe, \n2022),10 of which 55 per cent, £8.5 billion, comes from information searches (Höppner \n& Piepenbrock, 2022).11 News adds value to information searches 66 per cent of the \ntime, meaning that Google generates £5.6 billion with the help of news media content. \nIf this value was split 60:40 with Google, then news providers as a whole would be \nentitled to a revenue share of £2.2bn – for 2023 alone (Johann et al., 2023).12  \nWhile large US-based companies like Google are enabled to continue their rapid growth \nat the expense of British consumers, local news publishers are having to find new \nbusiness models in the wake of big tech disruption. In contrast, given the number of \njobs that have been lost and newsrooms that have closed in recent decades, there is \nenormous room for growth in the local news sector that would greatly enrich the UK \neconomy. Local news outlets drive regional growth by creating jobs, investing locally \nand promoting local businesses.  \nLocal journalism both encourages those living in the local area to participate in their \nlocal economy and attracts new visitors to an area by making it more visible.13 Social \nStreets found that more than half of their readers had been encouraged to visit a local \nshop, bar or restaurant as a result of their content.14 PINF research in 2025 showed 55% \nof readers agreed that they supported local businesses more as a result of reading local \nnews.15 \nEnsuring fair value exchange for the benefit of all communities \nWe strongly believe that the approach set out in the Act and followed by the CMA will \nlead to a fair and sustainable value exchange between actors that all communities can \nbenefit from, but the regime must be not delayed.  \nWe would be delighted to provide further information on any of the points raised in this \nresponse and we look forward\
  \ to following this process closely.\n</source>\n\n---\n\n<source>\n**URL:** https://laweconcenter.org/resources/icle-comments-to-cma-on-google-search-conduct-requirements/  \n**Source:** [full]\n\n---\ntitle: ICLE Comments to CMA on Google Search Conduct Requirements - International Center for Law & Economics\nurl: https://laweconcenter.org/resources/icle-comments-to-cma-on-google-search-conduct-requirements/\ndescription: Executive Summary The International Center for Law & Economics (ICLE) welcomes the opportunity to submit these comments to the Competition and Markets Authority (CMA) regarding the proposed Conduct Requirements (CRs)...\nsitename: International Center for Law and Economics\ndate: 2026-02-19\n---\n# ICLE Comments to CMA on Google Search Conduct Requirements\n\n## Executive Summary\n\nThe International Center for Law & Economics (ICLE) welcomes the opportunity to submit these comments to the Competition and Markets Authority (CMA) regarding the proposed Conduct Requirements (CRs) for Google’s general search services. ICLE is a nonprofit, nonpartisan research centre dedicated to promoting economically grounded public policy. Our work applies law & economics analysis to competition policy, including digital markets, artificial intelligence, and platform regulation. We seek to ensure that competition law rests on clear legal standards, established precedent, and robust empirical evidence, and that regulatory interventions protect consumers, rather than particular competitors.\n\nThe CMA’s consultation arises at a pivotal moment for the UK digital economy. Google’s designation with Strategic Market Status (SMS) triggers the Digital Markets, Competition and Consumers Act 2024’s *ex ante* regulatory framework. While the DMCC Act aims to promote competition and innovation, the specific measures proposed here risk producing the opposite effect, if not carefully calibrated. Across the consultations, the central issue is proportionality: whether the proposed interventions address demonstrable consumer harm or instead impose costs on product quality, innovation, and user experience in order to alter competitive relationships among firms.\n\n**Publisher Conduct Requirement:** The proposed controls on the use of publisher content in generative-AI services risk distorting competition by imposing obligations on a single firm, while other AI developers remain subject only to generally applicable law. The measure also seeks to resolve disputes about the permissible use of copyrighted material—questions more appropriately addressed through intellectual-property law. In addition, the opt-out mechanism may degrade AI-generated search responses and fragment the user experience, while less distortive tools such as transparency and attribution could address many of the CMA’s concerns.\n\n**Fair Ranking Conduct Requirement:** The proposed obligation of ‘objective’ and ‘non-discriminatory’ ranking misunderstands the nature of search, whose value depends on selective curation and integration. The CMA has not identified direct evidence that individual ranking decisions are unfair, yet the CR would impose complex compliance obligations that are difficult to administer in machine-learning systems. Restrictions on integrated features may also eliminate efficiencies that reduce search costs and improve relevance, potentially degrading product quality without clear competitive benefits.\n\nThe Digital Markets, Competition and Consumers Act 2024 (DMCC Act) marks a structural reorientation of UK competition policy, shifting from primarily *ex post* enforcement toward an *ex ante* regulatory regime for firms designated with Strategic Market Status (SMS). Although Parliament has now settled the legislative framework, the CMA retains substantial discretion in designing and implementing Conduct Requirements (CRs). That discretion remains bounded by statutory obligations, including proportionality, evidence-based analysis, and a focus on consumer\
  \ outcomes, rather than the commercial position of particular competitors.\n\nThese consultations therefore raise questions not only about specific remedies, but also about how enforcement should operate in dynamic and technologically complex markets. In such settings, regulatory decisions must be made under persistent uncertainty. The law & economics literature has long recognised that intervention entails a risk of error, and that enforcement policy should account for both the likelihood and the cost of mistaken intervention. Where innovation is cumulative and path-dependent—as in digital and AI-enabled services—the cost of prohibiting beneficial conduct may be durable, while some competitive harms may dissipate through entry and technological change. This asymmetry makes careful calibration of intervention especially important.\n\n### B. Competition, Not Competitors\n\n## II. Assessment of the Proposed Publisher Conduct Requirement\n\nThe CMA’s proposed Publisher Conduct Requirement (Publisher CR) governs Google’s use of publisher content—crawled for general search—in generative-AI services such as AI Overviews, AI Mode, and the Gemini assistant.[[13]](https://laweconcenter.org#_ftn13) The proposal has three components. First, opt-out controls would allow publishers to withhold ‘Search Content’ from grounding in search generative-AI features and from training and grounding in broader AI services. Second, transparency obligations would require disclosure of how content is used and provision of engagement metrics to publishers. Third, attribution requirements would require reasonable steps to identify and credit publisher material in AI-generated responses.[[14]](https://laweconcenter.org#_ftn14)\n\nThe proposed Publisher CR would create a marked regulatory asymmetry in generative-AI services. Google would face legally binding obligations to provide granular opt-out controls for training and grounding, alongside transparency, reporting, and attribution requirements.[[16]](https://laweconcenter.org#_ftn16) Competing providers of generative-AI systems—including OpenAI, Anthropic, Meta, and a growing ecosystem of open-source foundation-model developers—would face no equivalent constraints, because they are not designated with SMS in general search and therefore fall outside the DMCC regime.\n\nInternational experience also illustrates the risk of competitive distortion from asymmetric digital-market regulation. Under the EU Digital Markets Act, Google removed certain integrated features, including clickable map modules and embedded previews, from European search results to comply with self-preferencing rules. Reports indicate a slower and more fragmented user experience, without clear competitive gains for rivals.[[21]](https://laweconcenter.org#_ftn21)\n\nThe Publisher CR appears motivated in part by concern that Google uses content crawled for search in AI applications without adequate publisher consent. The underlying issue—whether the use of publicly available web content for AI training and grounding infringes copyright—is, however, a matter of intellectual-property law, rather than competitive conduct.\n\nThis approach would produce a two-tier structure of rights and obligations. Google would need to secure effective consent—through opt-out mechanisms—to use publisher content for AI grounding, while other AI developers would remain subject only to generally applicable copyright law. If grounding AI search responses in publicly available web content constitutes fair dealing, Google should be permitted to do so on the same basis as other market participants. If it does not, the appropriate remedy lies in copyright enforcement applied consistently across firms, rather than in an asymmetric competition-law obligation imposed on a single company.\n\nThe CMA acknowledges Google’s submission that fine-tuning ‘helps the model learn how to process information rather than what current information to display’ and that permitting opt-outs\
  \ from fine-tuning would ‘raise the risk of downranking or mis-ranking publisher content in organic search results’.[[23]](https://laweconcenter.org#_ftn23) The Authority has therefore provisionally excluded fine-tuning of search AI models from the opt-out regime. This reflects a proportionate assessment of product functionality. Similar considerations, though operating differently, arise in relation to grounding.\n\n## III. Assessment of the Proposed User Choice Conduct Requirement\n\nA relevant precedent is the Android choice screen introduced following the European Commission’s *Google Android* decision.[[34]](https://laweconcenter.org#_ftn34) An econometric analysis by Francesco Decarolis, Muxin Li, and Filippo Paternollo, using difference-in-differences methods, finds a statistically significant reduction in Google’s mobile search share in the European Economic Area (EEA). The magnitude, however, is modest—less than one percentage point in the headline estimate, with some variation across specifications.[[35]](https://laweconcenter.org#_ftn35) Although rivals with greater pre-remedy awareness (proxied by desktop share) benefited somewhat more, the overall effect falls short of materially deconcentrating the market.[[36]](https://laweconcenter.org#_ftn36)\n\nThe proposed Fair Ranking Conduct Requirement (Fair Ranking CR)[[48]](https://laweconcenter.org#_ftn48) seeks to ensure that Google’s ranking decisions are ‘objective’, ‘non-discriminatory’, and ‘transparent’, supported by a publisher complaints mechanism and reporting obligations concerning ranking policies that may affect other markets.[[49]](https://laweconcenter.org#_ftn49) These objectives are understandable. The design of the intervention, however, raises concerns about its implications for innovation and consumer welfare.\n\nWe have not seen direct evidence that Google’s individual ranking decisions are unfair. However, taken in the round: the role of Google’s general search as a critically important digital tool for people and businesses; the lack of trust and perception of unfairness in Google’s ranking; the lack of sufficient transparency about how Google implements and operationalises its ranking in practice; and the direct impact this lack of trust has had on publishers, including deterring investment, leads us to consider that there is merit in introducing a formal requirement.\n\nThe requirement of ‘objectivity’ risks misunderstanding how search operates. As Manne and Wright explain, the value of a search engine derives from its ability to prioritise some results over others.[[52]](https://laweconcenter.org#_ftn52) Search is an exercise in curation: from billions of web pages, the system promotes a small number of results based on predicted relevance. Because ranking is inherently relative—elevating one result necessarily lowers another—differentiation is not itself evidence of anticompetitive conduct, but a necessary feature of the product.[[53]](https://laweconcenter.org#_ftn53)\n\nThe non-discrimination obligation also presents practical enforcement difficulties. The proposal would prohibit Google from considering, among other things, whether a publisher advertises with Google, enters commercial arrangements, or exercises statutory rights. Modern search ranking, however, depends on the interaction of thousands of signals processed through machine-learning systems. Determining whether any single prohibited factor affected a particular outcome will often be infeasible. A publisher experiencing reduced traffic after a dispute may infer retaliation, but the change may equally reflect an algorithmic update, shifting user behaviour, or changes in content quality. The result could be persistent and difficult-to-resolve disputes.\n\nRelated concerns arise from the requirement that Google apply the same criteria to its own services and those of third parties. Research frequently finds that vertical integration on digital platforms produces efficiencies.[[54]](https://laweconcenter.org#_ftn54)\
  \ Integrated features—such as map results or flight modules—can reduce search costs by allowing users to obtain information directly within the search interface. As Robert Bork and Gregory Sidak observe, the consumer-welfare benefits of integration arise precisely from the immediate availability of the integrated result.[[55]](https://laweconcenter.org#_ftn55) A categorical restriction on self-preferencing would risk sacrificing these efficiencies in order to preserve competitor distinctiveness.[[56]](https://laweconcenter.org#_ftn56) The CMA’s interpretative notes recognise that designing a feature containing only Google inputs is not itself a breach, but its placement in rankings may be.[[57]](https://laweconcenter.org#_ftn57) In practice, placement and design are closely connected: the usefulness of an integrated feature depends on where it appears.\n\nThe CMA’s proposed Conduct Requirements for Google’s general search services constitute a significant intervention in a rapidly evolving sector. ICLE does not question the Authority’s mandate to promote competitive and contestable digital markets, nor the relevance of Google’s position in general search within the DMCC framework. As currently drafted, however, the three CRs risk imposing durable costs on UK consumers and on innovation in digital and AI services.\n\nICLE respectfully encourages the CMA to anchor its final measures in demonstrable consumer harm, to rely primarily on real-world evidence, and to prefer less distortive tools—particularly transparency and attribution—over restrictions on product design. A framework that protects competition rather than competitors, and that recognises the limits of regulatory knowledge in complex markets, will better advance the DMCC Act’s objective of improving outcomes for UK consumers.\n\n[[13]](https://laweconcenter.org#_ftnref13) Competition & Mkts. Auth. (CMA), *Consultation: Publisher Conduct Requirement—Google’s General Search Services* (28 January 2026) (UK) [hereinafter *Publisher CR Consultation*].\n\n[[26]](https://laweconcenter.org#_ftnref26) Competition & Mkts. Auth. (CMA), *Consultation: User Choice Conduct Requirement—Google’s General Search Services* (28 January 2026) (UK) [hereinafter *User Choice CR Consultation*].\n\n[[34]](https://laweconcenter.org#_ftnref34) Comm’n Decision 2019/C 402/08, Case AT.40099—*Google Android*, 2019 O.J. (C 402) 19.\n\n[[38]](https://laweconcenter.org#_ftnref38) Competition & Mkts. Auth., *Strategic Market Status Investigation into Google’s General Search Services: Final Decision* ¶ 5.173(c) (10 October 2025) (UK).\n\n[[48]](https://laweconcenter.org#_ftnref48) Competition & Mkts. Auth. (CMA), *Consultation: Fair Ranking Conduct Requirement—Google’s General Search Services* (28 January 2026) (UK) [hereinafter *Fair Ranking CR Consultation*].\n\n[[57]](https://laweconcenter.org#_ftnref57)* Fair Ranking CR Consultation*, *supra* note 48, interpretative note 5 (‘[T]he fact that a search feature (e.g. the Flights Module) might be designed and presented to include only Google inputs would not be relevant to paragraph 4.b. of the conduct requirement, but Google’s decision about where that search feature is ranked on the page would be’).\n</source>\n\n---\n\n<source>\n**URL:** https://ppc.land/uk-regulator-forces-google-to-give-publishers-ai-opt-out-rights-today/  \n**Source:** [full]\n\n---\ntitle: UK regulator forces Google to give publishers AI opt-out rights today\nurl: https://ppc.land/uk-regulator-forces-google-to-give-publishers-ai-opt-out-rights-today/\ndescription: The CMA today imposed its first conduct requirement on Google, granting publishers opt-out controls over AI Overviews, AI Mode, and Gemini training.\nsitename: PPC Land\ndate: 2026-06-03\n---\nThe UK Competition and Markets Authority today imposed a formal conduct requirement on Google covering the use of publisher content in generative AI products, marking the first binding obligation the regulator has issued under the Digital\
  \ Markets, Competition and Consumers Act 2024. The [requirement](https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement?ref=ppc.land), known as the **Publisher Conduct Requirement**, takes effect immediately as a legal instrument, with the substantive control obligations coming into force on 3 December 2026 - six months from today. It will remain in force until 10 October 2030, the final day of Google's current designation period under the Act.\n\nAccording to the CMA's formal notice, published today under section 19(1) of the Act, the Publisher Conduct Requirement contains nine numbered paragraphs covering three distinct areas: controls, transparency, and attribution. Taken together, the three elements are designed to ensure publishers have sufficient control, transparency, and trust over Google's use of their **Search Content** - defined in the notice as publisher content collected through Googlebot or any Google crawler fulfilling the function of crawling open web content for Google's general search - to enable them to make properly informed and meaningful decisions about whether and how they interact with Google in respect of its general search services.\n\nSeparately, Google told the CMA it expected to launch aspects of the new search generative AI features control in June 2026. According to the final decision document, Google's announcement in March 2026 - that it was developing updates to its controls to let publishers specifically opt out of generative AI features in Search - indicated that the onerousness of implementing controls required by the Publisher Conduct Requirement was unlikely to be high.\n\nThe compliance reporting structure, set out in the Notice under section 84(3) of the Act, is built around three distinct reporting periods. The first covers 3 June 2026 to 3 December 2026, with a report due by 3 January 2027. The second covers 4 December 2026 to 3 June 2027, with a report due by 3 July 2027. From 4 June 2027 onward, Google must submit annual reports due within one month of the end of each 12-month period. The schedule repeats annually for as long as the Publisher Conduct Requirement remains in effect.\n\nEach report must be submitted by a **Nominated Officer** - a specific individual appointed by Google whose identity must be notified to the CMA within the first month of receiving today's notice. The Nominated Officer is responsible for monitoring Google's compliance with its digital markets requirements and securing that Google complies with respective compliance reporting requirements. Reports must be submitted via email to searchsms@cma.gov.uk.\n\nA US federal judge dismissed a separate publisher antitrust case on 20 March 2026 - the Helena World Chronicle case - finding the plaintiffs lacked standing to bring the claims they advanced. However, the court did not rule on whether the use of publisher content for AI training constitutes a distinct anticompetitive act, leaving that legal theory unexplored.\n\n**14 January 2025**-CMA launches the first strategic market status investigation under the Digital Markets, Competition and Consumers Act 2024, examining Google Search**30 June 2025**-Independent Publishers Alliance, Movement for an Open Web, and Foxglove file formal antitrust complaints with the EC and CMA over AI Overviews; publishers report traffic declines of 34.5 percent or more when AI Overviews appear**12 September 2025**-Penske Media Corporation files 101-page antitrust lawsuit against Google in Washington DC, alleging systematic coercion of publishers into providing content for AI systems**30 September 2025**-CMA officially designates Google as having Strategic Market Status in general search services, the first SMS determination under the 2024 Act**10 October 2025**-Google publishes formal response warning UK rules could slow innovation; Oliver Bethell notes Google Search contributed £118 billion in UK economic activity in 2023**11 October 2025**-Publishers\
  \ confront Google over its all-or-nothing AI feature opt-out model**9 December 2025**-European Commission opens formal antitrust investigation into Google's AI content practices**28 January 2026**-CMA publishes proposed Publisher Conduct Requirement for public consultation;Google announces on the same day it is exploring opt-out controls for AI search features**11 February 2026**-A senior Google executive at the FT Strategies conference describes building publisher opt-out controls as a \"huge engineering project\"**4 February 2026**-Ahrefs publishes research finding AI Overviews correlate with a 58 percent reduction in click-through rates for top-ranking pages, based on 300,000 keywords**18 March 2026**- Google publishes formal response to the CMA consultation, confirming it is developing specific opt-out controls for search generative AI features**20 March 2026**-US federal judge dismisses the Helena World Chronicle newspaper antitrust case against Google with prejudice**26 April 2026**-Study finds blocking AI crawlers cost news publishers an average of 7 percent of their traffic**29 April 2026**-Australia introduces the News Bargaining Incentive, proposing a 2.25 percent revenue levy on large digital platforms that do not enter deals with news publishers**19 May 2026**-Google AI Mode surpasses one billion monthly active users globally; Google I/O 2026 introduces Gemini 3.5 Flash, background information agents, and Personal Intelligence across nearly 200 countries**27 May 2026**-Google extends Preferred Sources into AI Overviews and AI Mode, creating a mechanism that rewards publishers with established audiences**3 June 2026**- CMA imposes the Publisher Conduct Requirement on Google under section 19(1) of the Digital Markets, Competition and Consumers Act 2024;Google simultaneously launches dedicated Search Generative AI performance reports in Search Console**3 December 2026**- Main control obligations come into force (six months from today)**3 March 2027**- Page-level grounding controls come into force (nine months from today)**3 January 2027**- First compliance report due to the CMA**10 October 2030**- Designation period ends; Publisher Conduct Requirement expires unless extended\n\n**Who:** The Competition and Markets Authority, acting under the Digital Markets, Competition and Consumers Act 2024, imposed a conduct requirement on Google. The requirement affects all publishers - defined as any party that makes content available on the web - whose Search Content is used in generative AI features shown to users located in the UK. Google must appoint a Nominated Officer within one month and submit an implementation plan within the same timeframe.\n\n**When:** The CMA issued the notice on 3 June 2026. Main control obligations come into force on 3 December 2026. Page-level grounding controls follow on 3 March 2027. The first compliance report is due by 3 January 2027. Annual reporting follows thereafter. The requirement runs until 10 October 2030.\n</source>\n\n---\n\n<source>\n**URL:** https://assets.publishing.service.gov.uk/media/6a1ec73a59fb7a60f827f64e/Publisher_CR_Notice.pdf  \n**Source:** [full]\n\n---\nurl: https://assets.publishing.service.gov.uk/media/6a1ec73a59fb7a60f827f64e/Publisher_CR_Notice.pdf\n---\n \n \n \n \n1 \nNOTICE UNDER SECTION 19(1) OF THE DIGITAL MARKETS, \nCOMPETITION AND CONSUMERS ACT 2024 (THE ACT) \nOn 10 October 2025, the Competition and Markets Authority (CMA) published its decision \nto designate Google as having strategic market status (SMS) in respect of general search \nservices.1 The CMA hereby gives notice under section 19(1) of the Act that it is imposing a \nconduct requirement (the Publisher Conduct Requirement) on Google relating to its \ngeneral search services.  \nThis Notice sets out the matters in respect of the Publisher Conduct Requirement required \nby section 21 of the Act. \nThe Publisher Conduct Requirement  \nDefinitions \n \n1. For the purposes of this conduct requirement: \n\
  a. broader generative AI services means Google’s generative AI-\ndependent products and services offered outside of general search, such \nas Gemini AI Assistant and the Vertex AI API, and the models used to \ngenerate responses in them.  \nb. Explanatory Information means information provided by Google to \npublishers that is clear, comprehensible and presented in a user-friendly \nformat as far as possible, to assist publishers in making decisions about \nwhether to exercise the controls described in paragraph 3. \nc. general search has the meaning given to it in the SMS Decision Notice \ndated 10 October 2025, as revised from time to time. \nd. generative AI services and features means Google's search generative \nAI features and broader generative AI services, together. \ne. publisher means any party that makes content available on the web. \nf. Search Content means publisher content collected through Googlebot or \nany Google crawler fulfilling the function of crawling open web content for \nGoogle’s general search.  \ng. search generative AI features means Google’s generative AI-dependent \nfeatures offered within general search, such as AI Overviews and AI Mode, \nand the models used to generate responses in them. \n \n \n1 See the SMS Decision Notice for the descriptions of the designated undertaking and relevant digital activity. \n\n\n \n \n \n \n2 \nScope \n \n2. The obligations in paragraphs 3 to 8 shall apply in relation to the outputs of all \ngenerative AI services and features shown to any natural or legal persons located \nin the UK.    \n \nControls \n \n3. Google shall provide publishers with effective controls to withhold their Search \nContent from being used in generative AI services and features. Such controls \nshall cover the training and grounding of: \na. its broader generative AI services; and  \nb. its search generative AI features.  \n \n4. Google shall ensure that the controls described in paragraph 3.b. enable \npublishers effectively and efficiently to withhold their Search Content from being \nused in the grounding of search generative AI features at: \na. directory-level; and  \nb. page-level.  \n \n5. In relation to the controls described in paragraph 3, Google: \na. shall ensure that those controls evolve in an appropriate way as Google’s \ngenerative AI services and features evolve; and \nb. shall not attempt to circumvent any publisher’s choice to withhold its \nSearch Content by acquiring that Search Content through other sources. \n \nTransparency \n \n6. Google shall publish Explanatory Information on: \na. how Search Content is used for the training and grounding of its generative \nAI services and features; and \nb. the effect and scope of the controls described in paragraph 3. \n \n7. Google shall provide publishers with clear and detailed metrics on user \nengagement with their Search Content where it is used in its search generative AI \nfeatures. \n \nAttribution \n \n8. Google shall:  \na. take reasonable steps to ensure that Search Content in search generative \nAI features is attributed clearly, accurately, and that end users are provided \nwith a clear means to access that Search Content, taking account of the \nneed for such attribution to also reflect broader end-user experience, \ndesign aesthetics and source diversity; and \nb. publish Explanatory Information explaining the steps it takes to:  \ni. meet the requirement set out in paragraph 8.a.; and  \nii. ensure and measure the factuality of search generative AI features.  \n \n \n \n \n\n\n \n \n \n \n3 \nAnti-retaliation \n \n9. Google shall not seek to prevent publishers from, or penalise them for, using the \ncontrols described in paragraph 3, for example by downranking their Search \nContent, or otherwise disadvantaging them, relative to opted-in Search Content, \nin general search outside of search generative AI features.  \n \n \n1. \nThe Interpretative Notes accompanying this Notice provide information about the\
  \ \nCMA’s interpretation of the Publisher Conduct Requirement. It is open to Google \nto take a different approach where it is able to demonstrate to the CMA that its \napproach complies with the terms of the Publisher Conduct Requirement. \nThe CMA’s reasons for imposing the Publisher Conduct Requirement \n2. \nThe reasons for the CMA’s decision to impose the Publisher Conduct Requirement \nare set out in the Publisher CR Final Decision, a non-confidential version of which \nis available via the CR page. \nStatutory objectives  \n3. \nThe CMA considers it proportionate to impose the Publisher Conduct Requirement \nfor the purposes of the fair dealing objective and the trust and transparency \nobjective in sections 19(6) and 19(8) of the Act. \nPermitted types \n4. \nThe Publisher Conduct Requirement is for the purpose of: \n(a) \nsection 20(3)(d) of the Act: preventing Google from requiring or incentivising \npublishers to use its generative AI services and features alongside its \ntraditional search engine (Google Search) – see paragraphs 3 to 5 and 9 of \nthe Publisher Conduct Requirement; \n(b) \nsection 20(2)(c) of the Act: obliging Google to provide clear, relevant, \naccurate and accessible information to publishers about general search \nservices: in particular, how their content, collected for the purpose of general \nsearch, is used, attributed and engaged with – see paragraphs 6 to 8 of the \nPublisher Conduct Requirement; and   \n(c) \nsection 20(2)(e) of the Act: obliging Google to present to publishers any \noptions or default settings in relation to general search services in a way that \nallows publishers to make informed and effective decisions in their own best \ninterests about those options or settings – see paragraph 6 of the Publisher \nConduct Requirement.  \n\n\n \n \n \n \n4 \nBenefits of imposing the Publisher Conduct Requirement \n5. \nThe benefits that the CMA considers would likely result from the Publisher \nConduct Requirement are set out in the Publisher CR Final Decision, a non-\nconfidential version of which is available via the CR page. \nImplementation and term of the Publisher Conduct Requirement \n6. \nThe Publisher Conduct Requirement will come into force six months after the date \nof this Notice, with the exception of paragraph 4.b. of the Publisher Conduct \nRequirement, which will come into force nine months after the date of this Notice.  \n7. \nAs set out in the SMS Decision Notice, the last day of the designation period for \nthe designation to which the Publisher Conduct Requirement relates is 10 October \n2030, subject to the provisions in the Act for extension of that period and \nrevocation of the SMS designation. \n8. \nThis Notice shall continue in force until 10 October 2030 or until such time as it is \nvaried under section 19(2) of the Act or revoked under section 22(2) of the Act. \nAny variation or revocation shall not affect the validity or enforceability of any \nrights or obligations that arose prior to such variation or revocation. \n9. \nUnder section 17 of the Act, where the CMA decides, as a result of a further SMS \ninvestigation under section 10 of the Act, to revoke Google’s SMS designation in \nrespect of general search services, the CMA may make transitional, transitory or \nsaving provision in respect of the Publisher Conduct Requirement. Where the \nCMA decides to designate Google again as having SMS in respect of general \nsearch services, or to designate Google as having SMS in respect of a digital \nactivity that the CMA considers to be similar or connected to general search \nservices (whether instead of, or in addition to, general search services), the CMA \nmay apply the Publisher Conduct Requirement to Google in respect of the new \ndesignation, with or without modification, and make transitional, transitory or \nsaving provision in respect of the Publisher Conduct Requirement. \n10. \nUnder section 25 of the Act, the CMA must keep under review: (a)\
  \ whether to vary \nor revoke the Publisher Conduct Requirement; (b) the extent to which Google is \ncomplying with the Publisher Conduct Requirement; (c) the effectiveness of the \nPublisher Conduct Requirement; and (d) whether to take enforcement action in \nrespect of any breaches or suspected breaches of the Publisher Conduct \nRequirement.  \n11. \nGoogle is required to provide the CMA with periodic compliance reports in relation \nto the requirements set out in this Notice. Details of those requirements are set out \nin the Publisher CR Compliance Reporting Notice published on the same date as \nthis Notice. \n\n\n \n \n \n \n5 \nHow the Publisher Conduct Requirement interacts with other conduct \nrequirements imposed on Google \n12. \nAs this is the first conduct requirement imposed on Google by the CMA, there are \nno interactions with other conduct requirements.  \n \nCompetition and Markets Authority \n3 June 2026 \n \n\n</source>\n\n---\n\n<source>\n**URL:** https://papers.ssrn.com/sol3/Delivery.cfm/6304680.pdf?abstractid=6304680&mirid=1  \n**Source:** [snippet/paywall]\n\nUK (Digital Markets, Competition and Consumers Act) and Germany (section 19a of the ... 6 CMA, 'Proposed Conduct Requirement: Publisher Conduct Requirement' ( ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement?ref=ppc.land  \n**Source:** [full]\n\n---\ntitle: Google search publisher conduct requirement\nurl: https://www.gov.uk/find-digital-markets-measures/google-search-publisher-conduct-requirement\ndescription: The Competition and Markets Authority (CMA) has imposed a conduct requirement on Google, in relation to its general search services.\nsitename: GOV.UK\ndate: 2026-06-03\nlicense: Open Government Licence v3.0\n---\n# Google search publisher conduct requirement\n\nThe Competition and Markets Authority (CMA) has imposed a conduct requirement on Google, in relation to its general search services.\n\n## Imposition of conduct requirement\n\n3 June 2026: Following the CMA’s decision to designate Google as having strategic market status in respect of general search services and public consultation on proposed conduct requirements, the CMA has imposed the publisher conduct requirement (the publisher CR) on Google.\n\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n- (3.6.26)\n\nThe publisher CR requires Google to:\n\n- provide publishers with effective controls over the use of their search content in generative AI\n- publish clear, comprehensible and user-friendly information explaining how publishers’ search content is used by Google in its generative AI\n- provide publishers with clear and detailed metrics on user engagement with their search content in search generative AI features\n- take reasonable steps to ensure that search content is attributed clearly and accurately in general search, and that end users have a clear means to access that search content\n- publish clear, comprehensible and user-friendly information explaining its approach to attribution\n\nOur guide to the UK’s digital markets competition regime explains how conduct requirements work.\n</source>"
key_facts:
- On 3 June 2026 the CMA imposed a requirement on Google giving publishers effective controls to withhold their content from being used in its generative AI search features and services
- Google must not penalise publishers for using the controls, for example by downranking their content relative to opted-in content
secondary_facts:
- It is a conduct requirement under the Digital Markets, Competition and Consumers Act 2024, resting on the CMA's October 2025 decision designating Google as having Strategic Market Status, with withholding controls at both directory and page level
