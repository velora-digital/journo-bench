  Raid Evolénard FMV - XCM Schweizermeisterschaften/Championnats suisses\nEvolène\n, CH\n2026 in Switzerland · 529 events\n✕\nCycling\nroad\nRide the Alps Sanetsch 2026\nFRI, June 19, 2026 ·\nSion\n,\nSwitzerland\nDistances\n28 km\nAbout this race\nThe Ride the Alps Sanetsch features three mythical ascents. This legendary Sportive is a highlight for cyclists.\n© Mapbox · © OpenStreetMap\nSion\nSion\nDriving directions\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/groups/bicycletravellers/posts/950580035650783/  \n**Source:** [snippet/paywall]\n\n3-day biketrip through the suisse alps with Oberalppass 2.044 m and Furkapass 2.429 m \U0001F3DE️⛰️\U0001F3D4️ 330 km - 4050 meters of altitude route: Rheinradweg: Kreuzlingen / ...\n</source>\n\n---\n\n<source>\n**URL:** https://ridethealps.ch/en/sanetsch/  \n**Source:** [full]\n\n---\ntitle: SANETSCH\nurl: https://ridethealps.ch/en/sanetsch/\nsitename: ridethealps.ch\ndate: 2024-03-01\n---\n## SANETSCH\n\n## FRIDAY, JUNE 26, 2026\n\n**This is one of the most beautiful and demanding climbs in the Valais. With a start on the Rhone plain and a summit at over 2200 metres, the difference in altitude inspires respect!**\n\nWith a total vertical drop of almost 1,800 meters, the Col du Sanetsch route is undoubtedly the most demanding ascent to be found in the Valais. From the plain, you first pass through the vineyards of the Savièse commune, then through the larch and spruce forests of the Conthey commune, before emerging onto alpine pastures and finally finding yourself facing the magnificent Tsanfleuron glacier. At every twist and turn, the pass road is full of surprises - rocky cliffs, waterfalls, snow-covered peaks - and reveals more sumptuous landscapes than the last. Gradually, you enter narrow, shady gorges lined with refreshingly fragrant forests. After a few short, welcome refreshments, the climb picks up again, giving you a glimpse of the distant Rhone plain. A few hairpin bends and the passage past a waterfall gradually lead the cyclist into an environment of alpine meadows. A passage through a tunnel cut into the rock finally brings the bold face to face with the Tsanfleuron glacier.\n\n## Altitude\n\n## 2253M\n\n## Vertical rise\n\n## 1800mD+ (1,800ft)\n\n## Distance\n\n## 28Km\n\n## Closing\n\n## 9am-3pm\n\nThe roads are reserved exclusively for cyclists from the Pécolet recycling center in Savièse (Chandolin) to the summit of the Col du Sanetsch.\n\n**Access from (Place du Scex Sion) :**\n\n- The Sion train station is located in the immediate vicinity of the Welcome Village. Access by public transport and/or bicycle is recommended.\n- The Scex, Roches-Brunes and Planta parking lots are in the immediate vicinity of the Village d'Accueil.\n\n\nGreat Deals:\n\nSanetsch Restaurant OPEN(2 km from the summit)Tacave Restaurant at the Sanetsch Dam OPEN(4 km past the summit, toward the Gsteig cable car)Café-Restaurant Le ZanfleuronOPEN (10km from summit)\n\n- Restaurant Plan-Cernet OPEN (12km from summit)\nlocation - Refreshments available 7 km from the summit, provided by\n[FOCUSWATER](https://focuswater.ch/fr/)and[Alpiq](https://www.alpiq.com/fr/)\n\n\nAccommodations:\n\nMoxy[Sion Campground](https://camping.tcs.ch/fr/campings/tcs-camping-sion/)[Holiday Inn](https://www.ihg.com/holidayinnexpress/hotels/fr/fr/sion/sirso/hoteldetail): 15% off—see the offer\n\n\nArea information :\n\n- Sion Tourisme :\nsiontourisme.ch - Savièse Tourism:\nsaviese-tourisme.ch - Conthey Tourism:\nlescoteauxdusoleil.ch\n</source>\n\n---\n\n<source>\n**URL:** https://climbfinder.com/us/climbs/col-du-sanetsch  \n**Source:** [full]\n\n---\ntitle: Col du Sanetsch - Profile of the ascent\nurl: https://climbfinder.com/us/climbs/col-du-sanetsch\ndescription: Col du Sanetsch is a climb in the region Valais. It is 16 mi long and bridges 5965 ft of vertical ascent with an average gradient of 7.1%, resulting in a diffic\nsitename: Climbfinder\ndate: 2020-01-01\n---\n| Beautiful scenery |\n| 18 hairpin\
  \ turns |\n| #63 toughest climb of\n|\n\nCol du Sanetsch is a climb in the region Valais. It is 16 mi long and bridges 5965 ft of vertical ascent with an average gradient of 7.1%, resulting in a difficulty score of 1500. The top of the ascent is located at 7372 ft above sea level. Climbfinder users shared 18 reviews of this climb and uploaded 56 photos.\n\nRoad names: Route dè Couteau, Route de Savièse, Route de Zampillon, Route de Belvédere & Route du Sanetsch\n\nCol du Sanetsch....let me tell you straight away: you need to prepare yourself physically and mentally because it's extremely tough and extremely long.\n\nA must!!!\n\nCol du Sanetsch....autant vous le dire de suite : Il faut vous préparer physiquement et mentalement car c'est hyper dur et hyper long.\n\nUN must!!!\n\n4. Leave early in summer: it can be very, very hot!\n\nStrange pass that continues for two descents and a sign \"Col de Sanetsch 26kms\" when another sign signalled it at 20kms a few hundred metres before...\n\nAprès Sanetsch le revêtement est médiocre avec beaucoup de plaques rajoutées sur la route, et pour lesquelles il faut être attentif lors de la descente.\n\nAn incomparably beautiful climb for cycling. Of particular note is the very large altitude difference, which means you end up from the inhabited and civilised world into grand emptiness. It is a tricky climb due to its irregularity and certainly its length. I struggled to get a good rhythm. On the other hand, there are great views, beautiful forests, an awful lot of flowers and butterflies, gurgling streams and waterfalls, beautiful bridges and exciting tunnels. On a weekday in early July, there is also hardly any traffic.\n\nSuperb ascent, which is the hardest in the whole of the Valais. The landscapes are magnificent and very varied: it starts with vineyards at the foot, then wooded portions where you can get some shade. Then you end up in the high mountains with beautiful high mountain scenery. The road is mostly in good condition and not very busy. Be careful to bring lighting, as the tunnel at the top is not very well lit.\n\n*The tunnel is not very long, and basically the lights work. The road surface is bad (better said: there is no road surface), and your bike will probably end up a bit muddy. Dangerous I think, but slippery it is. And fortunately there is hardly any traffic.\n\nAt the top, be sure to cycle to the reservoir. It is another 200 meters down, but even if you turn around it is definitely worth it. Many more beautiful roads you will not get in Switzerland. And it is possible to take the elevator to Gsteig. Also a drink / cake at the elevator and the lake is an option.\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/groups/115024628543289/posts/8909793109066353/  \n**Source:** [snippet/paywall]\n\nRegistration is required for some of them June Ride the alps Moosalp 06.06. Ride the Alps Sanetsch 11.06. Dolomites Bike day (Campolongopass ...\n</source>\n\n---\n\n<source>\n**URL:** https://ridethealps.ch/en/moiry/  \n**Source:** [full]\n\n---\ntitle: MOIRY\nurl: https://ridethealps.ch/en/moiry/\nsitename: ridethealps.ch\ndate: 2024-03-01\n---\n## MOIRY\n\n## SATURDAY, JUNE 27, 2026\n\nTake part in an ascent to the Moiry dam via Vercorin and Pinsec, with views of the Matterhorn and Dent Blanche in the background.\n\nYour ascent begins in Chippis, a small village on the plains, on the banks of the Rhône. A small road takes you to Brie, passing close to the Ricard bisse, then rises for a few kilometers above Sierre, before joining the main road to the resort of Vercorin. The route then skirts cliffs and passes through galleries cut into the rock, allowing you to admire the Val d'Anniviers stretching out below you. At Vercorin, the route heads towards Pinsec and then descends for several kilometers, passing through the typical hamlets of Mayoux and Saint-Jean. As you start to climb again, the backdrop to your ascent is the Matterhorn and the Dent Blanche, and the road\
  \ is wide and rolling on the first part. From the picturesque village of Grimentz onwards, the effort becomes more substantial, with a steep gradient for five to six kilometers, before a brief flat and two demanding final kilometers to the Moiry dam. The finish at 2250 meters altitude is located near the crown of the dam overlooking the lake.\n\nFor those wishing to reduce the effort, a start will be possible from the magnificent village of Vercorin at the Place du télécabine from 10:00 am. This means that the distance to the Moiry dam will be just 22km, with 1240m of ascent.\n\nThe passage through Vercorin will also provide a welcome break for participants departing from Sion.\n\n**For your safety, we recommend that you take the same route back down to the valley**\n\nRoad Closure Schedule:\n\n- Chippis - Briey section: 09:00 - 13:00\n- Briey–Vercorin–Briey section: 9:30 a.m. – 1:00 p.m.\n- Vercorin–Ziettes Junction: 10:00 a.m. to 3:00 p.m.\n- Section Bif. Ziettes - Mayoux : 10h00 - 15h00\n- Mayoux - Grimentz section (village entrance): 10:30 am - 2:00 pm\n- Traffic in Grimentz village authorized with access from Ayer and Zinal\n- Grimentz section (village exit) - Barrage de Moiry: 11:00 am - 3:00 pm\n- Mail bus service Grimentz / Barrage de Moiry\n\n## Altitude\n\n## 2250M\n\n## Vertical rise\n\n## 2,100 m elevation gain from Sion1,240 m elevation gain from Vercorin\n\n## Distance\n\n## 49 km from Sion22 km from Vercorin\n\n## Closing\n\n## 9am-3pm\n\n**Access from (Place du Scex, Sion from 9:00 am)**:\n\n- The Sion train station is located in the immediate vicinity of the Welcome Village. Access by public transport and/or bicycle is recommended.\n- The Scex, Roches-Brunes and Planta parking lots are in the immediate vicinity of the Village d'Accueil.\n\nAccess from (Place du Télécabine, Vercorin from 10:00 am):\n\n- The Place du Télécabine is located in the center of the village and can be reached on foot or by bike from the Chalais-Vercorin cable car.\n- The Télécabine parking lot is right next to the Welcome Village.\n\n\nGood plans:\n\nRestaurant Lac de Moiry Clems & Fabs- Refreshment stations in Vercorin and Grimentz provided by\n[FOCUSWATER](https://focuswater.ch/fr/)and[Alpiq](https://www.alpiq.com/fr/)\n\n\nRecommended accommodations **:**\n\nMoxy[Sion Campground](https://camping.tcs.ch/fr/campings/tcs-camping-sion/)[Holiday Inn](https://www.ihg.com/holidayinnexpress/hotels/fr/fr/sion/sirso/hoteldetail): 15% off—see the offerVictoria Retreat & Spa — Vercorin[Swiss Peak Resorts — Zinal](https://www.swisspeakresorts.com/fr/zinal/discover/discover-zinal-279)and Vercorin**(10% discount)**\n\n**Area information**:\n</source>\n\n---\n\n<source>\n**URL:** https://www.pinkbike.com/news/switzerland-mountain-biking-part-four-becs-de-bessonval-dherens-2015.html  \n**Source:** [full]\n\n---\ntitle: Switzerland Mountain Biking: Part Four - Becs de Besson/Val d'Herens - Pinkbike\nurl: https://www.pinkbike.com/news/switzerland-mountain-biking-part-four-becs-de-bessonval-dherens-2015.html\ndescription: In part four of Switzerland mountain biking, Lee and friends travel from Anniviers to Val d'Herens over high alpine to stay at Becs de Bessons before descending down some incredible trails to the town of Sion and on to their next stop of Crans Montana.\nsitename: Pinkbike\ndate: 2015-03-22\n---\nDay One - Simplon Pass | Day Two - Planetenweg - Zinal | Day Three - Illsee-Parilet | Day Four & Five - Becs de Besson/Val d'Herens | Day Six & Seven - Crans Montana\n\nThe climb from Moiry to Becs de BessonHärdöpfustock - Our first three days saw us explore\n\nVal d'Anniviers. This next leg will see us cross from one valley to another; from Anniviers to\n\nVal d'Herens. However, it won't be by the ubiquitous Swiss yellow Post-Bus or by train or by tram. This route crosses high alpine climbing from 2250m starting at Switzerland's biggest lake\n\n[Lac de Moiry](http://de.wikipedia.org/wiki/Lac_de_Moiry). The ultimate goal of today's leg is to get\
  \ to the\n\nBecs de Bessons cabin at 2985m where we will stay overnight before descending again to valley floor. Joining us on our day 4 and 5 of our trip led by Martin of\n\nAlpine Trails is Alex Boyce of\n\n[MTB-Mag International](http://www.mtb-mag.com/en) who secretly loves bib shorts.\n\nThe goal is to present us with the Swiss soft-core wilderness experience.\n\nBikepacking in Canada usually involves sleeping in ditches under a tarp and carrying anything on my back including all my overnight gear. Even Swiss overnighters are relatively civilized as Cabane Becs is well-appointed with beds, a heated cabin, food, beer and civilized facilities.\n\n\n*We take the PostAuto bus to Moiry Lake from Vissoie. The climb is mostly road of a good grade, the weather was cool at this elevation but was promising**The Moiry glacier was watching us as we climbed **Bit of singletrack to descend from the col at Sax du Miranda before we go back up*\n\nAs with all things Swiss there is a Post-Bus assist. We begrudgingly leave\n\n[Hotel Bella Tolla](http://www.bellatola.ch/en/) at St Luc and coast down the road to Vissoie on our bikes where we catch a bus which takes us up Val D'Anniviers towards Grimentz eventually pulling into Lac Moiry where we disembark and, of course, have coffee at a nice restaurant. Tres Bien. We start the climb much of which overlaps with the same route as the\n\n[Raid Grand Cristalp](http://www.grand-raid.ch/index-en.html) marathon XC (that's the Euro code word for dirt-roadie stuff your spandex with shorts type boring race) course. Much of the climb is very scenic but is, in and of itself, pretty boring double track and road. The climb can be done in fpur hours at a slack taking pictures pace. A moderately fast pace would get one to Becs de Besson in three hours or so with day packs. Since we were planning to stay overnight there we took our time waiting out some rain squalls and chilling in the alpine views. Some of us even passed out from oxygen deprivation hike-a-biking certain sections.\n\n\n*Bit of pushing. This is at 2600m. Then we are at the second pass (Pass Lona) at 2787m where the Grand Raid breaks off the track and descends**Amazing views surround; this of the Weisshorn back behind us in Val d'Anniviers wreathed in clouds. Singaporeans drop in to a small descent before starting the last push to the cabin. Photo by Martin Buetler**Mus and Shafudin's reaction when they saw they had to go down, before the last push up! Come on guys just a short 300m ramble straight up!*\n\nWhere to StayFrom Moiry our stats for today are 13.8km, 5hrs, 1000m Climbing, 260m Descending. We ascend to to 2985m finishing at the\n\nCabin Becs De Bosson. This cabin has been in this spot for many years, but has been run by a new family since 2010. They have made it more welcoming to hikers and bikers by having sleeping areas for 62 people in dorms with duvets that sleep 4, 8, 10, 12 or 16 people. You can spend part of the day, evening or night. They will feed you, you can buy beer and hang out at a cool mountain hut. It seems Becs de Besson is most popular in the winter for ski touring since the terrain looks amazing from all sides! But there are no trees at this elevation so watch that weather if you want any sort of visibility.\n\n*Cabin Becs de Bosson 2985m and what a view*\n\nThe descent to Sion in the Val d'HerensOne of the draws of spending a night in the alpine are stars in every direction. The weather gods that were blessing us with great weather for the past few days are having a laugh though and the temperatures and visibility drop for the night. The Singaporeans who live at the equator are thoroughly unimpressed but thankfully we wake to a nice sunrise to the east but with rain in every other direction. Guess there is no rush. Sleeping in the cabin was very comfortable and this time of year, sunrise is your alarm. We chilled in the cabin, had some breakfast and waited for the clouds to break before venturing out.\n\nDressed in\
  \ all our warm gear, at about the crack of 10am (man we are procrastinators) we figure it's time to drop down the\n\n[Val d'Herens](http://www.myswitzerland.com/en-ca/val-d-herens.html) to the town of Sion in valley bottom. Herens is actually the name of a glacier that's now gone. It's retreat left a standard N-S oriented Valaisian valley surrounded by your standard 3 - 4000m majestic peaks and glaciers looking down on pastures filled with cows, goats and the odd farmer. Like its neighbouring valleys innumerable charming villages are at the valley bottom.\n\n[Five ski resorts](http://www.valdherens-tourisme.ch/tourism/snowboard-telemark.html) are located there but all are smaller than its Anniviers neighbour of St Luc-Chandolin which is why perhaps Val D'Herens is lesser known; although in my mind, just as beautiful.\n\n\n\n*Grey early skies made for a moody morning**Off we go to traverse the ridge**Alpine-trails.ch having a small moment in very big peaks. We continue across the high peaks**Not balking at the sharp rocks Mus rides**The ridge draws you on**Alex carves the slopes**More alpine ridgeline than you can shake a stick at**Another look at me and how small I am moment*\n\nThe weather gods were with us on the descent and conditions improved the whole way down. Picking our way down through singletrack from heaven descending through meandering alpine meadows and traversing ridgelines is the stuff of which dreams are made. Looking back this still seems like an experience from another world - riding down through endless technical singletrack while surrounded by Swiss glaciers and ending with pretty decent treeline trails. The last bit of downhill eventually took us to valley bottom at 700m where we then had the rude awakening of climbing back another 300m to the main road to Sion. Another lunch at a charming Valais village at Vex ensued. We then transferred via SBB train from Sion to Sierre where we took the funicular to our next stop at Crans Montana. Our stats were 30km in 6:40, 340m Climbing, 2238m Descending (gotta like those stats). Another typische Schweiz day.\n\nAs a sidenote it actually snowed pretty heavily the next day so we did get lucky with the weather. We also lollygagged the climb and the descent. The two day trip could quite easily be compressed to one day over a six to eight hour day even with photo breaks. Of course that would chip greatly into chilling in the alpine flowers time so that's just food for thought.\n\n\n*The trails twist to the towns* *Now quite a bit lower we're dropping down through pastures through a sandy stretch of carved up hoodoo spires**Alex through the rock and sand**Back to the comfort of valley floor.*\n\n*We wish to thank *Tourism Switzerland, Valais Tourism, Brig Simplon Tourism, Sierre Anniviers, and [Crans Montana](http://www.crans-montana.ch/ete/en/) for their support.\n\n\nUseful Links\n\n\nMountain Biking Switzerland - Graubunden and Zermatt (5 parts on pinkbike)\n\nMountain Biking Switzerland - Grindlewald/Jungfrau and the Eastern Valais (4 parts on Pinkbike)\n\n[SBB](http://www.sbb.ch/en/home.html) - Swiss Transit System\n\nAlpine-Trails - Recommended guides\n\nSwiss topo maps\n\nGeneral tips and tricks\n\n[Tourism Switzerland](http://www.myswitzerland.com/en/home.html)\n\n[Tourism Valais](http://www.valais.ch/en/home)\n\n[GraubundenBike](http://en.graubuenden.ch/mountainbiking-switzerland.html)\n\n[Edelweiss Air](http://www.edelweissair.ch/en/destinations/map/?country=CA) - (direct from Vancouver and many other west coast cities to Zurich)Part OnePart TwoPart ThreeKeep a look out for the final part, coming next Sunday.\n\n*MENTIONS:* @leelau @Alpine-Trails-Switzerland\n</source>\n\n---\n\n<source>\n**URL:** https://ridethealps.ch/en/tseuzier/  \n**Source:** [full]\n\n---\ntitle: TSEUZIER\nurl: https://ridethealps.ch/en/tseuzier/\nsitename: ridethealps.ch\ndate: 2024-03-01\n---\nThe ascent to the Tseuzier dam, which rises to an altitude of 1777 metres, begins in Sion and is\
  \ almost 25 kilometers long. From the vineyards of the central Valais to the Lac du Tseuzier, this route offers breathtaking panoramic views at every turn. All along the way, the route is signposted.\n\nThe first few kilometers wind through vineyards to reach the combe de Voos, gradually rising above the plain to the village of Botyre. The road then climbs up the Liène on a sometimes steep slope through the forest, allowing you to admire the view of the highest peaks above the opposite side of the Rhône valley. The climb continues with a few hairpin bends up to Lac du Tseuzier, in which the surrounding peaks are reflected.\n\nWe use cookies to guarantee you the best possible experience on our website. If you continue to use this site, we will assume that you are happy with it.OK\n</source>\n\n---\n\n<source>\n**URL:** https://climbfinder.com/en/climbs/la-montau-ardon  \n**Source:** [full]\n\n---\ntitle: La Montau from Ardon - Profile of the ascent\nurl: https://climbfinder.com/en/climbs/la-montau-ardon\ndescription: La Montau from Ardon is a climb in the region Valais. It is 2.3 km long and bridges 417 m of vertical ascent with an average gradient of 17.8%, resulting in a d\nsitename: Climbfinder\ndate: 2026-01-01\n---\nLa Montau from Ardon is a climb in the region Valais. It is 2.3 km long and bridges 417 m of vertical ascent with an average gradient of 17.8%, resulting in a difficulty score of 818. The top of the ascent is located at 907 m above sea level. Climbfinder users shared 0 reviews of this climb and uploaded 2 photos.\n\nRoad names: Route de la vallée & Route de la Vallée\n\nWelcome! Please activate your account if you would like to share something. Look for the verification email in your inbox.\n\nIf you want to upload your photos, you need to create an account. It only takes 1 minute and it's completely free.\n\n| 7 km/h | 00:20:01 |\n| 11 km/h | 00:12:44 |\n| 15 km/h | 00:09:20 |\n| 19 km/h | 00:07:22 |\n\nThis page is better in the app\n</source>\n\n---\n\n<source>\n**URL:** https://www.cycling-challenge.com/ride-the-alps-vaudoise/  \n**Source:** [full]\n\n---\ntitle: “Ride the Alps Vaudoises”\nurl: https://www.cycling-challenge.com/ride-the-alps-vaudoise/\ndescription: “Ride the Alps” is a series of non-competitive bike days in Switzerland sponsored by Switzerland Tourism and a sporting goods company. Yesterday I attended the “Ride the Alps Vaud…\nsitename: My Cycling Challenge\ndate: 2019-06-30\n---\n“Ride the Alps” is a series of non-competitive bike days in Switzerland sponsored by Switzerland Tourism and a sporting goods company. Yesterday I attended the “Ride the Alps Vaudoises” day (Vaud is a canton is the western, French-speaking part of Switzerland). See [here](https://www.myswitzerland.com/en/experiences/summer-autumn/bicycle-mountain-bike/ride-the-alps/inscription-ride-the-alps-event/) for more of their upcoming events.\n\nThe route was a short but scenic 47 kilometre loop reeking of Alain’s local knowledge: tiny paved roads, three cols, avoiding traffic, and beautiful Swiss views. I had never ridden the featured climb: Col de la Pierre de Möelle (1657m), so I was excited to visit.\n\nGiven the current heat-wave, I decided an early 7:30am start would make sense. I had the great fortune to bump into an old friend, Alain Rumpf, who had designed the route. In fact we would ride most of it together. Unexpected fun.\n\nA Swiss With A Pulse is Alain’s cycling focused web site.\n\nSee here for a brilliant loop from Aigle that climbs to and rides alongside Lac de l’Hongrin.\n\nAlain is a very, very strong cyclist but he cheerful rode my pace (he would ride a second lap later on). Of course, we chatted the entire time. Brainstorming ride ideas, sharing favourite routes, planning future adventures, etc.\n\nAnd of course, stopping to take the occasional photo:\n\nAs we approached the finish, I saw a field full of hay bales. I yelled at Alain to stop. He knows my twitter account and how I enjoy #haysurfing.\n\nHe\
  \ laughed, stopped, and was a VERY good sport and agreed to make his hay surfing debut. Wooohoooo!\n\nAn enjoyable little loop on super quiet Swiss roads with the unexpected bonus of Alain’s company. Excellent.\n\n*Note: As the map profile below shows, we also traversed Col des Mosses (1445m) and climbed past La Forclaz (1261m; a geographic col according to the experts at Club des Cent Cols). *\n</source>\n\n---\n\n<source>\n**URL:** https://www.myswitzerland.com/en/experiences/summer-autumn/bicycle-mountain-bike/ride-the-alps/inscription-ride-the-alps-event/  \n**Source:** [full]\n\n---\ntitle: Client Challenge\nurl: https://www.myswitzerland.com/en/experiences/summer-autumn/bicycle-mountain-bike/ride-the-alps/inscription-ride-the-alps-event/\nhostname: myswitzerland.com\nsitename: myswitzerland.com\n---\nJavaScript is disabled in your browser.\nPlease enable JavaScript to proceed.\nA required part of this site couldn’t load. This may be due to a browser extension, network issues, or browser settings. Please check your connection, disable any ad blockers, or try using a different browser.\n</source>\n\n---\n\n<source>\n**URL:** https://www.cycling-challenge.com/cycle-the-alps-traffic-free-heres-how-2019-edition/  \n**Source:** [full]\n\n---\ntitle: Cycle the Alps Traffic-Free: Here’s How (2019 Edition)\nurl: https://www.cycling-challenge.com/cycle-the-alps-traffic-free-heres-how-2019-edition/\ndescription: Many of the most famous climbs in the Alps have days when they are closed to motor traffic, reserved solely for cyclists. Excellent. Here is a 2019 list of almost a hundred “Cols Reservés,” car-fre…\nsitename: My Cycling Challenge\ndate: 2019-05-05\n---\n**I’d be grateful for any comments indicating other car-free events.**\n\nLet’s be clear about these special days:\n\n1) They are NOT cyclosportives or races.\n\n2) For most, there is no need to register, and they are free. Show up, start whenever you want.\n\n3) There is a mix of cyclists of all levels, ages, sizes. Most riding leisurely.\n\n4) The ambiance is great. Everyone is in a good mood.\n\n5) There is usually a free drink and snack stand or two. Perhaps even (minor) entertainment.\n\n6) Usually, it’s surprisingly uncrowded (but then these are big roads).\n\n7) Check details: Usually the roads are only closed in the morning and often only the top half of climbs are closed.\n\n8) There are some Granfondos/Sportives held on closed roads (eg. the Maratona dles Dolomites) but I have excluded these. *This is a list of uncompetitive social rides.*\n\nUse the search bar of my site at the top-right for more details on most of these roads from my rides over the years. Or see the provided links below for the specific event details.\n\n##### FRANCE\n\n**HAUTES-ALPES**\n\nThe Hautes-Alpes department is the clear leader here holding 30 events, many on legendary climbs like Izoard, Agnel, Galibier, Granon, etc. See here for my write up of the 2014 Izoard event to get a feel for one of these great days.\n\nThe [official site for every event is here](http://www.hautes-alpes.net/fr/tourisme/experiences/pleine-nature/velo/cols-reserves-2019.html). I expect them to add more details soon. But note, Montagne de Lure (Mondays) and Col d’Allos (Fridays) run events throughout the summer.\n\n**JUNE**\n\nSun 9th: Col de Pontis\n\nSun 16th: Réallon\n\nSun 23rd: Pré de Madame Carle\n\n**JULY**\n\nWed 3rd: Col du Granon\n\nThur 4th: Col du Galibier\n\nFri 5th: Col d’Izoard\n\nMon 8th: Montagne de Lure\n\nTue 9th: Puy St Vincent\n\nFri 12th: Col d’Allos\n\nMon 15th: Col de Vars / Montagne de Lure\n\nTue 16th: Risoul\n\nFri 19th: Col d’Allos\n\nSun 21st: Col Agnel\n\nMon 22nd: Montagne de Lure\n\nFri 26th: Col d’Allos\n\nMon 29th: Montagne de Lure\n\n**AUGUST**\n\nFri 2nd: Col d’Allos\n\nMon 5th: Pommerol / Montagne de Lure\n\nTue 6th: Chabre\n\nWed 7th: Col du Granon\n\nThu 8th: Col du Galibier / Col du Noyer\n\nFri 9th: Ceüse / Col d’Izoard / Col d’Allos\n\nMon 12th: Montagne de Lure\n\nFri 16th:\
  \ Col d’Allos\n\nMon 19th: Col de Vars / Montagne de Lure\n\nTue 20th: Risoul\n\nThu 22nd: Les Orres\n\nFri 23rd: Col d’Allos\n\nSat 24th: Orcières\n\nFri 30th: Col d’Allos\n\n**SEPTEMBER**\n\nSun 8th: Col Agnel\n\n**OISANS COL SERIES**\n\nEvery Tuesday morning in July and August, the Oisans region – home of **Alpe d’Huez** – will close a climb for a bike-only event. See [here](https://www.bike-oisans.com/evenement/oisans-col-series-alpe-dhuez/) for details. Most are between 9am and noon, but there are details for each ride in the above link. I can especially recommend Col du Sabot, and Col de Sarenne.\n\nJuly 2nd: Cols Glandon / Croix de Fer\n\nJuly 9th: Col de Sarenne\n\nJuly 16th: Oz-en-Oisans\n\nJuly 23rd: Villard Reculas\n\nJuly 30th: Col du Sabot\n\nAug 6th: Alpe d’Huez\n\nAug 13th: Col de Sarenne\n\nAug 20th: Auris-en-Oisans\n\nAug 27th: Col d’Ornon\n\nFor details of above climbs and a few more (great) lesser known ideas in the region see this post: Beyond Alpe d’Huez: The Best Cycling Climbs from Bourg d’Oisans.\n\n##### THE MAURIENNE VALLEY\n\nThe Maurienne Valley is home to perhaps half of the top 20 climbs in France. It is sponsoring a number of events under the Mountain Collection name: See [here](http://www.maurienne-tourisme.com/mountain-collection/).\n\nSee here for my post: The Maurienne Valley – 15 of the Best Climbs in France.\n\nThis is a brilliant list of bike days. If you don’t know Plan du Lac, author Daniel Friebe once called it a candidate for best “unknown” climb above 2000 metres. And above Orelle it’s possible to reach 3000 metres – see here.\n\nJune 23rd: Col de l’Iseran\n\nJune 27th: Lacets de Montvernier -> Col du Chaussy\n\nJuly 1st: Col du Mollard\n\nJuly 2nd: Glandon / Croix de Fer\n\nJuly 6th: Col du Grand Cucheron\n\nJuly 7th: Plan du Lac\n\nJuly 11th: Col du Sapey\n\nJuly 16th: Col du Mont Cenis\n\nJuly 18th: Lac de la Grande Léchère (beside Madeleine)\n\nJuly 28th: Valmeiner (near Télégraphe)\n\nAug 1st: Col de la Madeleine\n\nAug 7th: Valfréjus\n\nAug 8th: Moncenisio (Italy)\n\nAug 11th: Orelle (mountain bike)\n\nAug 14th: Col d’Albanne\n\nAug 29th: Col du Galbier\n\nI’ve done the Iseran bike day a few times with my wife – it’s the highest paved mountain pass in Europe and stunning on both sides. A few photos from the 2017 event (blog post with map here):\n\n##### Haute Savoie\n\nThere are a couple of days scheduled on the north edge of the French Alps:\n\nJuly 28th: Col de Joux Plane\n\nAug 18th: Col de la Ramaz\n\nDetails [here](https://www.savoie-mont-blanc.com/offre/fiche/adopte-1-col/526334).\n\n##### PYRENEES\n\nThe Haute-Pyrénées will again hold a week-long series of bike days on some of the most famous climbs in the Pyrénées. Col de Portet (2215m) was in the 2018 Tour de France for the first time. Higher than Tourmalet, the top kilometres were gravel – but then paved for the Tour. I rode it on gravel – see here.\n\nJuly 22nd: Col de Peyresourde / Val Louron Azet / Col de Portet ([details](http://www.tourisme-hautes-pyrenees.com/Randos-et-sensations/Velo/Pyrenees-Cycl-n-Trip/Pyrenees-Cycl-n-Trip/Lundi-22-juillet))\n\nJuly 23rd: Col d’Aspin ([details](http://www.tourisme-hautes-pyrenees.com/Randos-et-sensations/Velo/Pyrenees-Cycl-n-Trip/Pyrenees-Cycl-n-Trip/Mardi-23-juillet))\n\nJuly 24th: Col du Tourmalet / Luz Ardiden ([details](http://www.tourisme-hautes-pyrenees.com/Randos-et-sensations/Velo/Pyrenees-Cycl-n-Trip/Pyrenees-Cycl-n-Trip/Mercredi-24-juillet))\n\nJuly 25th: Hautacam / Couraduque ([details](http://www.tourisme-hautes-pyrenees.com/Randos-et-sensations/Velo/Pyrenees-Cycl-n-Trip/Pyrenees-Cycl-n-Trip/Jeudi-25-juillet))\n\nJuly 26th: Col des Bordères ([details](http://www.tourisme-hautes-pyrenees.com/Randos-et-sensations/Velo/Pyrenees-Cycl-n-Trip/Pyrenees-Cycl-n-Trip/Vendredi-26-juillet))\n\n##### JURA MOUNTAINS\n\nThe Jura giant, **Le Grand Colombier** featured in the Tour de France in 2017. From June to September, on one Saturday of each month, the road will be closed to cars\
  \ for a bike day up the best (most scenic) side starting in Culoz. Details [here](http://www.bugeyvelo.com/noesit/!/fiche/journees-cyclo-du-grand-colombier-340749).\n\n*June 15th, July 13th, August 10th, Sept 14th. *\n\nMy silly Grand Colombier video from last year:\n\n##### MASSIF CENTRAL\n\nJune 23rd: Puy de Dôme Bike Day\n\nThis legendary cycling climb to the top of an extinct volcano is now forbidden for cyclists. EXCEPT one day a year. I rode this event in 2018 and had too much fun – details here.\n\nIt’s limited to just 300 participants and is unfortunately probably already sold out. Details [here](http://June 23rd).\n\n##### SWITZERLAND\n\nThere are a few events this year in Switzerland.\n\nMay 25th: Susten Pass ([details](https://www.myswitzerland.com/en/experiences/events/ride-the-alps-susten/))\n\nJune 10th: Chasing Cancellara (Vaud Alps – [details](https://www.region-du-leman.ch/en/P29523/chasing-cancellara?group=2197))\n\nJune 16th: Lukmanier Pass ([details](https://www.myswitzerland.com/en-au/experiences/events/ride-the-alps-lukmanier/))\n\nJune 29th: Ride the Alps Vaudoise ([details](https://www.myswitzerland.com/en-au/experiences/events/ride-the-alps-vaudoises/))\n\nSept 1st: Slow-up Albula Pass([details](https://www.slowup.ch/albula/de.html))\n\nSept 15th: La Désalpe Reichenbach – Lac d’Emosson / Col de la Gueulaz ([details](https://ladesalpereichenbach.ch/en/home/))\n\nSept 15th: Flüela Pass ([details](https://www.myswitzerland.com/en-au/experiences/events/ride-the-alps-flueela/))\n\n##### ITALY\n\nSome truly amazing events in Italy for 2019.\n\n#### MONTE GRAPPA BIKE DAY\n\nMay 18th – 6th annual Monte Grappa Bike Day\n\nSeptember 19th – 3rd annual Monte Grappa Bike Night\n\nDetails for both events [here](http://www.montegrappabikeday.it/it). See here for my experience cycling the first ever Monte Grappa bike day in 2014 – it’s one of the most interesting mountains I know, full of history and many routes up.\n\n#### DOLOMITES BIKE DAY\n\nJune 16th: From the web site ([here](http://www.dolomitesbikeday.it/en/)): *Third edition: three legendary mountain passes, 51 km roads closed to traffic!*\n\nFor the third Dolomites Bike Day, bike enthusiasts will have the possibility to cycle on 3 legendary mountain passes in the heart of the Dolomites UNESCO World Heritage. It will be the perfect opportunity to ride on the pass roads that have made the history of great cycling. The passes Campolongo, Falzarego and Valparola will be closed to motorized traffic from 9 am to 3 pm. The roads linking the Ladin valleys Val Badia, Arabba/Livinallongo and Ampezzo will be reserved for cyclists for a total of 51 km.\n\n#### SELLA RONDA BIKE DAY\n\nJune 22nd – The beautiful 55 km Sella Ronda Route climbs four passes: Pordoi, Gardena, Sella, and Campolongo.\n\nDetails [here](https://www.sellarondabikeday.com/en/news.html).\n\n#### STELVIO NATIONAL PARK BIKE DAYS\n\nThis is exciting. There will be eight days this summer where passes in the National Park will have bike-only days. This includes not just the legendary Stelvio, but three other great climbs. Full details here.\n\nJune 20th: Mortirolo\n\nJuly 7th: Mortirolo\n\nJuly 8th: Lago di Cancano (via the Torri di Fraele)\n\nJuly 9th: Passo Gavia\n\nJuly 21st: Passo Gavia\n\nAug 30: Lago di Cancano (via the Torri di Fraele)\n\nAug 31st: Passo dello Stelvio\n\nSept 1st: Passo Gavia\n\nSeptember 21st: Mendelpass Cycle Day ([details](https://www.kaltern.com/en/mendelpass-cycle-day.html))\n\n#### COLLE DEL NIVOLET\n\nMy favourite paved climb in the entire Alps. So Beautiful. The highest point in the Giro Italia this year (after Gavia stage canceled) ended at Lago Serrù. But the road goes 6 kilometres higher to the Colle. And every Sunday from in July and August the road is closed to cars for these 6 kilometres from Lago Serrù to Colle del Nivolet. Pure magic. Details of the bike days [here](http://www.pngp.it/nivolet/informazioni-sul-programma). Details of the climb here.\n\nLago Serrù is the\
  \ far lake in this photo:\n\nLocated in the *Parco Nationale Gran Paradiso*. Paradise indeed.\n\n##### AUSTRIA\n\nJune 2nd: Grossglockner – [details](http://www.glocknerkoenig.com/en/). I rode this event in 2018 – details. Truly amazing. Details here.\n\nAnd make certain you register for the version that takes the Edelweissspritze cobbled extension above the paved road to 2571 metres.\n\nThe Grossglockner also has a July 13th event that looks like a Time Trial open to all. [Details](http://www.grossglocknerberglauf.at/bike-challenge/strecken-und-hoehenprofil.html).\n\nJuly 6th: Mooserboden – [details](https://www.zellamsee-kaprun.com/de/events/veranstaltungskalender/verbund-radtag-mooserboden_e-367825)\n\n##### Final Thoughts\n\nI’ve been to a bunch of these events over the years and they are always fun. Quiet, friendly atmosphere, stress-free. Highly recommended. Again, I’d appreciate you leaving in the comments any events that I have missed.\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/Switzerland/posts/car-free-cycling-in-the-heart-of-switzerland-on-the-klausen-pass-on-saturday-28-/10157799883805854/  \n**Source:** [full]\n\n**Facebook post by @Switzerland** — https://www.facebook.com/Switzerland/posts/car-free-cycling-in-the-heart-of-switzerland-on-the-klausen-pass-on-saturday-28-/10157799883805854/\nDate: 2019-09-18\nCaption: Car-free cycling in the heart of Switzerland on the Klausen Pass. On Saturday 28 September the pass will be given over exclusively to cyclists from 9 a.m. to 4 p.m. Be there! Register at www.ridethealps.ch!\n</source>\n\n---\n\n<source>\n**URL:** https://www.instagram.com/p/DX_RNtUGpK5/  \n**Source:** [full]\n\n**Instagram post by @velor_cycling** — https://www.instagram.com/p/DX_RNtUGpK5/\nDate: 2026-05-06\nCaption: 4 months to go.\nThe Glorious Glacier Ride isn’t just another ride.\n\nFrom Innsbruck to Chamonix,\nyou cross the Alps\nand see something you can’t ignore.This ride is part of Cycling for Climate,\na movement bringing riders together across Europe\nto ride with more awareness.\n\nNot for performance.\nBut for something that goes beyond.\n\nRide together.\nSee it for yourself.\n\nRegistrations are open.\n\n #velorcycling #sustainableliving #CyclingCommunity #cyclinglifestyle\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/Eurorally/posts/alpine-edition-2024thursday-13th-juneinnsbruck-ponte-di-legnoconsists-of-3-mount/660929099409258/  \n**Source:** [full]\n\n**Facebook post by @Eurorally** — https://www.facebook.com/Eurorally/posts/alpine-edition-2024thursday-13th-juneinnsbruck-ponte-di-legnoconsists-of-3-mount/660929099409258/\nDate: 2023-07-25\nCaption: Alpine edition 2024:\n\nThursday 13th June:\nInnsbruck - Ponte Di Legno.\nConsists of 3 mountain passes.\n\nFriday:\nPonte Di Legno - Briancon.\n\nSaturday:\nBriancon - Mediterranean riviera.\n3 mountain passes & 1 canyon.\n\nSunday:\nRiviera.\nRest day at the sea.\n\nMonday:\nRiviera - Gap.\n1 canyon & 1 mountain pass.\n\nTuesday:\nGap - Chambery.\n1 mountain climb, 1 balcony road & 1 canyon.\n\nWednesday:\nCheck out from hotel. No further program.\n\nThe total distance is 1500km and consists of some of the most famous mountain passes and roads Europe has to offer.\n\nEntry fee is set to: 8500nok per person based on a minimum 2 persons per car/hotel room. The fee includes hotel with parking and breakfast at all locations.\n\nOn sale from 1st August through www.euro-rally.com\nLimited amount of spaces!!!\n\nCooperation partner: @torstdrikke\n</source>\n\n---\n\n<source>\n**URL:** https://alionswitzerland.com/cycling-in-switzerland/  \n**Source:** [full]\n\n---\ntitle: My experience cycling in Swizerland - Ali on Switzerland\nauthor: Ali\nurl: https://alionswitzerland.com/cycling-in-switzerland/\nhostname: alionswitzerland.com\ndescription: My experiences and tips from 10 years of cycling and mountain biking in Switzerland.\nsitename: Ali on Switzerland\ndate: 2013-08-09\ncategories: ['SwissFamilyFun']\n\
  ---\nMy experiences and tips from 10 years of cycling and mountain biking in Switzerland. I use bikes on a daily basis for everything from shopping to multi-day tours bikepacking or bicycle touring. I dabble across the whole spectrum of riding but am not a hardcore roadie, or super-talented downhill rider.\n\nIf you want some quick route ideas then see the list of rides I have written up, or the list of my favourite rides at the end of this post.\n\nI also have a separate post for Mountain biking.\n\n## The basics\n\n### Legal requirements\n\n- A helmet is recommended but optional for normal bikes and E-bikes up to 25 kmph.\n- Lights are required after dark and in tunnels, but many people seem to not bother (I have lost count of how many fast moving shadows I have only just avoided hitting whilst riding myself). As of April 2022 all E-bikes must have a front and rear light fitted to the bike, with the front on at all times (not that this is controlled very often).\n[A black sign with a bike and an arrow](https://img.chmedia.ch/2021/1/6/507a62ed-ecf9-4dca-91d8-7ccea2b42bcb.jpeg?width=560&fit=crop&quality=75&auto=webp)attached to a traffic light means that cyclists can turn in that direction at any time if it is safe to do so regardless of the light.[Verkehrsclub.ch has a good breakdown of signs relevant to cycling](https://www.verkehrsclub.ch/ratgeber/velo-e-bike/verkehrsschilder/)(but only in the local languages).[E-bikes are a little bit more complex and worth reading up on if you plan to use them, especially the fast (25-45kmph) E-bikes.](https://www.ch.ch/en/cycling-switzerland/)\n\nMore good news is that the [Swiss Bike-Path Law introduced January 2023](https://www.baublatt.ch/bauprojekte/veloweggesetz-bis-2042-soll-das-velonetz-gebaut-sein-33754) will vastly improve the cycling network… with a 5 year period to plan and then a completion goal in 2042 (so some patience is required).\n\n### Where you can ride\n\n### Safety\n\nthe **Swisstopo App **can also show the Cycling + MTB routes and allows you to download as much of the map as you want for offline use **free of charge** (see this post for more details), in addition to route planning (but I find it much clunkier to use and slower than the Switzerland Mobility service).\n\n**Englishforum.ch**always has a good thread on any topic,[like this one for cycling.](https://www.englishforum.ch/sports-fitness-beauty-wellness/9793-cycling-switzerland.html)has feedback and photos from a number of Switzerland Mobility routes.**Swissbiking.blog**- For those with small children see\nand**SwissFamilyFun**for more ideas and relevant tips.[PackedAgain](https://packedagain.com/biking-kids-switzerland/) - You can also use the\nfrom the neighbouring Black Forest region in Germany to plot routes. This extends over the border and lets you use the Outdoor Active map to plan and download routes in Switzerland for free (it just needs a registration). Not only does this show the main Swiss cycling routes like Switzerland Mobility and SwissTopo, it also shows many of the smaller routes which are not marked on the official Swiss websites. It even has more useful information on path closures and where bikes are not allowed than the Swiss websites. It does however have an odd habit of saying there are little dead-end routes in random bits of forest.**Schwarzwald Tour planner** - If you are feeling very old fashioned you can buy maps (Velokarte) from Hallwag Kümmerly & Frey that have the major cycling and mountain bike routes from Swiss Mobility highlighted (\n[for example](https://www.freytagberndt.com/shop/9783259024102-emmental/)). Having these is not essential by any means (especially when you can download the map for free with SwissTopo), but the quality and scale is good and I have a few of these covering areas I spent lots of time in (though I don’t think I ever actually used them out and about). They also have useful information like gradients and how suitable roads are. They also include red/green\
  \ dots to warn you of “dangerous” spots, which mostly seems to be anytime the route grudgingly decides that you have to cross a road which might actually have a few cars on it. - If you want to see/report potentially dangerous spots then check out\nBikeable.ch. Some of the listings are very accurate, others are a bit over the top, but it gives you can idea.\n\n**These are only suggestions.**You are free to follow them or take other routes as you like. Serious road-bikers will mostly want to avoid them due to the mixed surface and inefficient routing, and families with little kids will probably want to look for ways to shorten them and avoid sections on the road. I use the cycling routes as a basis in areas I don’t know, and then either mix them up with diversions I learn from experience or sometimes study the route and plan some diversions based on what seems reasonable or interesting.**Stages are generally quite short.**Most of the stages are around 40km or less in length. For some people this will be a relaxed enjoyable day, others will want to do multiple stages per day on some routes. The longest I can find is[Route 4 Stage 4 (77km)](https://www.schweizmobil.ch/en/cycling-in-switzerland/routes/route/etappe-0876.html)and the shortest is[Route 15 Stage 10 (5km)](https://www.schweizmobil.ch/en/cycling-in-switzerland/routes/route/etappe-01769.html).**The routes are designed to keep you away from cars as much as possible.**Sometimes the routes feel like a work of genius taking you along scenic and well thought out routes you would never have found otherwise, other times they take you into a disorientating labyrinth like path through suburbs and industrial areas in what seems to be an obsession with avoiding any road that might have more than a few cars on it.\n\nslowUp. A series of events around the country where a section of road is closed to traffic for the day and cyclists are free to go around at their own speed. Usually a very festive atmosphere with lots of food/drink stands. Free, simply turn up and join in.[Ride the Alps (Climb the Giants)](https://www.climbthegiants.ch/index.php/en/). A series of events where an Alpine pass road is blocked to traffic and cyclists can enjoy it in peace for a few hours. Some might require a registration and a small fee (20 CHF).Alpenbrevet.[Cycle Week](https://cycleweek.ch/en). The national bike event taking place in Zürich in May.Dead ends with cake.You have to be a bit nuts to go for this, but I love the name.- The\n**Tour de Suisse**comes around in Mid-June each year. If you are planning to do a tour at the same time you should check that your route and accommodation plans aren’t going to be stopped by an overlap with the tour.\n\nSchweiz Rolltoffers free rental in certain cities/areas (Geneva, Valais, Zürich, La-Chaux-de-Fonds, Le Locle, and Neuchâtel) from May to October for a limited time period (and then often very cheap afterwards). ID required.[You can rent bikes at train stations via the SBB](https://www.sbb.ch/en/station-services/bike-car/bike-rental.html). An advantage being that you can return it to another station for a 10CHF charge.- Otherwise rental will often be offered by other stores, especially in tourist areas. If you are staying in a tourist area/resort you might get a discount on local bike rental with your visitor card.\n</source>\n\n---\n\n<source>\n**URL:** https://www.instagram.com/p/DJLw1UcKre-/  \n**Source:** [full]\n\n**Instagram post by @alpiq_group** — https://www.instagram.com/p/DJLw1UcKre-/\nDate: 2025-05-03\nCaption: Free cheese in Switzerland? \U0001F9C0\U0001F60B\U0001F1E8\U0001F1ED\n\nThanks to its steep mountains and impressive hydro dams like Grande Dixence, Emosson, Moiry and Gebidem, the Canton of Valais is the #1 in Hydropower in #Switzerland and a real playground for cyclists. Since many centuries, Valais is the capital of Raclette. Let’s enjoy a free #Raclette in Valais at Ride The Alps - See you on May 18th at #Moosalp \U0001F6B5\U0001F6B5‍♀️\
  \ \U0001F9C0\U0001F1E8\U0001F1ED\n\n#biking #mtb #bike #cycling #cheese #food #cycle #cyclist #food #switzerland #alps #swissalps\n</source>"
key_facts:
- A three-day Ride the Alps weekend runs 26-28 June 2026 in the Valais, around Sion
- The three days are the Sanetsch (26 June), Moiry (27 June) and Tseuzier (28 June) climbs
secondary_facts:
- Riders can take part in a single day or the full three-day sequence
- Participation is free, with the climbs closed to motor traffic
