findings: "<source>\n**URL:** https://www.myswitzerland.com/en-ch/experiences/events/ride-the-alps-1/  \n**Source:** [full]\n\n---\ntitle: Ride the Alps 2026 | Switzerland Tourism\nurl: https://www.myswitzerland.com/en-ch/experiences/events/ride-the-alps-1/\ndescription: 5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\nsitename: Switzerland Tourism\ndate: 2026-06-01\n---\nLearn more about Self-guided e-bike tour through the vineyard including menu from Sion\n\n# Ride the Alps 2026\n\n## Overview\n\n## Intro\n\n5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\n\nValais offers an exceptional playground for cycling enthusiasts. In 2016, the Valais Vélo Tour was created to showcase the region's many facets. Marked cycling routes along the Rhône, panoramic roads through the vineyards, and climbs to the lateral valleys – there's something for everyone: both leisure cyclists and dedicated athletes alike.\n\nIf one feature stands out in Valais cycling, it’s the opportunity to conquer legendary mountain passes. More than twenty are listed, including seven giants rising above 2000 meters. This concentration of high-altitude passes is almost unique.\n\nWe invite you to discover the most beautiful and highest climbs in the region during spring and summer. Reserved exclusively for soft mobility, you can tackle these ascents in optimal conditions and complete safety. Let’s go, friends!\n\nPROGRAM\n\nSunday, May 17: Moosalp Pass - 2050 m\n\nFriday, June 26: location to be announced\n\nSaturday, June 27: location to be announced\n\nSunday, June 28: location to be announced\n\nSaturday, September 26: location to be announced\n\n| Contact address |\nR&D EVENTS\nRue Pré-Fleuri 6 1950 Sion 027 552 04 14 info@rd-events.ch |\n|---|---|\n| Location |\nValais / Wallis (Canton / Kanton) 1950 Sitten Switzerland |\n| Event Homepage |\n|\n\n## Event dates\n\n- 07 June 2026\n- 14 June 2026\n- 21 June 2026\n- 28 June 2026\n- 05 July 2026\n- 12 July 2026\n- 19 July 2026\n- 26 July 2026\n- 02 August 2026\n- 09 August 2026\n- 16 August 2026\n- 23 August 2026\n- 30 August 2026\n- 06 September 2026\n- 13 September 2026\n- 20 September 2026\n</source>\n\n---\n\n<source>\n**URL:** https://www.duvine.com/tour/alps-challenge/  \n**Source:** [full]\n\n---\ntitle: Alps Challenge Bike Tour\nurl: https://www.duvine.com/tour/alps-challenge/\ndescription: Perfect for passionate cyclists: ride famous passes in the Maritime Alps and climb HC cols. Fully-supported rides with luxury Alpine lodging.\nsitename: DuVine\ndate: 2017-07-12\n---\n# Alps Challenge Bike Tour\n\nHigh-End at High Altitude: HC Climbs and Cols of the French Alps\n\n## Itinerary\n\nPrint Itinerary\n\n- Pre-tour\n#### Chambéry Pre-Night (Optional)\n\nArrive in Chambéry, France—the heart of the Rhône Alps—and settle into Hotel des Princes, conveniently located just minutes from the train station. At your leisure, explore Chambéry’s historic town center and appreciate the ornate architecture, Alpine food and wine, and friendly locals. In the morning, take your time over a lovely, nourishing breakfast before meeting your DuVine guides for a transfer to the start of the tour.\n\n*Room upgrades available upon request.***Inclusions**: Hotel, Breakfast\n\n**Accommodations**:[Hotel des Princes](https://www.hoteldesprinces.com/en/)\n\n**Price per person in double occupancy**: $125\n\n**Price in single occupancy**: $230*Pre-night rooms are subject to availability. If interested, please inform your Travel Specialist during the booking process, or inform your Tour Coordinator at least 60 days prior to tour.* - Day 1\n#### Go for the Galibier\n\nWelcome to an epic week of cycling. Meet your guides in Chambéry and before you know it we’ll be in Saint-Michel-de-Maurienne, ready to head out across the Alps. There is no honeymoon ride: start the week with a steady climb up the Col du Télégraphe, which may not have star power but will get\
  \ you in your granny gear nonetheless. From here we enter the realm of high mountain passes, and few are more mythical than the Col du Galibier to begin our week with a bang. On the way down, we’ll catch the Col du Lautaret for some stunning views of Le Trois Vallèes. Ride the rest of the way to the Alpine town of Les Deux Alpes to reach Chalet Mounier, a family-owned hotel since 1933, and rest up for tomorrow’s big day on Alpe d’Huez.\n\n**Meals:**Lunch / Dinner\n\n**Destinations:**Saint-Michel-de-Maurienne, Valloire, La Grave\n\n**Accomplished:**50 miles / 80 km, elevation gain: 9,728 feet / 2,947 meters\n\n**Shorter Option**: 43 miles / 69 km, elevation gain: 7,778 feet / 2,371 meters\n\n**Accommodations:**[Chalet Mounier](https://www.chalet-mounier.com/en/) - Day 2\n#### The Alpe d’Huez\n\nYesterday we climbed some hills; today we climb some mountains. Descend into the Oisans valley and arrive at the Alpe d’Huez: this bucket-list classic is perhaps the most famous of them all, with some 14 kilometers at an average of 8%. The pros have tackled her 21 hairpin switchbacks 32 times in race history—the leftover graffiti scrawled on the asphalt at Dutch corner is proof. Refuel at an iconic cycling café in town before moving on to the Col de Sarenne, frankly a tiny bump after our big morning. Today’s effort is duly rewarded with dinner at Chalet Mounier’s regional restaurant.\n\n**Meals:**Breakfast / Lunch / Dinner\n\n**Destinations:**Alpe D’Huez, Mizoën\n\n**Accomplished:**41 miles / 66 km, elevation gain: 7,545 feet / 2,300 meters\n\n**Accommodations:**[Chalet Mounier](https://www.chalet-mounier.com/en/) - Day 3\n#### Pass of the Iron Cross\n\nAfter a breakfast fit for a professional cyclist, we set our sights on the Col de la Croix de Fer. It may not be the most well-known road in the Rhône-Alpes but this HC climb is our personal favorite, full of ups and downs that keep you guessing. The push to the top is tough: with two kilometers to go, you’ll catch a glimpse of neighboring Col du Glandon, and then comes sweet relief the entire way down. End right at our hotel and spend the rest of the day in Les Deux Alpes. Walk it off with a stroll around town and eat whatever you’re craving at dinner on your own tonight.\n\n**Meals:**Breakfast / Lunch\n\n**Destinations:**Oz, Col du Glandon\n\n**Accomplished:**75 miles / 120 km, elevation gain: 10,262 feet / 3,130 meters\n\n**Accommodations:**[Chalet Mounier](https://www.chalet-mounier.com/en/) - Day 4\n#### The Maritime Alps\n\nStarting the day on the Col du Lautaret might as well be considered a warmup. Get your extra miles in while you’re still fresh or transfer to the top and begin with the descent into Briançon. You’ll want all the momentum you can get by the time we approach the Col d’Izoard: this pass was the battleground for the epic rivalry between the legendary Italian, Fausto Coppi, and the French great, Louison Bobet, in the 1950s; it’s also one of the highest points of the week at 2,360 meters. The scenery starts to shift once we enter the stark, lunar landscapes of the Casse Déserte, then again as we head south into the Maritime Alps. Here, the roads aren’t household names but the riding is out of this world: no cars, just ribbons of pavement winding through pines and mountain pastures—which is exactly what you’ll get on the Col de Vars. Roll into our next villa hotel for a relaxing afternoon by the pool (or a much-needed massage) and an easy dinner right on the property.\n\n**Meals:**Breakfast / Lunch / Dinner\n\n**Destinations:**Briançon, Guillestre\n\n**Accomplished:**72 miles / 117 km, elevation gain: 8,950 feet / 2,728 meters\n\n**Longer Option:**95 miles / 153 km, elevation gain: 13,241 feet / 4,036 meters\n\n**Accommodations:**Villa Morelia - Day 5\n#### The Terrible Trio\n\nWe’d like to introduce you to the Col d’Allos: the average grade can reach a steep 7.8%, and it may surprise you that this climb has been featured in the TDF more times than the Alpe d’Huez. After\
  \ a quick coffee stop, move on to the Col des Champs, where our only companions are grazing cows. One more climb stands between us our celebrations—by the time we reach the last refuge on top of the Col de la Cayolle at 2,326 meters, you’ll be itching for the 29 miles directly downhill to Barcelonnette. Take a victory lap back to Villa Morelia where a glass of champagne awaits, followed by a dinner that’s a culinary reflection of all the ground we’ve covered along the way.\n\n**Meals:**Breakfast / Lunch / Dinner\n\n**Destinations:**Barcelonnette, Saint-Martin-d’Entraunes\n\n**Accomplished:**84 miles / 136 km, elevation gain: 10,826 feet / 3,300 meters\n\n**Shorter Option:**67 miles / 108 km, elevation gain: 7,831 feet / 2,387 meters\n\n**Accommodations:**Villa Morelia - Day 6\n#### End on a High Note\n\nIf your legs are begging for rest, there’s no shame in sleeping in and sipping coffee with a side of mountain views this morning. But if you want to squeeze in one last ride, get an early start up the Col de la Bonette, billed as the highest pass in all of Europe. As they say, it’s less of a climb and more of a lunar landing: the gradient hits 15% at its steepest, but it’s easy to distract yourself with the extraordinary views all around. We’ll get you back in time for a shower before your guides transfer you to the train station at Gap.\n\n**Meals:**Breakfast / Lunch\n\n**Destinations:**Col de la Bonette\n\n**Accomplished:**27 miles / 44 km, elevation gain: 5,085 feet / 1,550 meters\n\nDuVine itineraries may be subject to slight route changes, hotel substitutions, and other modifications.\n\n##### Arrival Details\n\n**Airport City**: Lyon or Paris, France\n\n**Pick-Up Location**: Chambéry Train Station\n\n**Pick-Up Time**: 8:30 am\n\n##### Departure Details\n\n**Airport City**: Marseille, Lyon, or Paris, France\n\n**Drop-Off Location**: Gap Train Station\n\n**Drop-Off Time**: 2:00 pm\n\nArrival and departure details for alternate itineraries and future year departures may be subject to change.\n\n##### Travelers Take Note\n\nUpon booking this tour, you will be asked to complete a short form. We use this information to ensure all Level 4 trip participants are adequately prepared for our most difficult riding and have proximate cycling experience to the rest of the group.\n\nDue to altitude, weather can change quickly. Expect anything from peak summer heat to hail and snow in a single day, and pack accordingly. Helpful hints about dressing for all climates can be found on our blog.\n\nThe first day’s route includes one section of riding on well-packed gravel. Please note that e-bikes cannot be reserved for this tour.\n\n## Dates + Availability\n\n## Inclusions + Details\n\n#### Accommodations\n\n- Thoughtfully selected accommodations that reveal the true character of the region in ideal riding locations\n- Gratuities for baggage, porters, and hotel service\n- Luggage transfers\n\n#### Meals\n\n- Daily breakfasts, all lunches, and 4 cyclist-friendly dinners at our favorite local restaurants and renowned culinary establishments\n- Nutritious energy snacks, hydration, and shakes to support endurance and recovery\n- Local wines and beer with every meal\n\n#### Gear\n\n- Colnago V4 carbon road bike with Dura-Ace Di2 groupset and Vision carbon wheelset\n- Custom Rapha x DuVine kit\n- DuVine Challenge t-shirt, water bottle, and drawstring bag\n- GPS with pre-programmed route maps\n\n#### Support\n\n- Expert bilingual guide with extensive cycling experience and local knowledge\n- SAG vehicle that follows the day’s route, offers support as needed, and carries spare gear and snacks\n- Pick-up and drop-off before and after your tour from predetermined meeting points\n- Laundry service for cycling apparel provided mid-week\n- Daily bike maintenance to ensure optimal performance\n\nFor technical riding and Europe's classic climbs, only one bike will do: the Colnago V4. Included in the trip price of our Challenge tours, this best-in-class bike\
  \ includes Dura-Ace Di2 shifting and a custom Vision carbon wheelset for a ride that's light, responsive, and unbelievably fun to ride—with design sensibility that looks just as good as it feels on the road. Colnago invested serious research hours and conducted aerodynamic studies to realize the V4's monocoque carbon frame. It's solid yet reactive, with a shorter head tube and longer fork for enhanced rideability—yet it retains the soul of a racing bike. Together, these features make our custom V4s equally well-suited to flat terrain and grueling grades.\n</source>\n\n---\n\n<source>\n**URL:** https://www.instagram.com/reel/DLKZlxeqhi-/  \n**Source:** [full]\n\n**Instagram post by @alpiq_group** — https://www.instagram.com/reel/DLKZlxeqhi-/\nDate: 2025-06-21\nCaption: ☀️ \U0001F6B4‍♀️ Sun, sweat, fun – and a well-deserved treat after a remarkable performance. That sums up this year’s @ridethealps_vs stage to the stunning Moriy Barrage! \U0001F3D4️\n \n\U0001F4CF 49,8 km | ⛰️ 2,140 m elevation gain: After an early start in @sioncapitale, the route followed the Rhône river before hitting the first sweaty ascent to @vercorin_ . Not long after, the majestic Matterhorn and Dent Blanche made for a breathtaking backdrop as we powered through @valdanniviers and the charming @grimentz.zinal – all leading up to the final climb \U0001F4AA\U0001F3C1.\n \nAt Alpiq, we strive for a different kind of energy ⚡ – that’s why we’re proud to support such an inspiring event full of sportsmanship, endurance, and alpine spirit in the heart of the Swiss Alps: the iconic @valaiswallis .\n \nAlpiq – the power behind every ride \U0001F6B4‍♀️ - Official Main Partner of @valais2025, home of the @uci_mountainbike World Championships \U0001F30D\U0001F6B5\n</source>\n\n---\n\n<source>\n**URL:** https://ridethealps.ch/en/  \n**Source:** [full]\n\n---\ntitle: 5 exceptional climbs5 regions3 weekends\nurl: https://ridethealps.ch/en/\nsitename: ridethealps.ch\ndate: 2024-03-01\n---\nThe Valais offers a unique setting for cycling enthusiasts, with its legendary mountain passes rising to over 2,000 meters in altitude.\n\nHop on your bike and come discover some of the region’s most beautiful climbs on roads closed to cars !\n\nTHE CLIMBS 2026\n\n5 exceptional climbs5 regions3 weekends\n\nSunday, May 17, 2026\n\nPASS MOOSALP\n\n2050M\n\nFriday, June 26, 2026\n\nsANETSCH\n\nSaturday, June 27, 2026\n\nMOIRY\n\nSunday, June 28, 2026\n\nTSEUZIER\n\nSaturday, September 26, 2026\n\nCOMING SOON\n\nMAUVOISIN\n\n1841M\n\nSaturday, September 20, 2025\n\nCOL DU NUFENEN\n\n2478M\n\nSunday, September 15, 2024\n\nTOMBOLA\n\nOnce again this year, the Ride the Alps series is supported by the Fédération Cycliste Valaisanne. As all the stages are free of charge, participants are invited to support young Valaisan cyclists by taking part in a tombola, where the luckiest person will win a Specialized road bike.\n\nWhen you register online, or on site at each stage of the series, you can support the young Valaisan cyclists by buying one or more tickets for our super raffle!\n\nWe use cookies to guarantee you the best possible experience on our website. If you continue to use this site, we will assume that you are happy with it.OK\n</source>\n\n---\n\n<source>\n**URL:** https://www.myswitzerland.com/en/experiences/events/ride-the-alps-1/  \n**Source:** [full]\n\n---\ntitle: Ride the Alps 2026 | Switzerland Tourism\nauthor: Schweiz Tourismus\nurl: https://www.myswitzerland.com/en/experiences/events/ride-the-alps-1/\nhostname: myswitzerland.com\ndescription: 5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\nsitename: Switzerland Tourism\ndate: 2026-06-01\n---\nLearn more about Sion & Wine Tour\n\n# Ride the Alps 2026\n\n## Overview\n\n## Intro\n\n5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\n\nValais offers an exceptional playground for cycling enthusiasts. In 2016, the Valais Vélo Tour was created\
  \ to showcase the region's many facets. Marked cycling routes along the Rhône, panoramic roads through the vineyards, and climbs to the lateral valleys – there's something for everyone: both leisure cyclists and dedicated athletes alike.\n\nIf one feature stands out in Valais cycling, it’s the opportunity to conquer legendary mountain passes. More than twenty are listed, including seven giants rising above 2000 meters. This concentration of high-altitude passes is almost unique.\n\nWe invite you to discover the most beautiful and highest climbs in the region during spring and summer. Reserved exclusively for soft mobility, you can tackle these ascents in optimal conditions and complete safety. Let’s go, friends!\n\nPROGRAM\n\nSunday, May 17: Moosalp Pass - 2050 m\n\nFriday, June 26: location to be announced\n\nSaturday, June 27: location to be announced\n\nSunday, June 28: location to be announced\n\nSaturday, September 26: location to be announced\n\n| Contact address |\nR&D EVENTS\nRue Pré-Fleuri 6 1950 Sion 027 552 04 14 info@rd-events.ch |\n|---|---|\n| Location |\nValais / Wallis (Canton / Kanton) 1950 Sitten Switzerland |\n| Event Homepage |\n|\n\n## Event dates\n\n- 14 June 2026\n- 21 June 2026\n- 28 June 2026\n- 05 July 2026\n- 12 July 2026\n- 19 July 2026\n- 26 July 2026\n- 02 August 2026\n- 09 August 2026\n- 16 August 2026\n- 23 August 2026\n- 30 August 2026\n- 06 September 2026\n- 13 September 2026\n- 20 September 2026\n</source>\n\n---\n\n<source>\n**URL:** https://www.myswitzerland.com/en-in/experiences/events/ride-the-alps-2/  \n**Source:** [full]\n\n---\ntitle: Ride the Alps | Switzerland Tourism\nurl: https://www.myswitzerland.com/en-in/experiences/events/ride-the-alps-2/\ndescription: Ride the Alps is back! It's your turn to conquer the most beautiful passes and dams in the Valais during these days of exceptional climbs. Take the opportunity to discover the Tseuzier dam!\nsitename: Switzerland Tourism\ndate: 2026-06-01\n---\nLearn more about Self-guided e-bike tour through the vineyard including menu from Sion\n\n# Ride the Alps\n\n## Overview\n\n## Intro\n\nRide the Alps is back! It's your turn to conquer the most beautiful passes and dams in the Valais during these days of exceptional climbs. Take the opportunity to discover the Tseuzier dam!\n\nOn Sunday June 28, get on your bikes and climb the 24kms and 1270mD+ that link Sion to the Barrage de Tseuzier at an altitude of 1777m.\n\nWith no traffic, just you and your bikes, we encourage soft mobility and let you make the most of a breathtaking landscape.\n\nAt the finish line, the Restaurant de Tseuzier offers you a cyclist's plate!\n\nPractical information:\n\n- Start: Place du Scex, Sion\n\n- Departure from closed roads: The roads from the Combe de Voos to the top of the Tseuzier dam from 9 a.m. to 3 p.m. are reserved exclusively for cyclists.\n\n- Discover the Ride The Alps offer for public transport at www.ridethealps.ch/tseuzier/\n\n- Registration required\n\n- Free participation\n\n| Location |\nValais / Wallis (Canton / Kanton) 1950 Sitten Switzerland |\n|---|---|\n| Event Homepage |\n|\n\n## Event dates\n\n- 28 June 2026\n</source>\n\n---\n\n<source>\n**URL:** https://www.cycloworld.cc/en/gran-fondo/switzerland/ride-the-alps-sanetsch/39494  \n**Source:** [full]\n\n---\ntitle: Ride the Alps - Sanetsch\nurl: https://www.cycloworld.cc/en/gran-fondo/switzerland/ride-the-alps-sanetsch/39494\ndescription: \U0001F6B4♂️ Join the legendary Sportive Ride the Alps - Sanetsch 2026 (2026-06-26) in Sion, Switzerland! Explore the course, registration details, and expert tips for this epic cycling event. \U0001F3D4️\nsitename: cycloworld.cc\ndate: 2026-01-01\n---\nWebsite\n\nArticles\n\nFavo +\n\nPlan +\n\nReport error\n\nCollection from CycloWorld\n\nCollection of Climbfinder\n\nItaly\n\nFrance\n\nSwitzerland\n\nIf an event is missing, please report it. It only takes a few clicks and we will immediately pick it up and complete the data.\n</source>\n\n---\n\n<source>\n\
  **URL:** https://www.instagram.com/ridethealps_vs/  \n**Source:** [snippet/paywall]\n\nAu départ de la Capitale des Alpes, le menu est le suivant : - 26 juin –> Ride the Alps Santesch - 27 juin –> Ride the Alps Moiry - 28 juin\n</source>\n\n---\n\n<source>\n**URL:** https://www.myswitzerland.com/en-ch/experiences/events/ride-the-alps-1/  \n**Source:** [full]\n\n---\ntitle: Ride the Alps 2026 | Switzerland Tourism\nurl: https://www.myswitzerland.com/en-ch/experiences/events/ride-the-alps-1/\ndescription: 5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\nsitename: Switzerland Tourism\ndate: 2026-06-01\n---\nLearn more about Self-guided e-bike tour through the vineyard including menu from Sion\n\n# Ride the Alps 2026\n\n## Overview\n\n## Intro\n\n5 exceptional climbs, 5 regions, 3 weekends: challenge yourself against the giants of Valais!\n\nValais offers an exceptional playground for cycling enthusiasts. In 2016, the Valais Vélo Tour was created to showcase the region's many facets. Marked cycling routes along the Rhône, panoramic roads through the vineyards, and climbs to the lateral valleys – there's something for everyone: both leisure cyclists and dedicated athletes alike.\n\nIf one feature stands out in Valais cycling, it’s the opportunity to conquer legendary mountain passes. More than twenty are listed, including seven giants rising above 2000 meters. This concentration of high-altitude passes is almost unique.\n\nWe invite you to discover the most beautiful and highest climbs in the region during spring and summer. Reserved exclusively for soft mobility, you can tackle these ascents in optimal conditions and complete safety. Let’s go, friends!\n\nPROGRAM\n\nSunday, May 17: Moosalp Pass - 2050 m\n\nFriday, June 26: location to be announced\n\nSaturday, June 27: location to be announced\n\nSunday, June 28: location to be announced\n\nSaturday, September 26: location to be announced\n\n| Contact address |\nR&D EVENTS