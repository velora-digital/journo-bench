  \  cu  credite  la  aceste \n bănci?  Sebastian  Buldea  ne  explică \n Sebastian. \n Bun  găsit.  În  primul  rând  discutăm \n despre  bani  aduși  la  bugetul  de  stat \n pentru  că  totuși  este  o  sumă \n considerabilă  de  peste  700  de  milioane \n de  euro.  În  al  doilea  rând,  vorbim  poate \n chiar  despre  banii  înapoiați  românilor \n ce  au  plătit  în  plus  la  bancă  în \n perioada  respectivă.  Și  o  să  discutăm \n despre  acest  lucru  și  cum  anume  se  pot \n recupera  sumele  de  bani,  pentru  că  în \n primul  rând  ar  fi  nevoie  clar  un  credit \n luat  în  acea  perioadă  și  trebuie  adus \n totodată  și  dovezi,  trebuie  o  expertiză \n economică  care  să  arate  cât  anume  s  a \n plătit  în  plus  din  cauza  acestei \n manipulări  a  indicelui  robot,  dar  este \n nevoie  clar  și  de  o  decizie  definitivă  a \n instanței.  Iar  acest  punct  este  cel  mai \n important  și  se  așteaptă  extrem  de  mult \n pentru  această  decizie  a  instanței  de \n judecată,  pentru  că  în  acest  moment \n băncile  au  anunțat  deja  că  vor  contesta \n în  instanță  acest  raport  adus  public  de \n către  Consiliul  Concurenței.  Deci  clar \n va  fi  o  perioadă  destul  de  lungă  de \n judecată.  Ulterior,  cel  mai  probabil  se \n va  ajunge  și  la  un  recurs,  fie  de  către \n bănci,  fie  de  către  Consiliul \n Concurenței.  după  ce  va  veni  și  acel \n răspuns  al  instanței,  abia  în  acel \n moment  în  care  instanța  de  judecată  va \n spune  clar  că  s  a  făcut  un  abuz,  iar \n oamenii  au  plătit  în  plus  pe  ratele  la \n bancă,  abia  în  acel  moment  se  vor  putea \n deschide  procese  civile  sau  colective  în \n cazul  în  care  legea  îi  va  ajuta  pe  cei \n afectați. \n Este  clar  că  și  acest  lucru  va  mai  dura \n probabil  încă  câțiva  ani. \n >> În  continuare  pe  acest  subiect  discutăm \n cu  domnul  Adrian  Negrescu,  consultant \n economic.  Bună  dimineața.  Mulțume