  \  \n**Source:** [snippet/paywall]\n\nMLex Summary: The Romanian competition authority has closed its investigation into anticompetitive practices by entities active on the ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.bursa.ro/bancile-au-fost-informate-de-consiliul-concurentei-asupra-motivelor-pentru-care-ar-urma-sa-fie-sanctionate-amenzile-propuse-sunt-enorme-05548855  \n**Source:** [full]\n\n---\ntitle: Băncile au fost informate de Consiliul Concurenţei asupra motivelor pentru care ar urma să fie sancţionate; Amenzile propuse sunt enorme\nurl: https://www.bursa.ro/bancile-au-fost-informate-de-consiliul-concurentei-asupra-motivelor-pentru-care-ar-urma-sa-fie-sanctionate-amenzile-propuse-sunt-enorme-05548855\ndescription: *ACTUALIZARE - CEC Bank anunţă că va utiliza inclusiv căile legale de contestare pentru a-şi apăra poziţia*ACTUALIZARE - Raiffeisen Bank: \"Banca va utiliza toate căile procedurale prevăzute de lege pentru a-şi prezenta argumentele şi a-şi susţine poziţia în faţa autorităţilor, inlcusiv a instanţelor de judecată, dacă va fi cazul”---*ACTUALIZARE - BCR: „Suntem convinşi de corectitudinea poziţiei BCR şi a comportamentului nostru de piaţă”---*ACTUALIZARE - Unicredit Bank: \"Nu suntem de acord cu concluziile raportului preliminar şi apreciem ca nejustificată sancţiunea propusă spre aplicare”---*ACTUALIZARE - BRD Groupe Societe Generale: \"Orice eventuală decizie nefavorabilă a Consiliului Concurenţei va fi contestată în condiţiile legii”---Etapa de documentare din cadrul investigaţiei pe care Consiliul Concurenţei o derulează pe piaţa bancară în legătură cu modul de calcul al ROBOR s-a încheiat.\nsitename: Ziarul Bursa\ndate: 2026-04-08\n---\nActualizare ** - CEC Bank anunţă că va utiliza inclusiv căile legale de contestare pentru a-şi apăra poziţia**\n\nCEC Bank, parte a panelului de zece bănci implicate în procedura de fixing, anunţă, în cadrul unui comunicat transmis BVB, că a luat act de raportul Consiliului Concurenţei privind investigaţia pe ROBOR, subliniind că trimiterea acestuia către bănci reprezintă un pas procedural intermediar şi că va analiza cu maximă atenţie concluziile şi argumentele prezentate, urmând să utilizeze inclusiv căile legale de contestare pentru a-şi apăra poziţia.\n\nReprezentanţii băncii precizează: \"CEC Bank îşi reafirmă poziţia constantă, potrivit căreia activitatea sa a fost desfăşurată permanent cu bună-credinţă, în conformitate cu cadrul legal şi de reglementare aplicabil, precum şi cu regulile şi metodologiile stabilite de autorităţile competente pentru calcularea şi raportarea indicilor de piaţă. Participarea Băncii la mecanismele de stabilire a ROBOR s-a realizat exclusiv în limitele procedurilor oficiale şi ale obligaţiilor asumate ca instituţie de credit.\n\n---\n\n---\n\n---\n\n---\n\n---\n\n”În data de 6 aprilie 2026, Consiliul Concurenţei a finalizat etapa de documentare din cadrul investigaţiei privind o presupusă înţelegere şi/sau practică concertată cu privire la fixarea coordonată a valorii ROBOR de către băncile participante la stabilirea acestei rate de referinţă, în cadrul procedurii de «fixing», prin transmiterea către toate cele zece bănci vizate a unei copii a raportului elaborat de echipa de investigaţie desemnată în acest sens”, se menţionează în raportul de la BVB.\n\n## • Investigaţia Consiliului Concurenţei pe ROBOR - demarată în 2022\n</source>\n\n---\n\n<source>\n**URL:** https://www.romaniajournal.ro/business/financial/competition-council-sees-signs-of-robor-distortion/  \n**Source:** [snippet/paywall]\n\nRomania's Competition Council will issue a decision at the beginning of next month in its investigation into the way the ROBOR index is set.\n</source>\n\n---\n\n<source>\n**URL:** https://informat.ro/en/economy/the-competition-council-is-investigating-robor-banks-could-be-sanctioned-117226  \n**Source:** [snippet/paywall]\n\nThe Competition Council is finalizing the investigation into the ROBOR index, suspecting information exchanges between\
  \ banks. event image.\n</source>\n\n---\n\n<source>\n**URL:** https://www.bnr.ro/uploads/editor/665396659.pdf  \n**Source:** [full]\n\n---\nurl: https://www.bnr.ro/uploads/editor/665396659.pdf\n---\n\nRules for determining the ROBID and ROBOR reference rates\n\n1. General Provisions\n\nThese rules define the principles, the manner of determining and publishing reference rates, as well \nas the rights and obligations of the parties involved in the determination of ROBID and ROBOR \nreference rates.\n\nUnder the present rules, the terms stated below shall have the following meanings:\n\nBusiness Day – any day, with the exception of Saturdays, Sundays and public holidays, on which \nthe Fixing Participants conduct their activity on the interbank money market.\n\nFixing – the activities conducted to define ROBID and ROBOR reference rates for RON deposits \non the interbank money market.\n\nOrganiser – National Bank of Romania.\n\nProxy – an entity with the required experience, technical and administrative knowledge that has \nbeen charged to conduct the Fixing as per the terms defined by the present rules.\n\n2.  Fixing Participant Status\n\n3.1    The ROBID and ROBOR reference rates are established for the following time deposits: \na) O/N – one day starting with the fixing date  \nb) T/N – one day starting with the next Business Day after the fixing date \nc) 1W – 1 week over spot \nd) 1M – 1 month over spot \ne) 3M – 3 months over spot \nf) \n6M – 6 months over spot \ng) 9M – 9 months over spot \nh) 12M – 12 months over spot\n\n3.5 The ROBID rate for each maturity is calculated by the Proxy as the arithmetical average of \nthe last rates quoted by each Participant in the Fixing for the RON deposits accepted within \n15 minutes before the Fixing after rejecting the extreme rates. The rate quoted by each \nParticipant in the Fixing represents the rate at which the RON deposits are accepted from the \nother Participant for 15 minutes from the publication of ROBID and ROBOR rates by the \nProxy.\n\n3.6 The ROBOR rate for each maturity is calculated by the Proxy as the arithmetical average of \nthe last rates quoted by the each Participant in the Fixing for the RON deposits offered within \n15 minutes before the Fixing after rejecting extreme rates. The rate quoted by each Participant \nin the Fixing represents the rate at which the RON deposits are offered to the other Participant \nfor 15 minutes from the publication of ROBID and ROBOR rates by the Proxy.\n\n6.3 \nThe withdrawal of the agreement of participation and the relinquishment of Fixing \nParticipant status become effective after 30 days from the date the Organiser has been \nnotified, in accordance with section 6.2 above, with a reservation for the provisions of \nsection 6.5 of the present rules.\n\n7.1 \nIf the Organiser finds that a Fixing Participant is in breach of the present rules, the \nOrganiser has the right to give a warning to the Participant for the breach. The Organiser \nshall notify the Participant in writing and shall indicate the specific provisions of the present \nrules which have been violated, including the circumstances of the breach.\n\n9.3      The Proxy is under the obligation to: \na) organise the procedure of submitting Participant quotations to Fixing, \nb) calculate the ROBID and ROBOR reference rates in accordance with the provisions of \nthe present rules,  \nc) directly announce (within 5 minutes from the Fixing at the latest) all reference rates \ncalculated during the Fixing and quotations submitted to Fixing by the Participants.\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/consiliulconcurentei.ro/posts/-consiliul-concuren%C8%9Bei-a-sanc%C8%9Bionat-10-b%C4%83nci-cu-amenzi-%C3%AEn-valoare-total%C4%83-de-373-/1428646429307775/  \n**Source:** [full]\n\n**Facebook post by @Consiliul Concurenței** — https://www.facebook.com/consiliulconcurentei.ro/posts/-consiliul-concuren%C8%9Bei-a-sanc%C8%9Bionat-10-b%C4%83nci-cu-amenzi-%C3%AEn-valoare-total%C4%83-de-373-/1428646429307775/\n\
  Date: 2026-06-07\nCaption: \U0001F4E2 Consiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru încălcarea normelor de concurență, respectiv legea concurenței și Tratatul privind Funcționarea Uniunii Europene, prin coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR.\n\nÎn urma investigației, autoritatea a constatat că băncile participante la stabilirea ROBOR și-au coordonat comportamentul printr-un schimb de informații confidențiale și strategice, în special referitoare la preț, cu privire la nivelul ROBOR în cadrul procedurii de fixing.\n\nCitiți mai multe informații despre investigația autorității în comunicatul de presă disponibil în comentarii ⬇️\nSource link: [consiliulconcurentei.ro](https://www.consiliulconcurentei.ro/wp-content/uploads/2026/02/Banci-final-Iunie-2026.pdf)\n</source>\n\n---\n\n<source>\n**URL:** http://storage0.dms.mpinteractiv.ro/media/1/1481/22466/23169198/2/banci-final-iunie-2026.pdf  \n**Source:** [full]\n\n---\nurl: http://storage0.dms.mpinteractiv.ro/media/1/1481/22466/23169198/2/banci-final-iunie-2026.pdf\n---\n \n \nCONSILIUL CONCURENȚEI A SANCȚIONAT 10 BĂNCI CU AMENZI  \nÎN VALOARE DE 3,73 MILIARDE LEI \nConsiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei \n(710 milioane euro) pentru încălcarea normelor de concurență, respectiv legea concurenței \nși Tratatul privind Funcționarea Uniunii Europene, prin coordonarea comportamentului în \ncadrul procedurii de stabilire a ROBOR. \n”Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă \nexclusiv la comportamentul băncilor în perioada fixingului ROBOR și este bazată, desigur, pe \nconstatarea încălcării regulilor de concurență, nu a altor norme. Decizia de sancționare a fost \nluată în unanimitate de Plenul Consiliului Concurenței. Amplele dezbateri publice anterioare \nadoptării deciziei nu sunt uzuale și au generat confuzie, motiv pentru care sunt necesare \nclarificări”, a declarat Bogdan Chirițoiu, președintele Consiliului Concurenței. \nAmenzile au fost aplicate astfel:  \n● Banca Comercială Română SA: 577,36 milioane  lei; \n● BRD-Groupe Société Générale SA: 412,47 milioane lei; \n● Banca Transilvania S.A.: 875,74 milioane lei; \n● Banca Transilvania SA (pentru fapta realizată de OTP Bank România SA): 85,03 milioane lei; \n● ING Bank N.V. Amsterdam Sucursala București: 405,91 milioane lei; \n● Raiffeisen Bank România SA: 442,49 milioane lei; \n● Exim Banca Românească SA: 96,49 milioane lei; \n● CEC Bank SA: 332,98 milioane lei; \n● UniCredit Bank SA: 431,03 milioane lei; \n● Banca Comercială Intesa Sanpaolo România SA: 28,1 milioane lei; \n● Libra Internet Bank SA: 45,86 milioane lei. \nÎn urma investigației, autoritatea a constatat că băncile participante la stabilirea ROBOR și-au \ncoordonat comportamentul printr-un schimb de informații confidențiale și strategice, în \nspecial referitoare la preț, cu privire la nivelul ROBOR în cadrul procedurii de fixing. \nConcret, în cadrul procedurii de fixing, când cotațiile ferme ar trebui să fie independente, \nbăncile și-au coordonat comportamentul în funcție de cotațiile concurenților. Independența \ncotațiilor din perioada de fixing este importantă, cu atât mai mult în cazul maturităților pentru \ncare volumul tranzacțiilor efective fiind redus (3, 6, 12 luni), media acestor tranzacții nu poate \nfi folosită ca indicator relevant.  \nRezultatul procedurii de fixing este folosit la calculul dobânzilor pentru unele credite. Astfel, \nun nivel crescut al acestui indice poate fi favorabil creditorilor, dar afectează în mod direct \nconsumatorii și ceilalți debitori ale căror contracte sunt raportate la ROBOR. \nConfidențialitatea cotațiilor ferme din perioada de fixing este prevăzută atât de regulile de \nconcurență, cât și de reglementările naționale și europene sectoriale. \n\n\n \n \n”Avem un ansamblu de probe care trebuie analizate coroborat.\
  \ Transparența tranzacțiilor \neste benefică în unele situații. Problema apare însă în cazul cotațiilor ferme transmise în \nperioada de fixing, care trebuie să rămână confidențiale, aspect esențial în cazul maturităților \nunde volumul tranzacțiilor efective este redus. Având în vedere volumul mare de credite, \nvariații de dimensiunea unei fracțiuni de procent pot genera sume substanțiale”, a adăugat \npreședintele Consiliului Concurenței. \nAtât la nivelul Uniunii Europene, cât al Statelor Unite ale Americii, autoritățile de concurență \nau aplicat mai multe amenzi pentru practici similare. Ca reacție la problemele identificate în \naceste cazuri, reglementările naționale privind stabilirea ratei de referință ROBOR au fost \nîmbunătățite. Cu toate acestea, în urma acestei investigații, autoritatea de concurență a \nidentificat comportamente anticoncurențiale la nivelul băncilor participante la procedura de \nfixing.  \nInvestigația a fost declanșată la sfârșitul anului 2022 și a parcurs toate procedurile de analiză \nși control, inclusiv etapa obligatorie de avizare prevăzută în cadrul mecanismului de \ncooperare cu Comisia Europeană, având în vedere constatarea încălcării TFUE. \nPentru a nu perturba funcționarea pieței, băncile au la dispoziție o perioadă de 60 zile de la \nprimirea motivării deciziei de sancționare pentru a prezenta planuri de măsuri prin care vor \nelimina practicile anticoncurențiale. Aceste planuri vor fi aprobate de către Consiliul \nConcurenței, oferind astfel băncilor certitudine juridică.  \nROBOR este rata de referință a pieței monetare interbancare ce influențează calculul \ndobânzilor pentru creditele acordate persoanelor juridice (inclusiv entități ale statului, \nprecum autorități publice locale), dar și calculul dobânzilor pentru persoanele fizice care au \ncredite acordate anterior anului 2019 și nu au făcut cerere să treacă la IRCC. \nReamintim că legislația în domeniul concurenței interzice orice înțelegeri între companii care \nîmpiedică, restrâng sau denaturează concurența pe piața românească.   \nDeciziile Consiliului Concurenței sunt executorii, iar amenzile aplicate reprezintă venituri la \nbugetul de stat. Agenția Națională de Administrare Fiscală (ANAF) pune în aplicare decizia de \nsancționare a autorității de concurență și execută amenzile.  \nDecizia Consiliului Concurenței va fi publicată pe pagina web a instituției, după eliminarea \ninformațiilor confidențiale. \nDecizia autorității de concurență poate fi atacată la Curtea de Apel în 30 de zile de la \ncomunicarea motivării. \n \nIunie 2026 \nTel.: 021.405.44.29 \nE-mail: presa@consiliulconcurentei.ro \n\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/consiliulconcurentei.ro/photos/-consiliul-concuren%C8%9Bei-a-sanc%C8%9Bionat-10-b%C4%83nci-cu-amenzi-%C3%AEn-valoare-total%C4%83-de-373-/1428643775974707/  \n**Source:** [snippet/paywall]\n\n... Banci-final-Iunie -2026.pdf. 10h. Profile photo of Sergiu. Sergiu Vlad. Și noi cei ce am plătit șmecheria lor? Statul dă amenzi pe ce au plătit ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.oradesibiu.ro/2026/06/07/amenzi-uriase-pentru-10-banci-din-romania-consiliul-concurentei-le-a-sanctionat-cu-37-miliarde-de-lei-pentru-manipularea-robor/  \n**Source:** [full]\n\n---\ntitle: Amenzi uriașe pentru 10 bănci din România: Consiliul Concurenței le-a sancționat cu 3,7 miliarde de lei pentru manipularea ROBOR\nurl: https://www.oradesibiu.ro/2026/06/07/amenzi-uriase-pentru-10-banci-din-romania-consiliul-concurentei-le-a-sanctionat-cu-37-miliarde-de-lei-pentru-manipularea-robor/\ndescription: Consiliul Concurenței a sancționat 10 bănci din România cu amenzi totale de 3,73 miliarde lei, acuzând coordonarea ilegală a cotațiilor în procedura de stabilire a ROBOR.\nsitename: Ora de Sibiu\ndate: 2026-06-07\n---\n## Pe scurt:\n\nZece bănci primesc amenzi record pentru manipularea ROBOR. Consiliul Concurenței acuză schimb de informații confidențiale între instituții financiare.\n\
  \nConsiliul Concurenței a anunțat duminică, 7 iunie 2026, sancționarea a 10 bănci din România cu amenzi totale de **3,73 miliarde lei** (aproximativ 710 milioane euro), pentru încălcarea legislației privind concurența, prin coordonarea comportamentului în cadrul procedurii de stabilire a **ROBOR**. Potrivit instituției, decizia a fost luată în unanimitate de Plenul Consiliului, după o investigație care a vizat exclusiv comportamentul băncilor în perioada fixingului ROBOR, nu reglementările sectorului bancar. Informațiile au fost transmise de Consiliul Concurenței printr-un comunicat oficial, citat de Ora de Sibiu.\n\nPreședintele Consiliului Concurenței, Bogdan Chirițoiu, a precizat: „Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR și este bazată, desigur, pe constatarea încălcării regulilor de concurență, nu a altor norme. Decizia de sancționare a fost luată în unanimitate de Plenul Consiliului Concurenței. Amplele dezbateri publice anterioare adoptării deciziei nu sunt uzuale și au generat confuzie, motiv pentru care sunt necesare clarificări”.\n\n## Printre băncile sancționate se numără: Banca Transilvania S\n\nPrintre băncile sancționate se numără: **Banca Transilvania S.A.** (875,74 milioane lei), Banca Transilvania SA (pentru fapta realizată de OTP Bank România SA – 85,03 milioane lei), **ING Bank N.V. Amsterdam Sucursala București** (405,91 milioane lei) și **Libra Internet Bank SA** (45,86 milioane lei).\n\nInvestigația a arătat că băncile participante la stabilirea ROBOR au făcut schimb de **informații confidențiale și strategice**, în special legate de preț, privind nivelul ROBOR în cadrul procedurii de fixing. În această perioadă, cotațiile ferme ar fi trebuit să fie independente, însă băncile și-au coordonat comportamentul în funcție de cotațiile concurenților. Independența cotațiilor este esențială, mai ales pentru maturitățile unde volumul tranzacțiilor efective este redus (3, 6, 12 luni), iar media acestor tranzacții nu poate fi folosită ca indicator relevant.\n\nRezultatul fixingului ROBOR influențează calculul dobânzilor pentru unele credite, astfel că un nivel crescut al acestui indice poate avantaja creditorii, dar afectează direct consumatorii și debitorii ale căror contracte sunt raportate la ROBOR. Confidențialitatea cotațiilor ferme este prevăzută atât de regulile de concurență, cât și de reglementările naționale și europene sectoriale.\n\n## „Avem un ansamblu de probe care trebuie analizate coroborat\n\n„Avem un ansamblu de probe care trebuie analizate coroborat. Transparența tranzacțiilor este benefică în unele situații. Problema apare însă în cazul cotațiilor ferme transmise în perioada de fixing, care trebuie să rămână confidențiale, aspect esențial în cazul maturităților unde volumul tranzacțiilor efective este redus. Având în vedere volumul mare de credite, variații de dimensiunea unei fracțiuni de procent pot genera sume substanțiale”, a adăugat Bogdan Chirițoiu.\n\nAutoritățile de concurență din Uniunea Europeană și Statele Unite au aplicat anterior amenzi pentru practici similare. Ca reacție la aceste probleme, reglementările naționale privind stabilirea ratei de referință ROBOR au fost îmbunătățite, însă investigația Consiliului Concurenței a identificat în continuare comportamente anticoncurențiale la nivelul băncilor participante la fixing.\n\nInvestigația a început la sfârșitul anului 2022 și a parcurs toate etapele de analiză și control, inclusiv avizarea obligatorie în cadrul mecanismului de cooperare cu Comisia Europeană, având în vedere încălcarea Tratatului privind Funcționarea Uniunii Europene.\n\nBăncile sancționate au la dispoziție 60 de zile de la primirea motivării deciziei pentru a prezenta planuri de măsuri care să elimine practicile anticoncurențiale. Aceste planuri vor fi aprobate de Consiliul Concurenței, oferind băncilor certitudine juridică.\n\nROBOR este rata de referință\
  \ a pieței monetare interbancare, influențând calculul dobânzilor pentru creditele acordate persoanelor juridice, inclusiv entități ale statului, dar și pentru persoanele fizice cu credite acordate înainte de 2019 care nu au trecut la IRCC. Unsprezece bănci din România au mai fost sancționate anterior de ANPC pentru modul de calcul al ratelor.\n\nLegislația în domeniul concurenței interzice orice înțelegeri între companii care restrâng sau denaturează concurența pe piața românească. Deciziile Consiliului Concurenței sunt executorii, iar amenzile aplicate devin venituri la bugetul de stat, fiind puse în aplicare de Agenția Națională de Administrare Fiscală (ANAF).\n\nDecizia Consiliului Concurenței va fi publicată pe site-ul instituției după eliminarea informațiilor confidențiale. Băncile pot contesta decizia la Curtea de Apel în termen de 30 de zile de la comunicarea motivării.\n</source>\n\n---\n\n<source>\n**URL:** https://www.bucurestifm.ro/2026/06/07/consiliul-concurentei-a-amendat-10-banci-cu-373-miliarde-de-lei-pentru-comportamentul-lor-in-perioada-fixingului-robor/  \n**Source:** [full]\n\n---\ntitle: Consiliul Concurenţei a amendat 10 bănci cu 3,73 miliarde de lei pentru comportamentul lor în perioada fixingului ROBOR - Radio Bucuresti FM - Radio Muzica Live Online - Stiri Bucuresti\nurl: https://www.bucurestifm.ro/2026/06/07/consiliul-concurentei-a-amendat-10-banci-cu-373-miliarde-de-lei-pentru-comportamentul-lor-in-perioada-fixingului-robor/\ndescription: Consiliul Concurenţei a amendat 10 bănci cu 3,73 miliarde de lei pentru comportamentul lor în perioada fixingului ROBOR.\nsitename: Radio Bucuresti FM - Radio Muzica Live Online - Stiri Bucuresti\ndate: 2026-06-07\n---\n# Consiliul Concurenţei a amendat 10 bănci cu 3,73 miliarde de lei pentru comportamentul lor în perioada fixingului ROBOR\n\nConsiliul Concurenţei a sancţionat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei pentru încălcarea normelor de concurenţă, respectiv legea concurenţei şi Tratatul privind Funcţionarea Uniunii Europene, prin coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR.\n\nArticol de  bucurestifm,\n7 iunie 2026, 16:34\n\n„Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR şi este bazată, desigur, pe constatarea încălcării regulilor de concurenţă, nu a altor norme”, a declarat Bogdan Chiriţoiu, preşedintele Consiliului Concurenţei, într-un comunicat de presă al autorităţii transmis duminică AGERPRES.\n\nCea mai mare amendă, 875,74 milioane lei, a fost aplicată Băncii Transilvania S.A. La aceasta se adaugă o amendă de 85,03 milioane lei aplicată Banca Transilvania SA pentru fapta realizată de OTP Bank România SA. Urmează Banca Comercială Română SA cu o amendă de 577,36 milioane lei; Raiffeisen Bank România SA cu o amendă 442,49 milioane lei; UniCredit Bank SA cu o amendă de 431,03 milioane lei; BRD-Groupe Societe Generale SA cu o amendă de 412,47 milioane lei; ING Bank N.V. Amsterdam Sucursala Bucureşti cu o amendă de 405,91 milioane lei; CEC Bank SA cu o amendă de 332,98 milioane lei; Exim Banca Românească SA cu o amendă de 96,49 milioane lei; Libra Internet Bank SA cu o amendă de 45,86 milioane lei şi Banca Comercială Intesa Sanpaolo România SA cu o amendă de 28,1 milioane lei.\n\nAutoritatea de concurenţă menţionează că, în urma investigaţiei, a constatat că băncile participante la stabilirea ROBOR şi-au coordonat comportamentul printr-un schimb de informaţii confidenţiale şi strategice, în special referitoare la preţ, cu privire la nivelul ROBOR în cadrul procedurii de fixing. Concret, în cadrul procedurii de fixing, când cotaţiile ferme ar trebui să fie independente, băncile şi-au coordonat comportamentul în funcţie de cotaţiile concurenţilor. Independenţa cotaţiilor din perioada de fixing este importantă, cu atât mai mult în cazul maturităţilor pentru care volumul tranzacţiilor efective fiind redus (3,\
  \ 6, 12 luni), media acestor tranzacţii nu poate fi folosită ca indicator relevant. Rezultatul procedurii de fixing este folosit la calculul dobânzilor pentru unele credite. Astfel, un nivel crescut al acestui indice poate fi favorabil creditorilor, dar afectează în mod direct consumatorii şi ceilalţi debitori ale căror contracte sunt raportate la ROBOR.\n\n„Avem un ansamblu de probe care trebuie analizate coroborat. Transparenţa tranzacţiilor este benefică în unele situaţii. Problema apare însă în cazul cotaţiilor ferme transmise în perioada de fixing, care trebuie să rămână confidenţiale, aspect esenţial în cazul maturităţilor unde volumul tranzacţiilor efective este redus. Având în vedere volumul mare de credite, variaţii de dimensiunea unei fracţiuni de procent pot genera sume substanţiale”, a subliniat preşedintele Consiliului Concurenţei, Bogdan Chiriţoiu.\n\nInvestigaţia a fost declanşată la sfârşitul anului 2022 şi a parcurs toate procedurile de analizăşi control, inclusiv etapa obligatorie de avizare prevăzută în cadrul mecanismului de cooperare cu Comisia Europeană, având în vedere constatarea încălcării TFUE. Pentru a nu perturba funcţionarea pieţei, băncile au la dispoziţie o perioadă de 60 zile de la primirea motivării deciziei de sancţionare pentru a prezenta planuri de măsuri prin care vor elimina practicile anticoncurenţiale. Aceste planuri vor fi aprobate de către Consiliul Concurenţei, oferind astfel băncilor certitudine juridică.\n\nROBOR este rata de referinţă a pieţei monetare interbancare ce influenţează calculul dobânzilor pentru creditele acordate persoanelor juridice (inclusiv entităţi ale statului, precum autorităţi publice locale), dar şi calculul dobânzilor pentru persoanele fizice care au credite acordate anterior anului 2019 şi nu au făcut cerere să treacă la IRCC.\n\nDeciziile Consiliului Concurenţei sunt executorii, iar amenzile aplicate reprezintă venituri la bugetul de stat. Agenţia Naţională de Administrare Fiscală (ANAF) pune în aplicare decizia de sancţionare a autorităţii de concurenţă şi execută amenzile.Decizia Consiliului Concurenţei va fi publicată pe pagina web a instituţiei, după eliminarea informaţiilor confidenţiale. Decizia autorităţii de concurenţă poate fi atacată la Curtea de Apel în 30 de zile de la comunicarea motivării.\n\nLegea concurenţei interzice orice înţelegeri între companii care împiedică, restrâng sau denaturează concurenţa pe piaţa românească, notează sursa citată.\n</source>\n\n---\n\n<source>\n**URL:** https://www.luba.ro/consiliul-concurentei-a-amendat-10-banci-cu-700-milioane-euro-coordonarea-comportamentului-in-cadrul-procedurii-de-stabilire-a-robor  \n**Source:** [full]\n\n---\ntitle: Consiliul Concurentei a amendat 10 banci cu 700 milioane euro: „Coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR”\nurl: https://www.luba.ro/consiliul-concurentei-a-amendat-10-banci-cu-700-milioane-euro-coordonarea-comportamentului-in-cadrul-procedurii-de-stabilire-a-robor\ndescription: Consiliul Concurentei a amendat 10 banci cu 700 milioane euro: „Coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR”\nsitename: Luba\ndate: 2008-01-01\n---\n# Consiliul Concurentei a amendat 10 banci cu 700 milioane euro: „Coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR”\n\n07 June 2026 19:14 Lumea Banilor*1508*\n\n**Consiliul Concurentei condus de Bogda Chiritoiu (foto) a anuntat duminica, 7 iunie 2026, ca a sanctionat 10 banci cu amenzi in valoare totala de 3,73 miliarde lei (710 milioane euro) pentru incalcarea normelor de concurenta, respectiv legea concurentei si Tratatul privind Functionarea Uniunii Europene, prin coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR. **\n\n\nPotrivit lui Chiritoiu, decizia nu a vizat reglementarile sau politicile din sectorul bancar”\n\n*”Decizia noastra nu a vizat reglementarile sau politicile din sectorul bancar, ci se rezuma exclusiv la comportamentul bancilor in perioada fixingului\
  \ ROBOR si este bazata, desigur, pe constatarea incalcarii regulilor de concurenta, nu a altor norme. Decizia de sanctionare a fost luata in unanimitate de Plenul Consiliului Concurentei. Amplele dezbateri publice anterioare adoptarii deciziei nu sunt uzuale si au generat confuzie, motiv pentru care sunt necesare clarificari”, *a declarat Bogdan Chiritoiu, presedintele Consiliului Concurentei.\n\n**Amenzile au fost aplicate astfel:**\n\n*● Banca Comerciala Romana SA: 577,36 milioane lei;\n● BRD-Groupe Société Générale SA: 412,47 milioane lei;\n● Banca Transilvania S.A.: 875,74 milioane lei;\n● Banca Transilvania SA (pentru fapta realizata de OTP Bank Romania SA): 85,03 milioane lei;\n● ING Bank N.V. Amsterdam Sucursala Bucuresti: 405,91 milioane lei;\n● Raiffeisen Bank Romania SA: 442,49 milioane lei;\n● Exim Banca Romaneasca SA: 96,49 milioane lei; ● CEC Bank SA: 332,98 milioane lei;\n● UniCredit Bank SA: 431,03 milioane lei;\n● Banca Comerciala Intesa Sanpaolo Romania SA: 28,1 milioane lei;\n● Libra Internet Bank SA: 45,86 milioane lei. *\n\n*“In urma investigatiei, autoritatea a constatat ca bancile participante la stabilirea ROBOR si-au coordonat comportamentul printr-un schimb de informatii confidentiale si strategice, in special referitoare la pret, cu privire la nivelul ROBOR in cadrul procedurii de fixing. Concret, in cadrul procedurii de fixing, cand cotatiile ferme ar trebui sa fie independente, bancile si-au coordonat comportamentul in functie de cotatiile concurentilor. Independenta cotatiilor din perioada de fixing este importanta, cu atat mai mult in cazul maturitatilor pentru care volumul tranzactiilor efective fiind redus (3, 6, 12 luni), media acestor tranzactii nu poate fi folosita ca indicator relevant”,* sustine institutia condusa de Chititoiu.\n\n**Prezentam comunicatul Consiliului Concurentei:**\n\n\nSursa foto: Facebook Consiliul Concurentei\n\nUltimele articole\n\n###\nSarbatorile vin cu blocarea conturilor\n\n26 December 2023 14:21\n###\nRomanii platesc cash de sarbatori\n\n22 December 2023 16:52\n###\nRomanii au cumparat titluri de stat de 2,4 miliarde lei\n\n21 December 2023 18:24\nVezi toate noutatile\n</source>\n\n---\n\n<source>\n**URL:** https://www.bursa.ro/zece-banci-sanctionate-de-consiliul-concurentei-pentru-coordonarea-comportamentului-in-cadrul-procedurii-de-stabilire-a-robor-04732950  \n**Source:** [full]\n\n---\ntitle: Zece bănci, sancţionate de Consiliul Concurenţei pentru coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR\nurl: https://www.bursa.ro/zece-banci-sanctionate-de-consiliul-concurentei-pentru-coordonarea-comportamentului-in-cadrul-procedurii-de-stabilire-a-robor-04732950\ndescription: *ACTUALIZARE Exim Banca Românească respinge ferm concluziile investigaţiei derulate de Consiliul Concurenţei---*ACTUALIZARE - ING Bank respinge concluziile Consiliului Concurenţei---*ACTUALIZARE -<link>https://www.bursa.ro/actiunile-principalelor-banci-listate-la-bvb-scad-cu-peste-1-5-procente-dupa-amenzile-aplicate-de-consiliul-concurentei-20142951<link2>Acţiunile principalelor bănci listate la BVB scad cu peste 1,5% după amenzile aplicate de Consiliul Concurenţei<link3>---*ACTUALIZARE - Raiffeisen Bank: Concluziile Consiliului Concurenţei nu reflectă realităţile pieţei interbancare---*ACTUALIZARE - BT: Decizia Consiliului Concurenţei nu are nicio fundamentare---*ACTUALIZARE - CEC Bank anunţă că va contesta în instanţă sancţiunea Consiliului Concurenţei---*ACTUALIZARE - BCR anunţă că respinge şi consideră ”neîntemeiate” concluziile Consiliului Concurenţei---*ACTUALIZARE - Reprezentanţii Unicredit Bank: ”Poziţia noastră este fără echivoc: decizia Consiliului Concurenţei este injustă”---*ACTUALIZARE - Omer Tetik, CEO Banca Transilvania: ”Vom lupta să ne dovedim nevinovăţia şi să arătăm că BT a acţionat corect şi legal”---*ACTUALIZARE - BRD anunţă că va contesta decizia Consiliului Concurenţei---Consiliul Concurenţei a aplicat amenzi cumulate de 3,73 miliarde de lei unui număr de\
  \ zece instituţii bancare, după ce a concluzionat că acestea au încălcat legislaţia concurenţei şi prevederile Tratatului privind Funcţionarea Uniunii Europene prin coordonarea comportamentului în procesul de stabilire a indicelui ROBOR\nsitename: Ziarul Bursa\ndate: 2026-06-07\n---\nActualizare ** Exim Banca Românească respinge ferm concluziile investigaţiei derulate de Consiliul Concurenţei**\n\nPe parcursul întregii investigaţii, Exim Banca Românească a pus la dispoziţia autorităţii un volum consistent de date, analize şi explicaţii tehnice care demonstrează că activitatea sa s-a desfăşurat strict în limitele cadrului legal şi ale reglementărilor aplicabile.\n\nConform sursei citate, preşedintele Consiliului Concurenţei, Bogdan Chiriţoiu, a declarat: \"Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR şi este bazată, desigur, pe constatarea încălcării regulilor de concurenţă, nu a altor norme\".\n\nÎn urma investigaţiei, autoritatea de concurenţă a stabilit că băncile implicate în procesul de stabilire a ROBOR au făcut schimb de informaţii considerate confidenţiale şi strategice, în special referitoare la nivelul cotaţiilor de preţ. Potrivit concluziilor anchetei, în perioada fixingului, când fiecare participant ar trebui să transmită independent propriile cotaţii ferme, instituţiile financiare şi-au adaptat comportamentul în funcţie de informaţiile provenite de la concurenţi, conform comunicatului instituţiei.\n\n„Analiza noastră se bazează pe un ansamblu de probe care trebuie evaluate împreună. Deşi transparenţa poate avea efecte benefice în anumite contexte, situaţia este diferită în cazul cotaţiilor ferme din perioada fixingului, care trebuie să rămână confidenţiale. Acest aspect este cu atât mai important pentru maturităţile unde numărul tranzacţiilor este redus. În condiţiile unui volum foarte mare de credite, chiar şi variaţii minore ale indicelui pot genera efecte financiare semnificative”, a explicat Bogdan Chiriţoiu.\n</source>\n\n---\n\n<source>\n**URL:** https://www.profit.ro/povesti-cu-profit/financiar/exclusiv-ultima-ora-amenzi-record-banci-robor-sanctiuni-totale-circa-800-milioane-euro-banci-propuse-consilul-concurentei-surse-anul-trecut-toate-amenzile-date-concurenta-au-nici-70-milioane-euro-22470132  \n**Source:** [full]\n\n---\ntitle: EXCLUSIV ULTIMA ORĂ Amenzi record la bănci pentru ROBOR. Sancțiuni totale de circa 800 milioane euro pentru bănci propuse de Consiliul Concurenței - surse. Anul trecut, toate amenzile date de Concurență au fost de nici 70 milioane euro\nurl: https://www.profit.ro/povesti-cu-profit/financiar/exclusiv-ultima-ora-amenzi-record-banci-robor-sanctiuni-totale-circa-800-milioane-euro-banci-propuse-consiliul-concurentei-surse-anul-trecut-toate-amenzile-date-concurenta-au-nici-70-milioane-euro-22470132\ndescription: Consiliul Concurenței a redactat o propunere pentru amenzi totale de circa 800 de milioane de euro care să fie aplicate băncilor care, în trecut, în opinia instituției, ar fi manipulat indicele ROBOR al pieței interbancare, potrivit informațiilor obținute de Profit.ro.\nsitename: Profit.ro\ndate: 2026-06-05\n---\nIndicele ROBOR este relevant pentru stabilirea dobânzilor pentru o parte importantă a creditelor, deși relevanța acestuia s-a mai redus după ce pentru creditele ipotcare a fost înlocuit cu indicele IRCC.\n\n### Înainte de a fi prezentată aici, informația a fost anunțată pe Profit Insider\n\nFormal, propunerea pregătită de către Consiliul Concurenței, pentru amenzi totale de circa 800 de milioane de euro, trebuie aprobată de plenul Consiliului.\n\n\n\n*CITEȘTE ȘI*REACȚIA BRD după ce angajați ai băncii au ieșit în stradăPentru comparație, amenzile totale aplicate de către Consiliul Concurenței pe parcursul întregului an 2025 au fost de doar 68,9 milioane de euro.\n\nRaportul de control al Consiliului Concurenței pe acest subiect are 700 de pagini, iar băncile vizate\
  \ vor trebui să răspundă și să prezinte puncte de vedere.\n\nDecizia plenului ar urma să fie luată în perioada următoare, posibil până la final de iunie, când se termină actualul mandat al echipei de conducere.\n\n\n\n*CITEȘTE ȘI*Caz grav în supermarket. Ministrul Agriculturii declanșează controale după cazul prezentat de Profit.ro - Legume și fructe aduse din Turcia sunt reetichetate ca produse în România și vândute în unul din cele mai mari lanțuri, în toată țaraSuma propusă pentru amenzi este una foarte ridicată și ar putea avea chiar impact asupra sectorului bancar.\n\nConsiliul Concurenței se află în fazele finale ale investigației privind cele zece bănci participante la panelul de stabilire al cotațiilor zilnice ROBOR, a anunțat anterior Profit.ro.\n\nRaportul preliminar, care a fost trimis băncilor comerciale, cât și BNR, arată posibile încălcări ale legii concurenței, în opinia comisarilor, ceea ce s-ar putea transforma în sancțiuni după o decizie a plenului Consiliului, așteptată la începutul lunii următoare.\n\n### Investigația a început în 2022\n\nInspectorii au verificat atunci calculatoarele și telefoanele șefilor de Trezorerie, ale dealerilor, dar și ale președinților sau directorilor executivi, deschizând emailuri, mesagerii Whatsapp și platforma de comunicare între dealeri, arătau sursele Profit.ro.\n\n\n\n*CITEȘTE ȘI*ANUNȚ Criterii împotriva politicienilor și a familiilor acestora în noua procedură de recrutare pentru conducerea băncii de dezvoltare BIDComunicările din e-mail-uri și mesagerii mobile ale bancherilor s-au făcut având drept cuvinte de căutare nume ale dealerilor din alte bănci, vizând discuții despre cotații ROBOR, și a fost verificată și corespondența președinților de bănci cu departamentele de Trezorerie.\n\nInspectorii au încheiat controalele cu procese verbale cuprinzând sursele verificate și documentele sau corespondența pentru care s-au făcut copii.\n\nCele 10 bănci vizate au fost Banca Transilvania, BCR, BRD-Societe Generale, ING Bank, Raiffeisen Bank, CEC Bank, UniCredit Bank, OTP Bank România, EximBank și Intesa Sanpaolo România, acestea fiind cele care participă la calculul ratei ROBOR.\n\nO investigație similară a fost declanșată de Consiliul Concurenței în octombrie 2008, după ce BNR acuzase mai multe bănci că au \"atacat leul\", și a aplicat amenzi uriașe Raiffeisen și BRD, în condițiile în care sancțiunile pentru înțelegeri anti-concurențiale se stabilesc ca procent din cifra de afaceri, până la 1%.\n\n\n\n*CITEȘTE ȘI*România vrea un nou împrumut de la Guvernul SUA pentru achiziții militare chiar de la companii americane. ”Potențial de circa 3 miliarde dolari”La BRD, inspectorii au sancționat atunci refuzul băncii de a le permite accesul la calculatorul directorului general de atunci, Patrick Gelin, acuzând neacordarea dreptului la inspecție.\n\nRaiffeisen a primit amendă pentru transmiterea de informații inexacte către inspectorii de concurență.\n\nDupă contestații în instanță, BRD, care a atacat și la Curtea Constituțională, a obținut anularea sancțiunilor de 4 milioane de euro, iar Raiffeisen doar reducerea la jumătate a cuantumului inițial de 3,4 milioane de euro.\n\nÎn final, în afară de cele două bănci, raportul Consiliului Concurenței (desecretizat în 2019), care suspectase atunci băncile că s-au cartelizat pentru creșterea ratelor de dobândă și a adunat documente în contol, a ajuns la concluzia că de vină pentru creșterea ratelor a fost de fapt criza financiară internațională.\n\nRata ROBOR pentru fiecare scadență este calculată de băncile agenți de calcul ca medie aritmetică a ultimelor rate cotate de fiecare participant la Fixing pentru depozitele plasate într-un interval de 30 minute înainte de fixing, după eliminarea extremelor. Rata cotată de către un participant pentru Fixing reprezintă rata la care sunt oferite depozite în RON unui alt participant timp de 15 minute de la publicarea ratelor ROBID și ROBOR de către agentul de calcul. Ratele ROBID și ROBOR stabilite la fixing\
  \ sunt publicate de agentul de calcul în aceeași zi în termen de 5 minute de la fixing.\n</source>\n\n---\n\n<source>\n**URL:** https://www.instagram.com/reel/DZUgPbolKrZ/  \n**Source:** [full]\n\n**Instagram post by @rotaurul** — https://www.instagram.com/reel/DZUgPbolKrZ/\nDate: 2026-06-08\nCaption: Scandal ROBOR: 10 bănci din România primesc amendă record de 3.73 MILIARDE LEI de la Consiliul Concurentei #Banci #Robor #Amenzi #Manipulare #SistemBancar #ConsiliulConcurentei #3.73mldlei \n\n  CONSILIUL CONCURENȚEI A SANCȚIONAT 10 BĂNCI CU AMENZI ÎN VALOARE DE 3.73 MILIARDE LEI. Articol complet: https://bit.ly/3QaPhG1\n\n----------------------------------------------------------------------\n\nDacă sunt utile informațiile, nu uita să te abonezi:\n\nFacebook: RO taurul\nInstagram: https://bit.ly/46cVSEP\nTikTok: https://bit.ly/4rVuTWS\nYoutube: https://bit.ly/4tGI13K\n\n----------------------------------------------------------------------\n\n  Pe acest canal NU oferim sfaturi financiare, deci NFA. Înainte de a face orice investiție, CERCETEAZĂ (DYOR), pentru a vedea dacă investiția se potrivește toleranței tale de risc/recompensă.\n\n----------------------------------------------------------------------\n\n#ROBOR #banci #Romania #dobanzi #credite #IRCC #BNR #MugurIsarescu #economie #finante #inflatie #stirifinanciare #investitii #consiliulconcurentei #scandalROBOR #crizaeconomica #bancar #creditebancare #actualitate\nSource link: [bit.ly](https://bit.ly/3QaPhG1)\nSource link: [bit.ly](https://bit.ly/46cVSEP)\nSource link: [bit.ly](https://bit.ly/4rVuTWS)\nSource link: [bit.ly](https://bit.ly/4tGI13K)\n</source>\n\n---\n\n<source>\n**URL:** https://renasterea.ro/consiliul-concurentei-a-amendat-10-banci-cu-373-miliarde-lei-in-cazul-robor/  \n**Source:** [full]\n\n---\ntitle: Consiliul Concurenței a amendat 10 bănci cu 3,73 miliarde lei în cazul ROBOR\nurl: https://renasterea.ro/consiliul-concurentei-a-amendat-10-banci-cu-373-miliarde-lei-in-cazul-robor/\ndescription: Consiliul Concurenței a amendat 10 bănci cu 3,73 miliarde lei în cazul ROBOR. Consiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei pentru încălcarea normelor...\nsitename: Renaşterea bănăţeană\ndate: 2026-06-07\n---\n**Consiliul Concurenței a amendat 10 bănci cu 3,73 miliarde lei în cazul ROBOR.**\n\nConsiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei pentru încălcarea normelor de concurență în cadrul procedurii de stabilire a ROBOR.\n\nConsiliul Concurenței a transmis într-un comunicat că a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru încălcarea normelor de concurență, respectiv legea concurenței și Tratatul privind Funcționarea Uniunii Europene, prin coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR.\n\n„Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR și este bazată, desigur, pe constatarea încălcării regulilor de concurență, nu a altor norme. Decizia de sancționare a fost luată în unanimitate de Plenul Consiliului Concurenței. Amplele dezbateri publice anterioare adoptării deciziei nu sunt uzuale și au generat confuzie, motiv pentru care sunt necesare clarificări”, a declarat Bogdan Chirițoiu, președintele Consiliului Concurenței.\n\nPotrivit instituției, în perioada de fixing, cotațiile ferme ar trebui să fie independente, însă băncile și-ar fi coordonat comportamentul în funcție de cotațiile concurenților. Consiliul Concurenței arată că acest aspect este important mai ales în cazul maturităților pentru care volumul tranzacțiilor efective este redus, precum cele la 3, 6 și 12 luni.\n\nRezultatul procedurii de fixing este folosit la calculul dobânzilor pentru unele credite. Un nivel crescut al ROBOR poate fi favorabil creditorilor, dar afectează direct consumatorii și ceilalți debitori ale căror contracte sunt\
  \ raportate la acest indice.\n\nAmenzile aplicate de Consiliul Concurenței\n\nBanca Comercială Română SA: 577,36 milioane lei;\n\nBRD-Groupe Société Générale SA: 412,47 milioane lei;\n\nBanca Transilvania S.A.: 875,74 milioane lei;\n\nBanca Transilvania SA (pentru fapta realizată de OTP Bank România SA): 85,03 milioane lei;\n\nING Bank N.V. Amsterdam Sucursala București: 405,91 milioane lei;\n\nRaiffeisen Bank România SA: 442,49 milioane lei;\n\nExim Banca Românească SA: 96,49 milioane lei;\n\nCEC Bank SA: 332,98 milioane lei;\n\nUniCredit Bank SA: 431,03 milioane lei;\n\nBanca Comercială Intesa Sanpaolo România SA: 28,1 milioane lei;\n\nLibra Internet Bank SA: 45,86 milioane lei.\n\nInvestigația a fost declanșată la sfârșitul anului 2022 și a parcurs toate procedurile de analiză și control, inclusiv etapa obligatorie de avizare prevăzută în cadrul mecanismului de cooperare cu Comisia Europeană, având în vedere constatarea încălcării TFUE.\n\nBăncile au la dispoziție 60 de zile de la primirea motivării deciziei pentru a prezenta planuri de măsuri prin care să elimine practicile anticoncurențiale. Aceste planuri vor fi aprobate de Consiliul Concurenței.\n\nROBOR este rata de referință a pieței monetare interbancare și influențează calculul dobânzilor pentru creditele acordate persoanelor juridice, dar și pentru persoanele fizice care au credite acordate înainte de 2019 și nu au cerut trecerea la IRCC.\n\n(sursa: Mediafax)\n\nFoto: Antena 3 CNN\n\n**CITEȘTE ȘI: **Cum ar putea arăta Guvernul Tomac. Numele discutate pentru principalele ministere\n\nCum ar putea arăta Guvernul Tomac. Numele discutate pentru principalele ministere\n</source>\n\n---\n\n<source>\n**URL:** https://www.cursbnr.ro/ircc  \n**Source:** [full]\n\n---\ntitle: IRCC, Indicele de referință pentru creditele consumatorilor | Curs BNR\nurl: https://www.cursbnr.ro/ircc\ndescription: Definiție, istoric si grafic IRCC zilnic si trimestrial\nsitename: 2026 Cursbnr\ndate: 2026-03-31\n---\n\n### Citatul zilei\n\n“Take time to deliberate; but when the time for action arrives, stop thinking and go in.”\n\nNapoleon Bonaparte\n\n# IRCC\n\n**Scurtă definiție. Ce înseamnă de fapt IRCC?**\n\nIRCC înseamnă **Indicele de referință pentru creditele consumatorilor**. Avem doua siuații: indice trimestrial și indice zilnic.\n**IRCC zilnic** al pieței monetare interbancare se calculează zilnic și reprezintă media ponderată (cu volumele tranzacțiilor) a ratelor de dobândă ale tranzacțiilor de pe piața monetară interbancară.\n**IRCC trimestrial** se calculează la finalul fiecărui trimestru. IRCC trimestrial se stabilește drept media aritmetică a valorilor IRCC zilnice comunicate pentru trimestrul anterior (se iau in considerare toate zilele lucrătoare din trimestru), urmând a se aplica de fiecare instituție de credit pentru trimestrul următor.\n\nActualizare 1 aprilie 2026: Valoarea curentă **IRCC 2025T4** este de **5.58%**. De la 1 iulie 2026, **IRCC 2026T1** va scădea urmând să aibă valoarea **5.56%**.\n\n| Perioada | Valoare IRCC trimestrial |\n|---|---|\n| 2025T4 | 5,58 |\n| 2025T3 | 5,68 |\n| 2025T2 | 6,06 |\n| 2025T1 | 5,55 |\n| 2024T4 | 5,55 |\n| 2024T3 | 5,66 |\n| 2024T2 | 5,99 |\n| 2024T1 | 5,86 |\n| 2023T4 | 5,90 |\n| 2023T3 | 5,97 |\n| 2023T2 | 5,96 |\n| 2023T1 | 5,94 |\n| 2022T4 | 5,98 |\n| 2022T3 | 5,71 |\n| 2022T2 | 4,06 |\n| 2022T1 | 2,65 |\n| 2021T4 | 1,86 |\n| 2021T3 | 1,17 |\n| 2021T2 | 1,08 |\n| 2021T1 | 1,25 |\n| 2020T4 | 1,67 |\n| 2020T3 | 1,88 |\n| 2020T2 | 2,17 |\n| 2020T1 | 2,41 |\n| 2019T4 | 2,44 |\n| 2019T3 | 2,36 |\n| 2019T2 | 2,66 |\n| 2019T1 | 2,63 |\n| 2018T4 | 2,36 |\n\n\n**Istoric și grafic IRCC zilnic**\n\nsau\n\nValorile extreme ale indicelui **IRCC zilnic** în perioada 6 martie 2026 - 8 iunie 2026:\n\nValoare maxima: **5.72 %** (31 martie 2026)\n\nValoare minima: **5.47 %** (8 mai 2026)\n\nValoare medie pentru perioada selectată este **5.57 %**\n\n| Data | IRCC zilnic | Variație | |\n|---|---|---|---|\n| 5 Iun. 2026 | 5.58 | +0.05 | 0.9 % |\n| 4 Iun