  \ să  ai  la  bază  o \n motivație  economică.  Da,  asta  în  primul \n rând.  Doi,  bineînțeles  că  poate  fi \n interpretat  că  ar  putea  fi  o  decizie \n politică  sau  orice  altceva.  Adică  am \n putea  intra  pe  un  teritoriu  al \n conspirației.  Dar  dincolo  de  acest \n lucru,  întotdeauna \n are  în  spate  trebuie  să  fie  o  dovadă \n economică.  Da.  Nu  te  poți  duce  în \n justiție.  spunând  că  nu  mi  plac  băncile. \n Da.  Sau  că  băncile  din  România  au  un \n profit \n foarte  mare  față  de  situația  economică \n din  țară.  Nu  te  poți  duce  în  instanță  și \n să  spui  că  așa  au  discutat  parlamentarii \n și  uite  cum  au  fost  discuțiile  din  din \n spațiul  public  și  haideți  să  ardem \n băncile  respective.  Nu  trebuie  să  când \n te  duci  în  justiție  trebuie  ca  în \n spatele  unei  decizii  trebuie  să  ai  și  un \n proces  economic  sau  un  calcul  economic. \n Eu  aice  m  aș  lega  de  acest  lucru.  Adică \n m  aș  lega  după  ce  Consiliul  Concurențe \n va  face  public  dosarul,  după  ce  el  va \n ajunge,  va  fi  contestat  de  către  bănci \n în  instanță  pentru  a  vedea  pașii,  pașii \n procedurali  și  ulterior  pașii  de \n motivație  economică. \n Bineînțeles  și  și  nu  numai  la  noi  și \n peste  tot  în  lume  în  momentul  în  care \n intervin  băncile  sau  companii  mari, \n toată  lumea  spune  că  ei  poate  să  fie  are \n și  o  miză  politică.  Bineînțeles  că \n instituțiile  și  în  special  America  este \n campionul  acestor  procese.  Instituțiile \n statului,  cei  care  conduc  instituțiile \n statului  se  îndreaptă  către  companiile \n mari.  Da.  Și  în  America  am  avut  văzut  și \n vedem  procese  între  autoritățile \n federale, \n statale,  americane  și  marile  companii, \n marile  bănci  privind  anumite  cazuri. \n Yeah.\n</source>\n\n---\n\n<source>\n**URL:** https://informat.ro/en/economy/cec-bank-contests-the-fine-of-332-million-lei-for-manipulating-robor-125107  \n**Source:** [snippet/paywall]\n\n... Competition Council has fined 10 banks in Romania a total of 3.73 billion lei · event image. Current Affairs. ING Bank was fined 405.91 million ...\n</source>\n\n---\n\n<source>\n**URL:** https://x.com/RRInternational/status/2063784753052959150  \n**Source:** [snippet/paywall]\n\nRomania's 10 largest banks were fined €710 million by the Competition Council 4 exchanging confidential #information with the aim of ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.businessforum.ro/finance/20260408/romanian-banks-contest-competition-councils-preliminary-robor-report-3074  \n**Source:** [full]\n\n---\ntitle: Romanian banks contest Competition Councils preliminary ROBOR report - Business Forum\nurl: https://www.businessforum.ro/finance/20260408/romanian-banks-contest-competition-councils-preliminary-robor-report-3074\ndescription: Several of Romanias largest financial institutions have issued official statements to the Bucharest Stock Exchange (BVB) following the receipt of a preliminary report from the Competition Council.\nsitename: Business Forum\ndate: 2026-04-08\n---\nThe investigation, which began in October 2022, concerns an alleged agreement or concerted practice among 10 banks to coordinate the setting of the ROBOR reference rate during \"fixing\" procedures.\n\nBanca Transilvania (BT), BCR, BRD, Raiffeisen Bank, CEC Bank, Libra Internet Bank, and UniCredit Bank confirmed they received the documentation on 6 and 7 April 2026. The banks emphasised that the report is an intermediate procedural step and does not constitute a final legal decision or a confirmed sanction.\n\nThe institutions have collectively maintained that their market conduct has remained fully compliant with national and European regulations. According to the BVB filings, the banks now have the opportunity to submit observations and solid arguments before a final hearing.\n\nThe Competition Council's final decision could involve rejecting the\
  \ report, returning it for completion, or imposing individualised sanctions. Any potential fine can be appealed at the Bucharest Court of Appeal within 30 days of issuance.\n</source>\n\n---\n\n<source>\n**URL:** https://www.romania-insider.com/fines-banks-ro-collusion-apr-2026  \n**Source:** [full]\n\n---\ntitle: Romania’s competition body sets high fines for banks for collusion\nurl: https://www.romania-insider.com/fines-banks-ro-collusion-apr-2026\ndescription: Romania’s Competition Council sent to the European Commission and to the relevant banks the results of an investigation launched in 2022 on the alleged collusion of ten local lenders that manipulated the interbank interest rate ROBOR with the final aim of increasing the interest rates paid by...\nsitename: Romania Insider\ndate: 2026-04-08\n---\n# Romania’s competition body sets high fines for banks for collusion\n\nRomania’s Competition Council sent to the European Commission and to the relevant banks the results of an investigation launched in 2022 on the alleged collusion of ten local lenders that manipulated the interbank interest rate ROBOR with the final aim of increasing the interest rates paid by their mortgage debtors, [Bursa ](https://www.bursa.ro/bancile-au-fost-informate-de-consiliul-concurentei-asupra-motivelor-pentru-care-ar-urma-sa-fie-sanctionate-amenzile-propuse-sunt-enorme-05548855)announced.\n\nThe fines proposed by the Council reportedly reach 10% of the annual turnover in some cases, but are subject to appeals that the banks can file before May 13.\n\nAccording to Bursa, the ten lenders that received the Competition Council's report include the largest banks: BCR (Erste Group), Banca Transilvania, ING Bank, BRD Groupe Societe Generale, Raiffeisen Bank, Unicredit, Intesa Sanpaolo Bank, CEC Bank, Eximbank, and Libra Internet Bank.\n\nThe investigation relates to fixing the interbank reference rate ROBOR, a benchmark that did not reflect the actual market operations but rather some quotations given by the ten banks. The rate was used, however, for the actual calculation of mortgage interest rates.\n\nBanca Transilvania (BVB: TLV), listed on the Bucharest Exchange, rejected the accusations and announced it would appeal the fine. ING Bank also said its activity has observed all legal requirements.\n\nBased on the banks’ 2024 turnover and assuming a 10% fine (the highest fine, reportedly proposed for some of the banks) for all of them, Bursa calculated a total fine of EUR 1 billion.\n\nThe banks subject to fines are to send their opinions on the subject to the investigative committee by May 13, after which the final decision will be adopted by the nine members of the Council's plenary session, the Competition Council told Bursa.\n\nThe institution has been investigating lenders that participate in the calculation of the ROBOR interest rate since 2022.\n\nThe Competition Council’s investigation was launched shortly after Mugur Isărescu, the governor of the National Bank of Romania (BNR), stated that banks had exaggerated by raising ROBOR above the key interest rate.\n\n\"ROBOR has been moving close to the monetary policy interest rate. However, for more than 4-5 months, it has been decoupled. Banks jumped the gun and raised ROBOR above the key interest rate. They overreacted. There was a clear tendency for banks and traders to view the future pessimistically. Perhaps liquidity conditions made banks jump the gun with ROBOR\".\n\nAdrian Vasilescu, strategy consultant at the BNR, believed, at the time, that there were no situations that exceeded the limits of the law.\n\nThis is not the Council's only investigation into the banking sector. In 2023, the Competition Council launched an investigation into the way some banks calculate credit scores, suspecting that this blocks some customers' access to loans and makes refinancing more difficult.\n\n*(Photo: Oohchisa Tunsiri/ Dreamstime)*\n\n*iulian@romania-insider.com*\n</source>\n\n---\n\n<source>\n**URL:**