brief: 'Romania''s competition authority fined ten banks a record 3.73 billion lei for coordinating their conduct in setting the ROBOR interbank benchmark.


  <research_guidance>

  The goal is to verify the brief''s main claims, not to gather maximum coverage. When the primary outlets the brief credits have been reached, the research is done.


  An attributed quote in the brief carries two distinct things: the words said, and the setting in which they were said — the event, venue, occasion, or date. The setting makes the original article findable; the topic of the quote is *inside* the article and appears in many pieces.


  For a research direction chasing an attributed-quote primary, name both the outlet AND the setting, and optionally include a suggested query in the form `site:<domain> <setting> <speaker>`.


  When executing an attributed-quote chase, the query is `site:<domain> <setting cue> <speaker>` — that''s it. Don''t add the topics from the quote; they live inside the article and combining them rarely lets all terms co-occur on one page. If the plan already gives a suggested `site:...` query, execute it verbatim before generating your own variants.

