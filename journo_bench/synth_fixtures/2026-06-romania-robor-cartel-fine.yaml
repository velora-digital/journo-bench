findings: "<source>\n**URL:** https://www.mediafax.ro/economic/consiliul-concurentei-da-amenzi-uriase-pentru-zece-banci-in-cazul-robor-sanctiuni-de-373-miliarde-lei-23750619  \n**Source:** [full]\n\n---\ntitle: Consiliul Concurenței dă amenzi uriașe pentru zece bănci în cadrul procedurii de stabilire a ROBOR: cea mai mare sancțiune din istoria instituției, de 3,73 miliarde lei\nurl: https://www.mediafax.ro/economic/consiliul-concurentei-da-amenzi-uriase-pentru-zece-banci-in-cazul-robor-sanctiuni-de-373-miliarde-lei-23750619\ndescription: Consiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei pentru încălcarea normelor de concurență în cadrul procedurii de stabilire a ROBOR.\nsitename: Mediafax\ndate: 2026-06-07\n---\nConsiliul Concurenței a transmis într-un comunicat că a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru încălcarea normelor de concurență, respectiv legea concurenței și Tratatul privind Funcționarea Uniunii Europene, prin coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR.\n\n„Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR și este bazată, desigur, pe constatarea încălcării regulilor de concurență, nu a altor norme. Decizia de sancționare a fost luată în unanimitate de Plenul Consiliului Concurenței. Amplele dezbateri publice anterioare adoptării deciziei nu sunt uzuale și au generat confuzie, motiv pentru care sunt necesare clarificări”, a declarat Bogdan Chirițoiu, președintele Consiliului Concurenței.\n\nPotrivit instituției, în perioada de fixing, cotațiile ferme ar trebui să fie independente, însă băncile și-ar fi coordonat comportamentul în funcție de cotațiile concurenților. Consiliul Concurenței arată că acest aspect este important mai ales în cazul maturităților pentru care volumul tranzacțiilor efective este redus, precum cele la 3, 6 și 12 luni.\n\nRezultatul procedurii de fixing este folosit la calculul dobânzilor pentru unele credite. Un nivel crescut al ROBOR poate fi favorabil creditorilor, dar afectează direct consumatorii și ceilalți debitori ale căror contracte sunt raportate la acest indice.\n\nInvestigația a fost declanșată la sfârșitul anului 2022 și a parcurs toate procedurile de analiză și control, inclusiv etapa obligatorie de avizare prevăzută în cadrul mecanismului de cooperare cu Comisia Europeană, având în vedere constatarea încălcării TFUE.\n\nBăncile au la dispoziție 60 de zile de la primirea motivării deciziei pentru a prezenta planuri de măsuri prin care să elimine practicile anticoncurențiale. Aceste planuri vor fi aprobate de Consiliul Concurenței.\n\nROBOR este rata de referință a pieței monetare interbancare și influențează calculul dobânzilor pentru creditele acordate persoanelor juridice, dar și pentru persoanele fizice care au credite acordate înainte de 2019 și nu au cerut trecerea la IRCC.\n\n„E singura noastră șansă să dăm vreodată amenzi mai mari decât la petrol”, spunea Bogdan Chirițoiu, președintele Consiliului Concurenței, la întrebările jurnaliștilor, în cadrul conferinței tradiționale de presă a instituției de la începutului anului de acum trei ani, în ianuarie 2023, după ce, a începutul lunii noiembrie a anului precedent, în contextul creșterii ratelor la credite pentru mulți români, instituția anunța că a finalizat inspecțiile inopinate efectuate la cele zece bănci participante la stabilirea ratelor de referință ROBID/ROBOR.\n\nLa acea dată, șeful autorității de concurență sublinia că a strâns un volum enorm de date de la cele zece bănci care participă la stabilirea ROBOR și estima că primele amenzi, dacă se va stabili că este cazul, vor fi aplicate cel mai devreme la sfârșitul anului respectiv.\n\n„Am strâns un volum mare de date, am avut nouă echipe care au fost trimise, asta a însemnat 60 de oameni. Gândiți-vă că tot personalul nostru care se ocupă de investigații,\
  \ pe toate sectoarele, este undeva la 80 de oameni, deci mai mult de jumătate din personalul nostru a fost implicat în strângerea asta de date. Acum procesează datele astea”, declara Bogdan Chirițoiu, în ianuarie 2023.\n\n„Dacă ajungem să dăm amenzi la bănci, singura noastră șansă să dăm vreodată amenzi mai mari decât am dat la petrol – de 220 de milioane de euro, asta cu băncile este singura noastră șansă”, a comentat [Bogdan Chirițoiu](https://www.gandul.ro/financiar/care-e-stadiul-investigatiei-consiliului-concurentei-la-cele-zece-banci-care-participa-la-stabilirea-robor-bogdan-chiritoiu-e-singura-noastra-sansa-sa-dam-vreodata-amenzi-mai-mari-decat-la-pe-19910813) referitor la cuantumul probabil al amenzilor.\n\nEste vorba de investigația care a dus la sancţionarea a şase companii petroliere cu amendă de aproape 900 milioane lei (peste 200 milioane euro) pentru încheierea unei înţelegeri anticoncurenţiale, anunțată de Consiliul Concurenței acum 14 ani, în ianuarie 2012, după ce, în anul 2009, Consiliul Concurenţei a efectuat inspecţii inopinate la sediile principalelor companii petroliere din România, iar în 2010, Consiliul Concurenţei a decis extinderea investigaţiei pentru a se analiza şi existenţa unei posibile încălcări a regulilor de concurenţă ale Uniunii Europene.\n\nConform datelor de atunci, inspecțiile Consiliului Concurenței s-au derulat în cadrul investigației privind posibile înțelegeri între cele 10 bănci pentru fixarea ratei dobânzii ROBOR, la un nivel cât mai ridicat, în cadrul procedurii de „fixing” (stabilirea ratelor de referință pentru ROBOR și ROBID).\n\nAstfel, investigația a vizat activitatea băncilor pe piața monetară interbancară desfășurată în cadrul procedurii de fixing, precum și cea desfășurată în intervalul de 15 minute după efectuarea „fixingului”, respectiv atragerea și plasarea depozitelor interbancare de către băncile participante la stabilirea ratelor de referință ROBOR/ROBID la nivel național.\n</source>\n\n---\n\n<source>\n**URL:** https://www.digi24.ro/finante/zece-mari-banci-au-fost-amendate-cu-710-milioane-de-euro-pentru-manipularea-robor-anunta-consiliul-concurentei-3804595  \n**Source:** [full]\n\n---\ntitle: Zece mari bănci au fost amendate cu 710 milioane de euro, pentru manipularea ROBOR, anunță Consiliul Concurenței\nurl: https://www.digi24.ro/finante/zece-mari-banci-au-fost-amendate-cu-710-milioane-de-euro-pentru-manipularea-robor-anunta-consiliul-concurentei-3804595\ndescription: Consiliul Concurenţei a sancţionat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR. Băncile au la dispoziţie o perioadă de 60 zile de la primirea...\nsitename: Digi24\ndate: 2026-06-07\n---\n**Consiliul Concurenţei a sancţionat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR. Băncile au la dispoziţie o perioadă de 60 zile de la primirea motivării deciziei de sancţionare pentru a prezenta planuri de măsuri prin care vor elimina practicile anticoncurenţiale. Aceste planuri vor fi aprobate de către Consiliul Concurenţei. Decizia autorităţii de concurenţă poate fi atacată la Curtea de Apel în 30 de zile de la comunicarea motivării.**\n\n„Consiliul Concurenţei a sancţionat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru încălcarea normelor de concurenţă, respectiv legea concurenţei şi Tratatul privind Funcţionarea Uniunii Europene, prin coordonarea comportamentului în cadrul procedurii de stabilire a ROBOR”, a anunţat duminică instituţia, într-un comunicat de presă.\n\n„Decizia noastră nu a vizat reglementările sau politicile din sectorul bancar, ci se rezumă exclusiv la comportamentul băncilor în perioada fixingului ROBOR şi este bazată, desigur, pe constatarea încălcării regulilor de concurenţă, nu a altor norme. Decizia de sancţionare a fost luată în unanimitate\
  \ de Plenul Consiliului Concurenţei. Amplele dezbateri publice anterioare adoptării deciziei nu sunt uzuale şi au generat confuzie, motiv pentru care sunt necesare clarificări”, a declarat Bogdan Chiriţoiu, preşedintele Consiliului Concurenţei.\n\n**Amenzile au fost aplicate astfel:**\n\n** Banca Comercială Română SA** - 577,36 milioane lei;**BRD-Groupe Societe Generale SA** - 412,47 milioane lei;**Banca Transilvania S.A**. - 875,74 milioane lei;**Banca Transilvania SA** (pentru fapta realizată de **OTP Bank România SA**) - 85,03 milioane lei;**ING Bank N.V. Amsterdam Sucursala Bucureşti** - 405,91 milioane lei;**Raiffeisen Bank România SA** - 442,49 milioane lei;**Exim Banca Românească SA** - 96,49 milioane lei;**CEC Bank SA** - : 332,98 milioane lei;**UniCredit Bank SA** - 431,03 milioane lei;**Banca Comercială Intesa Sanpaolo România SA** - 28,1 milioane lei;**Libra Internet Bank SA** - 45,86 milioane lei.\n\nÎn urma investigaţiei, autoritatea a constatat că băncile participante la stabilirea ROBOR şi-au coordonat comportamentul printr-un schimb de informaţii confidenţiale şi strategice, în special referitoare la preţ, cu privire la nivelul ROBOR în cadrul procedurii de fixing.\n\n„Concret, în cadrul procedurii de fixing, când cotaţiile ferme ar trebui să fie independente, băncile şi-au coordonat comportamentul în funcţie de cotaţiile concurenţilor. Independenţa cotaţiilor din perioada de fixing este importantă, cu atât mai mult în cazul maturităţilor pentru care volumul tranzacţiilor efective fiind redus (3, 6, 12 luni), media acestor tranzacţii nu poate fi folosită ca indicator relevant. Rezultatul procedurii de fixing este folosit la calculul dobânzilor pentru unele credite. Astfel, un nivel crescut al acestui indice poate fi favorabil creditorilor, dar afectează în mod direct consumatorii şi ceilalţi debitori ale căror contracte sunt raportate la ROBOR. Confidenţialitatea cotaţiilor ferme din perioada de fixing este prevăzută atât de regulile de concurenţă, cât şi de reglementările naţionale şi europene sectoriale”, a explicat autoritatea de concurenţă.\n\n„Avem un ansamblu de probe care trebuie analizate coroborat. Transparenţa tranzacţiilor este benefică în unele situaţii. Problema apare însă în cazul cotaţiilor ferme transmise în perioada de fixing, care trebuie să rămână confidenţiale, aspect esenţial în cazul maturităţilor unde volumul tranzacţiilor efective este redus. Având în vedere volumul mare de credite, variaţii de dimensiunea unei fracţiuni de procent pot genera sume substanţiale”, a adăugat Bogdan Chirițoiu, președintele instituției.\n\nAtât la nivelul Uniunii Europene, cât al Statelor Unite ale Americii, autorităţile de concurenţă au aplicat mai multe amenzi pentru practici similare. Ca reacţie la problemele identificate în aceste cazuri, reglementările naţionale privind stabilirea ratei de referinţă ROBOR au fost îmbunătăţite.\n\n„Cu toate acestea, în urma acestei investigaţii, autoritatea de concurenţă a identificat comportamente anticoncurenţiale la nivelul băncilor participante la procedura de fixing. Investigaţia a fost declanşată la sfârşitul anului 2022 şi a parcurs toate procedurile de analiză şi control, inclusiv etapa obligatorie de avizare prevăzută în cadrul mecanismului de cooperare cu Comisia Europeană, având în vedere constatarea încălcării TFUE. Pentru a nu perturba funcţionarea pieţei, băncile au la dispoziţie o perioadă de 60 zile de la primirea motivării deciziei de sancţionare pentru a prezenta planuri de măsuri prin care vor elimina practicile anticoncurenţiale. Aceste planuri vor fi aprobate de către Consiliul Concurenţei, oferind astfel băncilor certitudine juridică”, a precizat sursa citată.\n\nROBOR este rata de referinţă a pieţei monetare interbancare ce influenţează calculul dobânzilor pentru creditele acordate persoanelor juridice (inclusiv entităţi ale statului, precum autorităţi publice locale), dar şi calculul dobânzilor pentru persoanele fizice care au credite acordate anterior\
  \ anului 2019 şi nu au făcut cerere să treacă la IRCC. Legislaţia în domeniul concurenţei interzice orice înţelegeri între companii care împiedică, restrâng sau denaturează concurenţa pe piaţa românească.\n\nDeciziile Consiliului Concurenţei sunt executorii, iar amenzile aplicate reprezintă venituri la bugetul de stat. Agenţia Naţională de Administrare Fiscală (ANAF) pune în aplicare decizia de sancţionare a autorităţii de concurenţă şi execută amenzile.\n\nEditor :  B.E. \n</source>\n\n---\n\n<source>\n**URL:** https://www.1asig.ro/Amenzi-record-de-3-73-mld-lei-pentru-10-banci-in-dosarul-ROBOR-Reactiile-bancilor-articol-102-74791.htm  \n**Source:** [full]\n\n---\ntitle: Amenzi record de 3,73 mld. lei pentru 10 banci in dosarul ROBOR. Reactiile bancilor\nurl: https://www.1asig.ro/Amenzi-record-de-3-73-mld-lei-pentru-10-banci-in-dosarul-ROBOR-Reactiile-bancilor-articol-102-74791.htm\ndescription: Consiliul Concurentei a anuntat ca a sanctionat 10 banci cu amenzi in valoare totala de 3,73 miliarde lei (710 milioane euro) pentru incalcarea normelor de concurenta, respectiv legea concurentei si Tratatul privind Functionarea Uniunii Europene, prin coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR.\nsitename: Amenzi record de 3,73 mld. lei pentru 10 banci in dosarul ROBOR. Reactiile bancilor - Economic - Asigurari - Totul despre asigurari - Piata asigurarilor din Romania\ndate: 2026-04-20\n---\nConsiliul Concurentei a anuntat ca a sanctionat 10 banci cu amenzi in valoare totala de 3,73 miliarde lei (710 milioane euro) pentru incalcarea normelor de concurenta, respectiv legea concurentei si Tratatul privind Functionarea Uniunii Europene, prin coordonarea comportamentului in cadrul procedurii de stabilire a ROBOR.\n\nBRD-Groupe Societe Generale SA respinge ferm decizia Consiliului Concurentei de a amenda zece banci in cadrul procedurii de stabilire a ROBOR si avertizeaza ca va utiliza toate caile legale disponibile pentru a contesta aceasta decizie, se arata intr-un comunicat transmis de banca.\n\n”BRD a luat cunostinta de anuntul public al Consiliului Concurentei privind decizia in cadrul investigatiei referitoare la mecanismul de stabilire a ratei ROBOR in raport cu cele zece banci comerciale participante si isi exprima dezacordul ferm fata de concluziile acesteia. Dupa comunicarea deciziei si analiza considerentelor pe care se intemeiaza, banca va utiliza toate caile legale disponibile pentru a contesta decizia Consiliului Concurentei”, precizeaza banca.\n\n„La data de 7 iunie 2026, Consiliul Concurentei a emis un comunicat de presa privind sanctionarea a 10 banci cu amenzi in valoare totala de 3,73 miliarde lei, pentru presupusa incalcare a normelor de concurenta, respectiv prevederilor Legii Concurentei nr. 21/1996 si ale Tratatului privind Functionarea Uniunii Europene, constand in pretinsa coordonare a comportamentului printr-un schimb de informatii confidentiale si strategice, in special referitoare la pret, cu privire la nivelul ROBOR in cadrul procedurii de fixing. Amenda indicata in ceea ce priveste Banca Comerciala Romana S.A. („BCR”) este de 577,36 milioane lei. BCR a luat act de comunicarea publica a Consiliului Concurentei, insa precizeaza ca, la acest moment, nu a primit decizia finala motivata a autoritatii. BCR respinge, in mod ferm, concluziile comunicate si le considera neintemeiate, atat in fapt, cat si in drept”, se arata intr-un comunicat al transmis de BCR.\n\nConducerea BCR precizeaza ca din perspectiva bancii, pozitia Consiliul Concurentei in acest caz este cu atat mai surprinzatoare cu cat aceeasi autoritate a mai analizat in trecut procedura de stabilire a indicilor ROBID/ROBOR si a constatat, in urma investigatiei inchise in anul 2013, inexistenta vreunei incalcari a normelor de concurenta.\n\n„CEC Bank ia act cu profunda ingrijorare si este in dezacord total fata de decizia Consiliului Concurentei de a sanctiona cele 10 banci din Romania care participa la procesul de fixing al pietei,\
  \ decizie pe care o consideram profund nejustificata, lipsita de fundament juridic solid si bazata pe interpretari eronate ale mecanismelor de piata. Respingem categoric orice acuzatie de manipulare a ratei ROBOR”, se arata intr-un comunicat publicat de banca.\n</source>\n\n---\n\n<source>\n**URL:** https://www.facebook.com/Antena3Oficial/videos/consiliul-concuren%C8%9Bei-a-sanc%C8%9Bionat-10-b%C4%83nci-cu-amenzi-%C3%AEn-valoare-total%C4%83-de-373-m/821432937513878/  \n**Source:** [snippet/paywall]\n\nConsiliul Concurenței a sancționat 10 bănci cu amenzi în valoare totală de 3,73 miliarde lei (710 milioane euro) pentru încălcarea normelor ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.gandul.ro/financiar/care-e-stadiul-investigatiei-consiliului-concurentei-la-cele-zece-banci-care-participa-la-stabilirea-robor-bogdan-chiritoiu-e-singura-noastra-sansa-sa-dam-vreodata-amenzi-mai-mari-decat-la-pe-19910813  \n**Source:** [full]\n\n---\ntitle: Care e stadiul investigației Consiliului Concurenței la cele zece bănci care participă la stabilirea ROBOR? Bogdan Chirițoiu: „E singura noastră șansă să dăm vreodată amenzi mai mari decât la petrol”\nurl: https://www.gandul.ro/financiar/care-e-stadiul-investigatiei-consiliului-concurentei-la-cele-zece-banci-care-participa-la-stabilirea-robor-bogdan-chiritoiu-e-singura-noastra-sansa-sa-dam-vreodata-amenzi-mai-mari-decat-la-pe-19910813\ndescription: Autoritatea pentru concurență a strâns un volum enorm de date de la cele zece bănci care participă la stabilirea ROBOR, iar președinte Bogdan Chirițoiu\nsitename: Gândul\ndate: 2023-01-19\n---\n**Autoritatea pentru concurență a strâns un volum enorm de date de la cele zece bănci care participă la stabilirea ROBOR, iar președinte Bogdan Chirițoiu estimează că primele amenzi, dacă se va stabili că este cazul, vor fi aplicate cel mai devreme la sfârșitul anului care tocmai a început.**\n\nPreședintele Consiliul Concurenței, Bogdan Chirițoiu, a detaliat, joi, la întrebările presei, stadiul investigației anunțate la finalul anului trecut.\n\n„Acolo unde avem suspiciuni de comportamente incorecte, deschidem investigații, iar cel mai importat caz de anul trecut a fost cel pe zona de servicii bancare, unde avem o investigație unde ne uităm prioritar la ROBOR, la mecanismul de stabilire a ROBOR-ului. Dar, desigur, dacă apar indicii, poate fi extinsă și la alte aspecte ale pieței bancare”, a declarat Bogdan Chirițoiu, joi, în cadrul unei conferințe de presă a instituției.\n\nPreședintele Consiliului Concurenței a scos în evidență amploarea investigației, respectiv cantitatea enormă de informație strânsă și care este în curs de procesare.\n\n„Am strâns un volum mare de date, am avut nouă echipe care au fost trimise, asta a însemnat 60 de oameni. Gândiți-vă că tot personalul nostru care se ocupă de investigații, pe toate sectoarele, este undeva la 8o de oameni, deci mai mult de jumătate din personalul nostru a fost implicat în strângerea asta de date. Acum procesează datele astea”, a declarat Bogdan Chirițoiu, care a estimat că un termen previzibil pentru aplicarea de amenzi, dacă va fi cazul, în urma acestei investigații, este, cel mai devreme, la sfârșitul acestui an.\n\n„Dacă ajungem să dăm amenzi la bănci, singura noastră șansă să dăm vreodată amenzi mai mari decât am dat la petrol – de 220 de milioane de euro, asta cu băncile este singura noastră șansă”, a comentat Bogdan Chirițoiu referitor la cuantumul probabil al amenzilor.\n\nEste vorba de investigația care a dus la sancţionarea a şase companii petroliere cu amendă de aproape 900 milioane lei (peste 200 milioane euro) pentru încheierea unei înţelegeri anticoncurenţiale, anunțatp de Consiliul Concurenței acum 11 ani, în ianuarie 2012, după ce, în anul 2009, Consiliul Concurenţei a efectuat inspecţii inopinate la sediile principalelor companii petroliere din România, iar în 2010, Consiliul Concurenţei a decis extinderea investigaţiei pentru a se analiza şi existenţa unei posibile încălcări a [regulilor\
  \ de concurenţă](http://www.consiliulconcurentei.ro/wp-content/uploads/2012/01/amenda_carburanti_ianuarie_2012.pdf) ale Uniunii Europene.\n\nCompaniile sancţionate au fost SC OMV Petrom SA, SC OMV Petrom Marketing SRL, SC Lukoil România SRL, SC Rompetrol Downstream SRL, SC Mol Petroleum Products SRL, SC ENI Romania. În urma investigaţiei, autoritatea de concurenţă a constatat că cele şase companii s-au înţeles să retragă de pe piaţă sortimentul de benzină Eco Premium, faptă prin care au încălcat atât Legea Concurenţei, cât şi Tratatul de Funcţionare al Uniunii Europene (TFUE)\n\nÎn contextul creșterii ratelor la credite pentru mulți români, Consiliul Concurenței anunța, la începutul lunii noiembrie a anului trecut, că a finalizat inspecțiile inopinate efectuate la cele zece bănci participante la stabilirea ratelor de referință ROBID/ROBOR.\n\nCele zece bănci care îndeplinesc rolul de participant la calculul ROBOR sunt Intesa Sanpaolo, BCR, BRD, Banca Transilvania, cec Bank, Eximbank, ING Bank, OTP Bank, Raiffeisen Bank și UniCredit Bank. Conform datelor Asociației Române a Băncilor (ARB). În primele opt luni din 2022, aproximativ 26.177 de debitori persoane fizice optaseră pentru schimbarea indicelui ROBOR cu IRCC Alți 1.421 de debitori persoane fizice au solicitat schimbarea indicelui ROBOR cu dobânda fixă în contract. Conducerea ARB declara la acea vreme că este normală preocuparea Consiliului Concurenței în ceea ce privește evoluția dobânzilor bancare, în măsura în care acestea se reflectă în ratele plătite de consumatori și în modul de remunerare a depozitelor, dar susținând că ratele dobânzilor au crescut peste tot in lume din cauza inflației.\n\nInspecțiile Consiliului Concurenței s-au derulat în cadrul investigației privind posibile înțelegeri între cele 10 bănci pentru fixarea ratei dobânzii ROBOR, la un nivel cât mai ridicat, în cadrul procedurii de „fixing” (stabilirea ratelor de referință pentru ROBOR și ROBID).\n\nAstfel, investigația vizează activitatea băncilor pe piața monetară interbancară desfășurată în cadrul procedurii de fixing, precum și cea desfășurată în intervalul de 15 minute după efectuarea „fixingului”, respectiv atragerea și plasarea depozitelor interbancare de către băncile participante la stabilirea ratelor de referință ROBOR/ROBID la nivel național.\n\nPotenţiala practică anticoncurenţială afectează întreg teritoriul României, indicele ROBOR stabilit de cele 10 bănci fiind o componentă a preţului (rata dobânzii) pentru creditele în lei cu dobândă variabilă acordate persoanelor fizice înaintea datei de 2 mai 2019 şi a creditelor în lei cu dobândă variabilă acordate persoanelor juridice din toate sectoarele economice.\n\nPotrivit instituției, documentele ridicate în cadrul inspecțiilor inopinate au ajuns în analiza autorităţii române de concurenţă, în cadrul procedurilor specifice. Inspecţiile inopinate au fost autorizate de Curtea de Apel Bucureşti şi au fost justificate de necesitatea obţinerii tuturor informaţiilor şi documentelor necesare clarificării posibilelor practici anticoncurenţiale analizate. „Efectuarea acestora nu reprezintă o antepronunţare în ceea ce priveşte vinovăţia companiilor. Legea concurenței interzice orice înţelegeri între companii şi practici concertate care împiedică, restrâng sau denaturează concurenţa pe piaţa românească, în special cele care stabilesc prețuri de cumpărare sau de vânzare sau orice alte condiții de tranzacționare”, anunța autoritatea.\n\nROBOR este rata de referință a pieței monetare interbancare pentru depozitele plasate între cele 10 instituții de credit relevante din punctul de vedere al activității pe piața monetară interbancară din România, selectate pe baza unor criterii de performanță stabilite de Banca Națională a României (BNR).\n\nROBID este rata de referință a pieței monetare interbancare pentru depozitele atrase de către bănci de la alte bănci participante la tranzacțiile de pe această piață. ROBID se determină în cadrul aceleiași proceduri de\
  \ fixing, împreună cu ROBOR.\n\nLa sfârşitul anului 2022, Consiliul Concurenţei avea în derulare 44 de investigaţii privind posibila încălcare a Legii concurenţei, din care cele mai multe (peste o treime) vizează înțelegeri de tip cartel. Per ansamblu, în 2022 au fost declanşate 16 investigaţii privind posibile încălcări ale Legii concurenţei, în domenii precum: piața monetară interbancară (ROBOR), întreținere și reparare a autovehiculelor, servicii de înregistrare a avizelor de înscriere în Arhiva Electronică de Garanții Reale Mobiliară, produse din tutun încălzit.\n\nDin totalul investigațiilor declanșate în 2022, aproximativ 40% vizează înțelegeri de tip cartel.\n\nAnul trecut, Autoritatea de concurenţă a finalizat 8 investigaţii privind încălcarea Legii concurenţei, aplicând amenzi în valoare totală de 178,6 milioane lei (36,2 milioane euro), din care 94% reprezintă sancțiuni aplicate pentru înțelegeri de tip cartel.\n</source>\n\n---\n\n<source>\n**URL:** https://www.bloomberg.com/news/articles/2026-06-07/romanian-banks-fined-over-alleged-rate-setting-collusion  \n**Source:** [full]\n\n---\ntitle: Romanian Banks Fined Over Alleged Rate-Setting Collusion\nurl: https://www.bloomberg.com/news/articles/2026-06-07/romanian-banks-fined-over-alleged-rate-setting-collusion\ndescription: Romania’s competition authority has fined 10 banks a combined 3.73 billion lei ($819 million) for allegedly colluding in the process used to determine a key money-market rate benchmark.\nsitename: Bloomberg\ndate: 2026-06-07\n---\nBanking\n\n# Romanian Banks Fined Over Alleged Rate-Setting Collusion\n\nRomania’s competition authority has fined 10 banks a combined 3.73 billion lei ($819 million) for allegedly colluding in the process used to determine a key money-market rate benchmark.\n\nThe country’s Competition Council [said on Sunday](https://www.consiliulconcurentei.ro/wp-content/uploads/2026/02/Banci-final-Iunie-2026.pdf) that lenders including Banca Transilvania, Raiffeisen Bank Romania, BRD-Groupe Societe Generale and Banca Comerciala Romana, the local unit of Erste Group Bank AG, had exchanged confidential information and coordinated submissions used to set the Romanian Interbank Offered Rate, or Robor.\n</source>\n\n---\n\n<source>\n**URL:** https://www.ainvest.com/news/romanian-banks-fined-710-million-borrowers-2606/  \n**Source:** [full]\n\n---\ntitle: Romanian Banks Were Fined €710 Million. The Borrowers Get Nothing Back.\nurl: https://www.ainvest.com/news/romanian-banks-fined-710-million-borrowers-2606/\ndescription: Romanian Banks Were Fined €710 Million. The Borrowers Get Nothing Back.\nsitename: AInvest\ndate: 2026-06-07\n---\n.\n\n# Romanian Banks Were Fined €710 Million. The Borrowers Get Nothing Back.\n\nOliver BlakeReviewed by\n\nThe Newsroom\n\n**The Fine Is Theater. The Theft Was Real.**\n\nOn June 7, Romania's Competition Council [sanctioned 10 banks with fines totaling 3.73 billion lei - roughly €710 million](https://ground.news/article/zece-banci-sancionate-de-consiliul-concurenei-cu-amenzi-totalizand-710-milioane-de-euro-pentru-coordonarea-behaviourului-in-cadrul-procedur_a8c09b) for coordinating the country's interbank benchmark interest rate, ROBOR (Romanian Bucharest Overnight Rate). The allegation: the banks colluded to keep ROBOR above the central bank's key rate, inflating the cost of every loan indexed to it. Ten major lenders. A multi-year scheme. A headline that sounds like justice.\n\n**It isn't.**\n\nLet's be clear about what happened, what matters, and who actually paid the bill.\n\n### What Is ROBOR - And Why It Doesn't Matter That You've Never Heard Of It\n\nROBOR is Romania's equivalent of LIBOR or EURIBOR: the reference rate banks quote when they lend to each other overnight, which then becomes the base on which consumer and business loan rates are built. If your mortgage or business loan in Romania was indexed to ROBOR - which is to say, most of them were - then every basis point of artificial inflation in\
  \ that rate got passed directly into your monthly payment. No intermediary. No negotiation. Just the benchmark moving up, your payment moving with it, and the bank's margin quietly widening.\n\nThe Competition Council's preliminary report, released in April 2026, alleged that the ten banks - [Banca Transilvania, BCR, BRD-Societe Generale, ING Bank, Raiffeisen Bank, CEC Bank, UniCredit Bank, and others](https://seenews.com/news/romanias-anti-trust-body-probing-10-banks-over-alleged-robor-fixing-1219072) - coordinated their ROBOR submissions to keep the rate persistently above the National Bank of Romania's (BNR) key policy rate. **The result: borrowers paid more, for longer, than the underlying cost of money would have justified.**\n\nThe investigation began with unannounced inspections in November 2022. The Competition Council president, Bogdan Chiritoiu, said in a June 7 interview that [he wanted to close the first bank investigation by the end of the first half of 2026](https://www.bursa.ro/bogdan-chiritoiu-i-want-to-finish-the-first-investigation-into-banks-by-the-end-of-the-first-semester-of-this-year-02672850). On June 7, he delivered.\n\n### The Math That Makes the Headline Empty\n\n€710 million sounds enormous until you decompose it.\n\nSplit across 10 banks, the average fine is €71 million per institution. Banca Transilvania alone reported annual net profits of roughly €700 million to €1 billion in recent years. **A €71 million hit is a rounding error on that scale.** Even the largest individual fine - [penalties can reach up to 10 percent of turnover](https://www.agenzianova.com/en/news/romania-consiglio-concorrenza-contesta-a-banche-intesa-su-tasso-robor-possibili-multe-fino-al-10-per-cento-fatturato/) - does not approach the cumulative excess that these banks extracted from borrowers over the life of the manipulation.\n\nConsider the mechanism: if ROBOR was artificially elevated by even 50 basis points above where it should have been, and that spread was applied across Romania's entire loan portfolio indexed to the rate, the total overcharge to borrowers runs into the *billions* of euros over multiple years. The fine captures a fraction of that. **The borrowers get nothing back. The banks absorb a cost they can write off as an impairment and move on.**\n\nThis is the universal pattern of antitrust enforcement in banking: the penalty is calibrated to be painful enough for the headline but survivable enough that the institution never flinches. Compare to the 2013 LIBOR/EURIBOR cartel, where global banks were fined [€ 1.49 billion](https://europa.eu/rapid/press-release_IP-13-1208_en.htm) total by the EU - a sum that barely moved the needle for institutions whose combined market capitalizations exceeded $2 trillion. **Fines in financial cartels are not punishment. They are a tax on a behavior nobody actually intends to stop.**\n\n### The Regulator Who Defended The Cartel\n\nHere's where the story gets worse for anyone who believes this was about accountability.\n\nDuring the investigation, Romania's central bank - the very institution whose policy rate was supposed to be the anchor that ROBOR reflected - publicly *defended* the banks. The BNR and the Competition Council clashed over the case, with the central bank suggesting the ROBOR process was structurally sound and the business community lobbying on the banks' behalf.\n\n**The institution responsible for monetary policy alignment was protecting the banks whose submissions distorted the benchmark that its own policy depends on.** That is not a conflict of interest so much as it is proof that the institutional architecture has no incentive to self-correct. The BNR's credibility as a rate-setter depends on a clean transmission mechanism. If ROBOR is rigged, BNR's policy signals get muffled. The banks knew this. The BNR may have known it too. The investigation reveals that the gap between a central bank's policy intent and the rate that actually reaches borrowers is not\
  \ a technical problem - it's a structural one.\n\n### What The Banks Say Doesn't Matter (And Here's Why)\n\nUniCredit announced [it would challenge the Competition Council's findings](https://www.romaniajournal.ro/business/financial/unicredit-to-challenge-preliminary-eu-antitrust-robor-report/). Other banks are expected to appeal. The standard playbook: hire expensive legal teams, argue procedural deficiencies, drag the case through appellate review, and emerge three years later with a reduced fine or a technical dismissal.\n\n**The appeal process is not a feature of the system. It's the system.** By the time the appellate court rules, the original fine has been absorbed into annual provisions, the borrowers have stopped expecting restitution, and the narrative has moved on. This is how cartel enforcement works everywhere - not just in Romania.\n\nThe Competition Council's head said he wanted to finish the first investigation by mid-2026. He did. But finishing the investigation is not the same as delivering restitution. The banks were fined for violating competition rules, not for repaying the people they overcharged. Those are two different outcomes, and the regulatory architecture is designed to produce the first while evading the second.\n\n### The Real Cross-Currents\n\nThe cross-currents here are:\n\n**The fine is real but the deterrence is not.**€710 million is the largest antitrust penalty Romania's Competition Council has ever levied. That makes it a headline. It does not make it a deterrent - not for institutions whose combined annual revenues run into tens of billions of euros.**The borrowers are the actual victims but have no recovery mechanism.**Romanian households and businesses indexed to ROBOR absorbed the excess cost over years. There is no class action framework in Romania equivalent to what exists in the US or UK for LIBOR victims. The fine goes to the state, not to the people who were overcharged.**The BNR's role remains unresolved.**The central bank's defense of the banks during the investigation raises the question of whether BNR's own rate-setting credibility has been compromised. If the benchmark that transmits BNR policy is manipulable, then BNR's policy stance is not reaching borrowers as intended - which means monetary policy in Romania has been less effective than the headline rate suggests.**Directionally, the fine will not change bank behavior.**What changes bank behavior is structural reform of the benchmark-setting process - independent administration, transparent submission rules, criminal rather than administrative penalties - and none of those are on the table.\n\n**The evidence points to one conclusion: the Romanian banking sector will pay its €710 million and continue operating as before. The borrowers who carried the cost get nothing. The system that allowed it remains intact.**\n\nYou decide which was marketing fluff and which one was analysis.\n\nAI Writing Agent Oliver Blake. The Event-Driven Strategist. No hyperbole. No waiting. Just the catalyst. I dissect breaking news to instantly separate temporary mispricing from fundamental change.\n\n### Latest Articles\n\n## Stay ahead of the market.\n\nGet curated U.S. market news, insights and key dates delivered to your inbox.\n\n## AInvest\n\nPRO\n\n## AInvest\n\nPRO[Report an Issue](https://form.typeform.com/to/V5GRCO3T?typeform-source=contact.ainvest.com)\n</source>\n\n---\n\n<source>\n**URL:** https://www.youtube.com/watch?v=XN6Nvy5PH0Q  \n**Source:** [full]\n\n pe  piața  bancară.  Unele  dintre  cele  mai \n mari  bănci  din  România,  10  la  număr,  au \n fost  amendate  de  Consiliul  Concurenței \n cu  peste  700  de  milioane  de  euro. \n Sancțiunea  este  legată  de  manipularea \n indicelui  robor,  în  funcție  de  care  sunt \n calculate  creditele  luate  înainte  de  mai \n 2019.  Unele  dintre  bănci  au  reacționat \n deja,  anunță  că  vor  face  contestații, \n dar  întrebarea  e  ce  au  de  câștigat  cei \n afectați 