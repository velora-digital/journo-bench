any date subsequent to the date of this press release.\n\nWEALTHFRONT CORPORATIONKEY BUSINESS METRICS |\n</source>\n\n---\n\n<source>\n**URL:** https://www.youtube.com/watch?v=Ja5_DZbRcdI  \n**Source:** [full]\n\n Welcome  to  the  explainer.  Today  we've \n got  a  seriously  fascinating  comparison \n for  you.  We're  using  the  spring  2026 \n financial  results  as  this  kind  of \n perfect  lens  to  view  our  current \n macroeconomic  environment.  We're  looking \n at  two  entirely  different  companies \n reporting  their  first  quarter  results \n right  around  the  exact  same  time.  And \n honest  to  goodness,  what  they  reveal \n about  modern  business  is  nothing  short \n of  incredible.  Now,  I  know  what  you're \n thinking.  What  do  skateboards  and  wealth \n management  have  in  common?  It  sounds \n like  the  setup  to  a  pretty  terrible \n joke,  right?  On  the  surface,  absolutely \n nothing.  But  when  you  put  their  earnings \n reports  side  by  side,  they  provide  the \n ultimate  contrast  between  two  totally \n different  ways  of  doing  business  today. \n On  one  hand,  we've  got  a  legacy \n brick-and-mortar  retailer  selling  actual \n physical  goods.  On  the  other,  a  digital \n first  fintech  platform  managing  money \n entirely  in  the  cloud.  By  putting  them \n head-to-head,  we're  going  to  figure  out \n exactly  how  capital  is  flowing  in \n today's  economy.  So,  here's  our  road  map \n for  this  explainer.  First,  we'll  set  the \n stage  with  a  tale  of  two  earnings.  Then, \n we'll  evaluate  topline  revenue  and \n assets,  dive  into  what  I  call  the \n profitability  puzzle,  follow  the  actual \n cash  flow,  and  finally  wrap  it  all  up \n with  the  big  takeaways. \n All  right,  diving  right  into  section \n one,  a  tale  of  two  earnings.  Analyzing \n two  extreme  ends  of  the  business \n spectrum  is  honestly  often  the  absolute \n best\
  \  way  to  uncover  deeper  economic \n truths.  Think  about  the  sheer \n operational  difference  here.  It's  wild. \n You  have  Zooies  and  they're  fighting  the \n classic  retail  fight  with  714  physical \n stores  scattered  across  the  globe  from \n the  US  to  Europe  to  Australia.  That \n means  they're  physically  managing, \n shipping,  and  storing  over  $153  million \n in  physical  inventory.  Then  completely \n on  the  flip  side,  you  have  Wealthfront. \n They're  a  digital  native.  No \n storefronts,  no  physical  products,  just \n servers,  code,  and  a  staggering  96.6 \n billion  in  total  platform  assets.  We're \n literally  looking  at  a  battle  of  atoms \n versus  bytes.  So,  how  are  these  vastly \n different  models  actually  holding  up? \n That  brings  us  to  section  two,  topline \n and  total  assets.  Let's  look  at  their \n growth.  Pulling  straight  from \n Wealthfront's  fiscal  first  quarter \n results  summary,  the  momentum  in  the \n digital  space  is  just  perfectly \n illustrated  here,  their  total  revenue \n hit  $90.5  million.  That's  a  super  solid \n 7%  year-over-year  growth.  So,  despite  a \n dynamic  and,  let's  be  real,  sometimes \n pretty  difficult  macroeconomic \n environment,  their  topline  revenue  is \n just  steadily  marching  upward.  But \n here's  where  you  might  actually  be \n surprised.  The  physical  retailer  is  far \n from  dead.  Despite  all  the  economic \n headwinds  and  the  massive  shift  to \n digital  shopping  we  always  hear  about, \n Zooies  actually  saw  a  bump  in  their \n first  quarter  sales.  They  grew  from \n $184.3  million  in  the  quarter  ending  May \n 2025  to  193.3  million  for  the  quarter \n ending  May  2026.  So  at  a  quick  glance, \n hey,  both  companies  are  growing  their \n revenues.  But  wait,  when  we  talk  about \n scale,  the  digital  model  just  it \n operates  in  a  completely  different \n universe.  Wealthfront  saw  their  total \n platform  assets  surge  19%  year-over-year \n to  a  record-breaking  96.6  billion.  They \n pulled  in  554  million  in  net  deposits \n just  in  this  quarter  alone.  It  just  goes \n to  show  software  scales  in  a  way  that \n physical  stores  simply  cannot  match. \n Okay,  but  topline  growth  is  only  half \n the  story.  Moving  to  section  three,  the \n profitability  puzzle.  And  honestly,  this \n is  the  real  plot  twist  of  our  explainer. \n Because  despite  growing  revenues,  both \n companies  reported  some  rather \n concerning  numbers  when  it  came  to  net \n income,  but  for  completely  totally \n different  reasons.  You've  got  to  think \n of  this  like  a  giant  iceberg.  What  you \n see  above  the  water  is  this.  Zooies \n posted  a  net  loss  of  roughly  $13.3 \n million.  Like  real  operating  losses. \n Wealthfront,  on  the  other  hand,  stayed \n profitable,  but  then  net  income \n plummeted  51%  down  to  12.8  million.  If \n you  just  skim  the  headlines,  you'd \n probably  think  both  businesses  were \n seriously  struggling.  But  we  really  have \n to  look  below  the  surface  here.  Let's \n look  below  the  waterline  for  Zooies. \n Notice  this  massive  weight  holding  them \n down.  $148  million.  That  is  the  amount \n of  long-term  lease  liabilities  sitting \n right  there  on  their  balance  sheet. \n That's  the  heavy,  unavoidable  fixed  cost \n of  maintaining  714  physical  stores. \n Whether  skateboards  are  flying  off  the \n shelves  or  just  gathering  dust  in  the \n back,  rent  is  due.  This  heavy  physical \n anchor  is  exactly  what  weighs  down  their \n profitability.  Now,  let's  pivot  to \n Wealthfront.  Their  net  income  dropped \n 51%.  Right?  Yet,  their  CFO,  Alan \n Emberman,  is  out  there  publicly  stating, \n \"We  delivered  another  strong  quarter  of\
  \ \n adjusted  free  cash  flow  while  continuing \n to  invest,\"  wait  a  second,  how  on  earth \n can  you  have  a  51%  drop  in  net  income \n and  still  be  popping  champagne  over \n strong  cash  flow?  All  right,  let's \n translate  a  little  bit  of  corporate \n jargon.  Stock-based  compensation  or  SBC. \n This  is  a  non-cash  expense.  Basically \n paying  employees  with  equity. \n Wealthfront  SBC  jumped  massively  from \n 1.9  million  last  year  to  a  whopping  17.1 \n million  this  quarter.  Why  the  huge \n spike?  Because  following  their  IPO,  a \n bunch  of  employee  stock  awards  were \n triggered.  This  makes  their  standard \n accounting  net  income  look  significantly \n lower  on  paper.  But,  and  this  is \n absolutely  crucial,  it  doesn't  actually \n mean  cash  is  leaving  the  business.  It's \n an  accounting  reality,  absolutely  not  a \n business  failure.  Which  leads  us \n perfectly  into  section  four.  Follow  the \n cash  flow.  If  net  income  can  be \n distorted  by  non-cash  accounting  rules \n like  least  appreciation  or  stock \n compensation,  the  truest,  purest  measure \n of  a  business  is  the  actual  cash  it \n generates.  Putting  their  operating  cash \n flow  side  by  side  provides  honestly  the \n starkkest  contrast  between  physical  and \n digital  models  you  will  ever  see.  Zooies \n had  a  net  cash  drain.  They  used  $28.1 \n million  in  operating  activities  this \n quarter.  You  know,  buying  inventory, \n paying  payroll,  paying  all  those  leases. \n Meanwhile,  Wealthfront  generated  a \n positive  $22.7  million  in  net  cash  from \n operating  activities.  And  it  gets  even \n crazier  for  Wealthfront  when  they  adjust \n for  things  like  temporary  client  funding \n receivables.  Wealthfront's  adjusted  free \n cash  flow  for  the  quarter  was  a \n staggering  $42.7  million.  That  is  a  114% \n cash  flow  conversion  ratio.  They  are \n generating  massive  amounts  of  cash \n because  their  asset  light  digital \n platform  doesn't  require  them  to  buy \n warehouses  full  of  inventory  or  sign \n 10-year  commercial  leases  just  to  grow. \n All  right,  bringing  it  all  home  with \n section  five,  the  big  takeaways.  What  do \n these  two  earnings  reports  actually \n teach  us  about  modern  corporate  strategy \n in  2026? \n Takeaway  number  one  is  the  sheer \n undeniable  speed  of  digital  momentum. \n Just  look  at  what  Wealthfront  did  in  a \n single  quarter.  They  rolled  out  general \n availability  of  Wealthfront  home  lending \n in  Colorado  and  Texas.  They  launched  new \n automated  cash  category  goals.  And \n because  their  ecosystem  is  entirely \n software-based,  they  drove  asset \n weighted  cross  productduct  adoption  up \n to  62.5%. \n Once  the  code  is  written,  scaling  it  to \n another  million  users  or  into  a  whole \n new  state,  the  marginal  cost  is \n practically  zero.  Takeaway  number  two  is \n the  very  heavy  reality  of  physical \n retail.  Zooies  is  a  successful  brand. \n They're  still  growing  their  topline \n sales,  but  their  reality  involves \n meticulously  managing  $714  individual \n lease  agreements  across  multiple \n continents.  It  involves  purchasing, \n storing,  and  risking  obsolescence  on \n over  $153  million  of  physical  inventory. \n The  fixed  overhead  is  incredibly  high, \n which  is  exactly  why  even  a  slight  dip \n in  margins  instantly  drains  their  cash \n flow.  So,  I'm  going  to  leave  you  with  a \n question  to  really  chew  on.  Both  of \n these  companies  are  surviving  and  in \n their  own  ways  growing  in  a  very  dynamic \n 2026  economy,  but  their  financial \n machinery  just  couldn't  be  more \n different.  When  you  look  at  the  ease  of \n scaling  software  versus  the  heavy \n capital\
  \  inensive  lift  of  physical \n stores,  where  would  you  place  your  bets? \n Is  the  future  of  real  scale  built  in \n brick-andmortar,  or  is  it  floating  in \n the  cloud?  Thanks  so  much  for  joining  me \n for  this  explainer,  and  I'll  catch  you \n next  time.\n</source>\n\n---\n\n<source>\n**URL:** https://x.com/Finsee_main/status/2062629536596975716  \n**Source:** [snippet/paywall]\n\nRevenue declined sequentially by ~6%, and Cash Management revenue actually fell YoY despite higher overall platform assets. • Net Deposit ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5&RegistrationCode=SyndicatedArticleLink  \n**Source:** [full]\n\n---\ntitle: Forget SpaceX — These 5 Stocks Could Soar Next\nurl: https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5\ndescription: MarketBeat's analysts have just released their top five highest-rated stocks for June 2026. None of the usual suspects, including Apple and Nvidia, made the cut. Enter your email address to see which companies made the list.\nsitename: MarketBeat\ndate: 2019-01-01\n---\nMarketBeat's analysts have just released their top five highest-rated stocks for June 2026. None of the usual suspects, including Apple and Nvidia, made the cut. Enter your email address to see which companies made the list.\n\nThis is a report that normally sells for $29.97 on our website, but we're making it available for free today, Monday, June 8th. Download your complimentary copy today before it goes back behind the paywall.\n</source>\n\n---\n\n<source>\n**URL:** https://ir.wealthfront.com/static-files/f6946b1a-5a59-497c-a167-7bd0fefc50dc  \n**Source:** [full]\n\n---\nurl: https://ir.wealthfront.com/static-files/f6946b1a-5a59-497c-a167-7bd0fefc50dc\n---\nWealthfront Corporation\nMonthly Metrics Report for February 28, 2026\nFiscal Quarter\nQ1 2026\nQ1 2026\nQ1 2026\nQ2 2026\nQ2 2026\nQ2 2026\nQ3 2026\nQ3 2026\nQ3 2026\nQ4 2026\nQ4 2026\nQ4