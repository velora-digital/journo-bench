sults today. Total platform assets jumped 19% to $96.6 billion, while revenues rose 7% y/y to $90.5m.\nsitename: TradeInformer\ndate: 2026-06-05\n---\nAutomated investing platform Wealthfront Corporation (Nasdaq: WLTH) reported fiscal first quarter 2027 revenue of $90.5 million on Thursday, up 7% year over year, with Total Platform Assets hitting a record $96.6 billion.\n\nAssets grew faster than revenue because Investment Advisory Assets, at $51.7 billion, rose 39% year over year, while higher-fee Cash Management Assets, at $44.9 billion, grew just 3%, [Wealthfront said](https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/Wealthfront-Reports-Fiscal-First-Quarter-2027-Results.html).\n\nA cross-product adoption incentive launched in early March offered clients who direct deposit at least $1,000 per month and fund an investment account an extra 25 basis points on their Cash Account APY.\n\nWealthfront said the incentive lifted asset-weighted cross-product adoption to roughly 62.5% at quarter-end, up over one percentage point quarter over quarter, and produced its strongest quarter of new advisory account openings since the quarter ended January 31, 2025.\n\nThe company also completed its inaugural share repurchase program, buying back more than 3 million shares at an average price of $8.66 for over $27 million. Adjusted free cash flow of $42.7 million funded the buybacks.\n\nGAAP net income fell 51% to $12.8 million, driven largely by stock-based compensation expense rising to $17.1 million from $1.9 million after the recognition of dual-trigger awards following the IPO. Funded clients reached 1.46 million, up 15% year over year.\n\nWealthfront expanded its Home Lending product to Colorado and Texas during the quarter while onboarding a second takeout investor.\n</source>\n\n---\n\n<source>\n**URL:** https://x.com/Finsee_main/status/2062629536596975716  \n**Source:** [snippet/paywall]\n\nWealthfront delivered a strategically successful but financially decelerating\
  \ quarter. Total Platform Assets reached a record $96.6 billion, ...\n</source>\n\n---\n\n<source>\n**URL:** https://www.linkedin.com/posts/davidfortunato_wealthfront-reports-fiscal-first-quarter-activity-7468422491082776577-cv29  \n**Source:** [snippet/paywall]\n\nwe ended the first quarter with a record Total Platform Assets of $96.6 billion across 1.46M clients.\n</source>\n\n---\n\n<source>\n**URL:** https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5&RegistrationCode=SyndicatedArticleLink  \n**Source:** [full]\n\n---\ntitle: Forget SpaceX — These 5 Stocks Could Soar Next\nurl: https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5\ndescription: MarketBeat's analysts have just released their top five highest-rated stocks for June 2026. None of the usual suspects, including Apple and Nvidia, made the cut. Enter your email address to see which companies made the list.\nsitename: MarketBeat\ndate: 2019-01-01\n---\nMarketBeat's analysts have just released their top five highest-rated stocks for June 2026. None of the usual suspects, including Apple and Nvidia, made the cut. Enter your email address to see which companies made the list.\n\nThis is a report that normally sells for $29.97 on our website, but we're making it available for free today, Monday, June 8th. Download your complimentary copy today before it goes back behind the paywall.\n</source>\n\n---\n\n<source>\n**URL:** https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/Wealthfront-Reports-Fiscal-First-Quarter-2027-Results.html  \n**Source:** [full]\n\n---\ntitle: Wealthfront Reports Fiscal First Quarter 2027 Results\nurl: https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/Wealthfront-Reports-Fiscal-First-Quarter-2027-Results.html\ndescription: Revenue of $90.5 million up 7% year-over-yearTotal Platform Assets up 19% year-over-year to a record $96.6 billion PALO ALTO, Calif., June 04, 2026 ...\nsitename: GlobeNewswire\ndate: 2026-06-04\n---\n*Revenue of