nts. Neutral Sentiment: Revenue rose 7% to $90.5 million, with investment advisory revenue up 32% year over year, while adjusted EBITDA was $37.5 million and margin came in at 41% as the company continued investing in incentives and Home Lending. Positive Sentiment: The company said Home Lending is progressing as planned, with Colorado and Texas launches, a second takeout investor added, and rate-lock volume up roughly 25% month over month in May despite a higher-rate environment. AI Generated. May Contain Errors.Conference Call Audio Live Call not available Earnings Conference CallWealthfront Q1 202700:00 / 00:00Speed:1x1.25x1.5x2xTranscript SectionsPresentationParticipantsPresentationSkip to Participants Operator00:00:00Good day everyone, thank you for standing by. Welcome to Wealthfront's first quarter 2027 earnings conference call. At this time, all participants are in a listen only mode. After the presentation, there will be a question and answer session. To ask a question, you will need to press star one one on your telephone. You will hear a message advising your hand is raised. To withdraw the question, please press star one one again. Please be advised that today's conference is being recorded. It's my pleasure to hand the conference to the Vice President of Investor Relations, Matthew Moon. Please proceed. Matthew MoonVP of Investor Relations at Wealthfront00:00:40Good afternoon, everyone, and thank you for joining us today to discuss Wealthfront's fiscal first quarter 2027 financial results, which reflect the quarter ended April 30th, 2026. On the line are David Fortunato, our Chief Executive Officer and President, and Alan Imberman, our Chief Financial Officer and Treasurer. After prepared remarks, we will open the line for Q&A. During the course of today's call, we may make forward-looking statements as defined under applicable securities laws. Forward-looking statements are subject to risks and uncertainties, and the company can give no assurance that they\
  \ will be or prove to be correct. Matthew MoonVP of Investor Relations at Wealthfront00:01:14To better understand the risks and uncertainties that could cause actual results to differ, we refer you to the documents that Wealthfront files with the Securities and Exchange Commission, including our most recent Form 10-Q. Our discussion today will include certain non-GAAP financial measures. These non-GAAP financial measures should be considered in addition to, not as a substitute or in isolation from GAAP measures. Reconciliations of non-GAAP financial measures to comparable GAAP measures can be found in our press release accompanying this call, which is posted to our investor relations website at ir.wealthfront.com. With that, I'll turn the call over to David. David FortunatoCEO and President at Wealthfront00:01:50Good afternoon, everyone. In our fiscal first quarter 2027, we continued to deliver on our objective of becoming the leading tech-driven platform for digital natives seeking to turn their savings into wealth. We believe we make the best practices of personal finance accessible at low fees through automation, and intuitive and convenient through user-friendly design. At scale, this drives high margins, allowing us to share savings with clients, creating and engendering trust, driving asset retention and low-cost word-of-mouth growth, which once again drives high margins. David FortunatoCEO and President at Wealthfront00:02:27This flywheel enables us to reinvest in and enhance our core cash management and investment advisory product offerings, supports our organic build-out of Wealthfront Home Lending and future product innovations, and most importantly, helps our clients save more on every paycheck, earn higher returns on their savings, and borrow at lower rates. In other words, grow their wealth. We remain grounded in our belief that the best way to build deep, long-term client relationships is to continue to delight clients by offering them more value than they can find anywhere else and focusing on their long-term financial outcomes. David FortunatoCEO and President at Wealthfront00:03:05This informs our product development strategy and keeps us focused on our roadmap regardless of short-term market conditions. At quarter end, total platform assets grew 19% year-over-year to a record $96.6 billion, with investment advisory assets of $51.7 billion up 39% year-over-year, and cash management assets of $44.9 billion up 3% year-over-year. We ended the quarter at roughly 1.46 million funded clients, up 15% year-over-year, and roughly 1.9 million funded accounts, also up 15% year-over-year, reflecting 1.3 funded accounts per funded client. Total net deposits in the quarter were $554 million. David FortunatoCEO and President at Wealthfront00:03:56This includes $577 million in cash management net withdrawals in April, primarily due to tax seasonality. Recall, our clients are net cash taxpayers, highlighting the attractive financial profile of our average client. This monthly result was consistent with the expectation we set last quarter for cash management net withdrawals in April of this year to exceed the $538 million in net withdrawals realized in April of last year. David FortunatoCEO and President at Wealthfront00:04:26These are, of course, net figures and specific to activity realized directly on our platform. Looking more broadly, this March and April, a period we refer to as tax season, we estimate our clients made over $3 billion in combined tax payments from their Wealthfront cash accounts and from their linked external accounts, with the latter including amounts that were initially withdrawn from Wealthfront accounts prior to tax payment, in addition to payments from funds held in linked accounts. David FortunatoCEO and President at Wealthfront00:04:54Clients directly paid tax authorities over $500 million from their Wealthfront cash accounts during the year's tax season, up 40% year-over-year, indicating growing trust\
  \ in our liquidity offerings. This has likely been the result of significant investment into our platform over the years made to deliver positive tax time experiences to our clients. For example, clients increasingly utilized our leading low-cost Portfolio Line of Credit, or PLOC rates, in order to fund tax obligations, with tax dollar payments funded with PLOC balances up roughly two times year-over-year. David FortunatoCEO and President at Wealthfront00:05:33We also recently invested in dynamic withdrawal limits, increasing client-specific limits up to $1 million per account. These new client-specific limits enabled more of our clients to fully satisfy their tax obligations in a single tax payment out of their cash accounts, strengthening our position as an attractive primary operating account option for our clients. It might be counterintuitive, but we want our clients to pay their taxes from their cash accounts given our ability to drive delightful tax time experiences. Which we believe will lead to us receiving a disproportionate share of their future savings over time. David FortunatoCEO and President at Wealthfront00:06:12We've also experienced strong uptake in our cross-product adoption incentive launched in early March. Recall, this incentive provides clients who direct deposit at least $1,000 per month and also fund an investment account with an ongoing 25 basis point increase to their cash APY. This directly led to over 4,000 new account openings and helped drive asset-weighted cross-product adoption to roughly 63% as of May end, up one and a half percentage points versus the level realized immediately prior to launch at February end. David FortunatoCEO and President at Wealthfront00:06:45In the early days, we've also been encouraged by the fact that on average, new adopters of the incentive have consistently brought on a notably larger amount of net deposits in each month since launch than that of similar clients that have not adopted the incentive. We also continuously invest in our core products. In cash management, we launched Cash Category Goals and recurring cash to category transfers. Cash Category Goals allow clients to more easily track their progress towards personalized financial targets within specific cash sub-accounts. David FortunatoCEO and President at Wealthfront00:07:19Our new recurring cash to category transfer feature provides clients another option to better achieve those goals on an automated basis. On investment accounts, we shipped one-tap-to-invest in the Stock Investing Account to streamline the purchase and sale of individual stocks and ETFs as we continue to transition this account to a more traditional brokerage offering. Wealthfront Home Lending added a second takeout investor in the quarter and launched general availability in Colorado in early April and in Texas in early May. David FortunatoCEO and President at Wealthfront00:07:52As a reminder, we're running a similar playbook for home lending that we have successfully deployed in our cash and investing businesses. That is using technology to deliver a better digital experience and a better rate with transparent fees. While we are still in early days, the initial client feedback and data supports our conviction and our ability to deliver on these objectives. While anecdotal, I'd like to share a couple of specific client comments to bring the experience to life. One of our clients raved about the self-serve capability relative to his prior experiences. David FortunatoCEO and President at Wealthfront00:08:24That is the ability to independently explore the latest mortgage rates without having to call up a mortgage banker or broker every time he wanted to open the fridge, as he described it. Another client enjoyed the ability to track the progress of his application in real time in-app. The fact that our application process can be handled entirely through mobile completely end to end is a differentiator, and we've seen more than half of Wealthfront\
  \ Home Lending clients interacting with the flow via mobile. David FortunatoCEO and President at Wealthfront00:08:53This is all while continuing to deliver on our objective of providing clients home mortgage rates at least 50 basis points better than the national average on average in the states in which we operate today. As we noted last quarter, we are deliberately rolling this service out at a measured pace in order to maximize learnings to optimize long-term client outcomes. The fact that we've been able to increase rate lock volume by roughly 25% month-over-month in May amidst this build-out is a feat that I'm particularly proud of, especially in the face of rising mortgage rates. David FortunatoCEO and President at Wealthfront00:09:33Currently, we are focused on automating the decisioning process of client pre-qualifications, starting from the application intake process all the way through approval. We plan to share more details with you all in the coming quarters. Taking a step back, since the early days of Wealthfront, we have been saying that we can utilize technology to provide digital advisory solutions at a level similar to or better than traditional solutions provided by financial advisors. AI has, and will certainly continue to play a role in achieving this goal. David FortunatoCEO and President at Wealthfront00:10:05We're confident in our ability to continue to build solutions, including AI solutions, that automate and improve the personal financial experience for our clients, so long as they continue to build client trust. In order to determine which AI solutions best achieve our trust and wealth-building goals, we need to experiment and test these solutions with our clients. We are entering that phase now and will share more with you over time as we learn more. With that, I'd like to turn it over to Alan to go over the financials. Alan ImbermanCFO and Treasurer at Wealthfront00:10:36Thanks, David. Starting with the income statement. Revenue came in at $90.5 million, up 7% year-over-year. Cash management revenue was $63.4 million, down 1% year-over-year due to a lower annualized cash management fee rate of 58 basis points, down four basis points year-over-year, and within the expected 57-58 basis point range we had communicated last quarter. The lower fee rate was partially offset by higher average cash management balances measured as the simple average of beginning and end-of-quarter figures, up 5% year-over-year to $45.1 billion. Alan ImbermanCFO and Treasurer at Wealthfront00:11:24The year-over-year decline in the annualized cash management fee rate was driven primarily by the fee rate lost in converting APYs to an APR, given the lower Fed funds rate, as well as the new cross-product adoption incentive introduced in early March that impacted two months of the quarter. As David noted, we estimate that in the first few months in market, this incentive has notably increased net deposits brought to the platform from new adopters relative to similar non-adopters, reflecting early success in deepening relationships with adopted clients. Alan Imberm\n</source>\n\n---\n\n<source>\n**URL:** https://press.wealthfront.com/  \n**Source:** [full]\n\n---\ntitle: Wealthfront Newsroom\nurl: https://press.wealthfront.com/\nsitename: press.wealthfront.com\ndate: 2024-06-03\n---\n## Our press releases\n\n[Wealthfront Reports Fiscal First Quarter 2027 Results](https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/wealthfront-reports-fiscal-first-quarter-2027-results.html)\n\nWealthfront Corporation (Nasdaq: WLTH), a tech-driven financial platform helping digital natives turn their savings into wealth, announced financial results for its fiscal first quarter ended April 30, 2026.\n\n[Wealthfront Executives to Present at Upcoming Investor Conferences](https://www.globenewswire.com/news-release/2026/05/28/3303258/0/en/wealthfront-executives-to-present-at-upcoming-investor-conferences.html)\n\nWealthfront Corporation (Nasdaq:\
  \ WLTH) today announced that it will be presenting at the following investor conferences with live audio webcasts available at Wealthfront’s Investor Relations website: [ https://ir.wealthfront.com/news-events/events](https://www.globenewswire.com/Tracker?data=hdSoH-UanrYGTpSlo_4h76yFa3jhD_O3MtoyaIUMdd3pDSPT1oFFh9Wnkmoj0q8_IoeBpOuthJnBJE2xqqOKRJkXrfur79iQPhh-jcSv4rt5oPA4UEJVBNHv0BSvCpRNFm4b40u-5agDMyXszoynYvDsLW89F1yu_s5esycfdsU=).\n\n[Wealthfront to Announce Fiscal First Quarter 2027 Financial Results on June 4, 2026](https://www.globenewswire.com/news-release/2026/05/14/3295333/0/en/wealthfront-to-announce-fiscal-first-quarter-2027-financial-results-on-june-4-2026.html)\n\nWealthfront Corporation (Nasdaq: WLTH), a tech-driven financial platform helping digital natives turn their savings into wealth, today announced that it will release fiscal first quarter 2027 financial results after the U.S. financial markets close on Thursday, June 4, 2026.\n\n[View all]\n\n## Wealthfront in the news\n\n\nThe Stock Market Is Good, Bad and Ugly, Often in Quick Succession\n\nThe Stock Market Is Good, Bad and Ugly, Often in Quick Succession\n\n“When you try to beat the market, you will undoubtedly do worse,” he said in a phone interview. Mr. Malkiel is now the chief investment officer at Wealthfront, an automated investing firm, and he provided data on the best-performing days in the market over the last 50 years, along with another data maven, Alex Michalka, who leads Wealthfront’s research.\n\n\nThe Best Brokers For Saving On Capital Gains Taxes\n\nThe Best Brokers For Saving On Capital Gains Taxes\n\nWealthfront beats out Fidelity, Schwab and Vanguard when it comes to direct indexing and tax loss harvesting.\n\n\nThe Future Of Investing: Fintech 50 2025\n\nThe Future Of Investing: Fintech 50 2025\n\nWealthfront, which was founded in 2008, made the first Fintech 50 list in 2015. It’s been[ growing too fast](https://www.forbes.com/sites/jeffkauflin/2024/06/03/how-high-interest-rates-turbocharged-a-struggling-robo-advisor/) to ignore. With $80 billion in total assets, up from $55 billion a year ago, it has left every other new-age robo-advisor in the dust. Its revenue grew 46% last year and has soared 260% in a two-year span, from $80 million in 2022 to $289 million in 2024.\n</source>\n\n---\n\n<source>\n**URL:** https://www.tradingview.com/news/marketbeat:e0d4a990e094b:0-wealthfront-q1-earnings-call-highlights/  \n**Source:** [full]\n\n---\ntitle: Wealthfront Q1 Earnings Call Highlights\nurl: https://www.tradingview.com/news/marketbeat:e0d4a990e094b:0-wealthfront-q1-earnings-call-highlights/\ndescription: Wealthfront NASDAQ:WLTH reported higher year-over-year revenue and record platform assets in its fiscal first quarter, while management said the company continued to invest in product expansion, including home lending, cash management features and artificial intelligence-related capabilities.The co…\nsitename: TradingView\ndate: 2026-06-04\n---\n# Wealthfront Q1 Earnings Call Highlights\n\nWealthfront WLTH reported higher year-over-year revenue and record platform assets in its fiscal first quarter, while management said the company continued to invest in product expansion, including home lending, cash management features and artificial intelligence-related capabilities.\n\nThe company said fiscal first-quarter 2027 results reflected the quarter ended April 30, 2026. Total platform assets reached a record $96.6 billion at quarter-end, up 19% from a year earlier, according to Chief Executive Officer and President David Fortunato. Investment advisory assets rose 39% year-over-year to $51.7 billion, while cash management assets increased 3% to $44.9 billion.\n\nWealthfront ended the quarter with about 1.46 million funded clients, up 15% year-over-year, and roughly 1.9 million funded accounts, also up 15%. Fortunato said the company’s strategy remains focused on providing automated, low-fee personal finance tools to “digital natives” and using\
  \ scale to reinvest in its product offerings.\n\nRevenue Rises as Investment Advisory Growth Offsets Cash Management Pressure\n\nChief Financial Officer and Treasurer Alan Imberman said revenue for the quarter was $90.5 million, up 7% year-over-year. Cash management revenue declined 1% to $63.4 million, reflecting a lower annualized cash management fee rate of 58 basis points, down four basis points from the prior year. Imberman said the decline was driven primarily by the lower Fed funds rate and the company’s new cross-product adoption incentive, which affected two months of the quarter.\n\nInvestment advisory revenue rose 32% year-over-year to $26.2 million, driven by average investment advisory balances of $50.2 billion, up 34%. The annualized investment advisory fee rate was roughly flat at 21 basis points.\n\nGross profit was $80.5 million, up 6%, with gross margin of 89%, down about one percentage point. Imberman attributed the decline in part to startup expenses tied to Wealthfront Home Lending, higher money movement costs and increased data and other cost-of-revenue expenses.\n\nTotal GAAP expenses rose 46% year-over-year to $75.9 million. Adjusted operating expenses, excluding share-based compensation, increased 16% to $58 million, mainly due to higher product development expense, including personnel-related costs and cloud computing expense.\n\nAdjusted EBITDA was $37.5 million, down 1% year-over-year, with an adjusted EBITDA margin of 41%, down three percentage points. Imberman said the margin performance was consistent with expectations, including continued investment in incentives and the rollout of Home Lending. GAAP net income was $12.8 million, and GAAP earnings per share were $0.07.\n\nTax Season Drives Cash Withdrawals, But Management Points to Client Trust\n\nTotal net deposits were $554 million in the quarter. Fortunato said the figure included $577 million in cash management net withdrawals in April, primarily due to tax seasonality. He said the outcome was in line with the company’s prior expectation that April cash management net withdrawals would exceed the $538 million recorded in April of the previous year.\n\nLooking more broadly at March and April, which Wealthfront refers to as tax season, Fortunato said the company estimates clients made more than $3 billion in combined tax payments from Wealthfront cash accounts and linked external accounts. Clients directly paid tax authorities more than $500 million from Wealthfront cash accounts during tax season, up 40% year-over-year.\n\nFortunato said the company views tax payments from cash accounts as a sign of growing trust in its liquidity offerings. He also pointed to increased use of Wealthfront’s Portfolio Line of Credit, saying tax payments funded with PLOC balances were up roughly two times year-over-year.\n\nThe company recently introduced dynamic withdrawal limits, increasing client-specific limits up to $1 million per account. Fortunato said the higher limits allowed more clients to satisfy tax obligations in a single payment from cash accounts.\n\nCross-Product Incentive Gains Early Traction\n\nManagement highlighted early results from a cross-product adoption incentive launched in early March. The program gives clients who direct deposit at least $1,000 per month and fund an investment account an ongoing 25-basis-point increase to their cash APY.\n\nFortunato said the incentive directly led to more than 4,000 new account openings and helped push asset-weighted cross-product adoption to about 63% as of the end of May, up roughly 1.5 percentage points from the level immediately before launch at the end of February.\n\nDuring the question-and-answer session, Fortunato said clients adopting the direct deposit incentive tend to bring “a few thousand dollars more” on an average net deposit basis. He also said recent cohorts that start with cash are adopting investment accounts at higher rates than before.\n\nIn response to an analyst question about\
  \ the economics of the incentive, Imberman said it was too early to provide specific payback periods, but noted that Wealthfront remains profitable on clients using the incentive because they bring cash management assets and investment advisory revenue.\n\nHome Lending Expansion Continues at a Measured Pace\n\nWealthfront Home Lending added a second takeout investor during the quarter and launched general availability in Colorado in early April and Texas in early May. Fortunato said the company is applying a similar strategy to home lending as it has in cash and investing: using technology to deliver a digital experience, better rates and transparent fees.\n\nFortunato said Wealthfront continues to aim to provide mortgage rates at least 50 basis points better than the national average on average in the states where it operates. He said rate lock volume increased roughly 25% month-over-month in May despite rising mortgage rates.\n\nManagement said the rollout remains deliberate as the company gathers data and improves automation. Fortunato said the company is focused on automating decisioning for client pre-qualifications, from application intake through approval. In Q&A, he noted that higher mortgage rates may require the company to expand more broadly to generate enough volume for product learnings, while also shifting demand toward purchase activity and away from refinancing.\n\nMay Metrics, Share Repurchases and AI Outlook\n\nWealthfront published May metrics showing total platform assets reached another month-end record of $99 billion. Total net deposits in May were $447 million, including $342 million in investment advisory and $140 million in cash management. Imberman said May also produced the strongest month in total cross-product flow from cash to investing since January 2026.\n\nThe company repurchased 3.1 million shares for roughly $27 million during the quarter under a $100 million share repurchase authorization, at an average price of $8.66 per share. Wealthfront ended the quarter with $428 million in cash and cash equivalents, excluding temporary client funding receivables.\n\nManagement also addressed artificial intelligence, with Fortunato saying AI has played and will continue to play a role in Wealthfront’s goal of automating and improving the personal finance experience. He said the company is entering a phase of experimenting and testing AI solutions with clients, while emphasizing that any new tools must support client trust.\n\n“It’s not very difficult to build tools using large language models that provide automated financial advice to clients,” Fortunato said during Q&A. “What is more difficult and more important from our perspective is to use those tools in a way that achieves the trust-building objectives that we have.”\n\nAbout Wealthfront WLTH\n\nWealthfront WLTH is a technology-driven wealth management firm that provides automated investment services to individual investors. Operating as a robo-advisor, the company uses algorithms and software to construct and manage diversified portfolios largely composed of low-cost exchange-traded funds (ETFs). Its platform is geared toward long-term, goal-based investing with an emphasis on passive strategies, automated rebalancing and straightforward user experience delivered through web and mobile applications.\n\nThe company’s product suite includes automated portfolio management, tax-loss harvesting and goal-planning tools that help clients set and track financial objectives.\n\n*This instant news alert was generated by narrative science technology and financial data from MarketBeat in order to provide readers with the fastest reporting and unbiased coverage. Please send any questions or comments about this story to contact@marketbeat.com.*\n\n[Where Should You Invest $1,000 Right Now?](https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5&RegistrationCode=SyndicatedArticleLink)\n\nBefore you make your next trade, you'll want to hear this.\n\nMarketBeat\
  \ keeps track of Wall Street's top-rated and best performing research analysts and the stocks they recommend to their clients on a daily basis.\n\nOur team has identified the [five stocks](https://www.marketbeat.com/newsletter/PDFoffer.aspx?offer=top5&RegistrationCode=SyndicatedArticleLink) that top analysts are quietly whispering to their clients to buy now before the broader market catches on... and none of the big name stocks were on the list.\n\nThey believe these five stocks are the five best companies for investors to buy now...\n</source>\n\n---\n\n<source>\n**URL:** https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/wealthfront-reports-fiscal-first-quarter-2027-results.html  \n**Source:** [full]\n\n---\ntitle: Wealthfront Reports Fiscal First Quarter 2027 Results\nurl: https://www.globenewswire.com/news-release/2026/06/04/3307089/0/en/Wealthfront-Reports-Fiscal-First-Quarter-2027-Results.html\ndescription: Revenue of $90.5 million up 7% year-over-yearTotal Platform Assets up 19% year-over-year to a record $96.6 billion PALO ALTO, Calif., June 04, 2026 ...\nsitename: GlobeNewswire\ndate: 2026-06-04\n---\n*Revenue of $90.5 million up 7% year-over-year**Total Platform Assets up 19% year-over-year to a record $96.6 billion*\n\nPALO ALTO, Calif., June 04, 2026 (GLOBE NEWSWIRE) -- Wealthfront Corporation (Nasdaq: WLTH), a tech-driven financial platform helping digital natives turn their savings into wealth, announced financial results for its fiscal first quarter ended April 30, 2026.\n\n**David**** Fortunato - CEO, President & Director: **“We shipped significant enhancements throughout the quarter, including expanded access to Wealthfront Home Lending and improvements to our Cash Management and Investment Advisory products. Our Cash Accounts supported a significantly larger dollar volume of direct client tax payments this past tax season, reflecting the growing trust our clients place in us to seamlessly handle their largest liquidity needs. We ended the quarter with record Total Platform Assets of $96.6 billion despite a dynamic macroeconomic environment and are confident our diverse product suite puts us in a strong position for the long-term.”\n\n**Fiscal First Quarter 2027 Results Summary**\n\nThree Months Ended April 30, | ||||||||||\n($ in thousands, except per share amounts) | 2026 | 2025 | % change | |||||||\nGAAP | ||||||||||\n| Total revenue | $ | 90,484 | $ | 84,514 | 7 | % | ||||\n| Net income - diluted | 12,823 | 25,947 | (51 | )% | ||||||\nNet income margin - diluted (%) | 14% | 31% | ||||||||\n| Diluted earnings per common share | $ | 0.07 | $ | 0.18 | (61 | )% | ||||\n| Net cash provided by operating activities | 22,683 | 38,481 | (41 | )% | ||||||\nOperating cash flow conversion (%) | 177% | 148% | ||||||||\nNon-GAAP1 | ||||||||||\n| Adjusted EBITDA | $ | 37,510 | $ | 37,904 | (1 | )% | ||||\nAdjusted EBITDA margin (%) | 41% | 45% | ||||||||\n| Adjusted free cash flow | 42,708 | 42,279 | 1 | % | ||||||\nAdjusted free cash flow conversion (%) | 114% | 112% | ||||||||\n1 Non-GAAP measure. Wealthfront’s reasons for use of the non-GAAP measure and a detailed reconciliation between the non-GAAP measure and the comparable GAAP amount are included at the end of this document in the section labeled ‘Non-GAAP Reconciliations’. | ||||||||||\n\n**F1Q27 Financial Highlights**\n\n**F1Q27 Business Highlights**\n\nWealthfront’s executive management team will host a live audio webcast beginning at 2:00 p.m. Pacific Time (5:00 p.m. Eastern Time) today to discuss the quarter’s financial results and business highlights. The live webcast as well as the earnings press release and earnings presentation can be found at https://ir.wealthfront.com. Following the call, a replay of the webcast will be available on the Wealthfront Investor Relations website.\n\n**About Wealthfront**\n\nInvestors: ir@wealthfront.com\n\nPress: press@wealthfront.com\n\nThis press release contains forward-looking statements that involve substantial\
