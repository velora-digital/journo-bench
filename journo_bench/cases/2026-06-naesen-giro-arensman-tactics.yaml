name: 2026-06-naesen-giro-arensman-tactics
seed: >-
  Decathlon's Oliver Naesen revealed his team deliberately raced the 2026 Giro
  d'Italia to break a rival GC contender rather than chase stage wins.

event_date: 2026-06-01

# IDL Pro Cycling's OWN interview (they spoke to Naesen in Rome on the final
# day) — the documentable written primary. Not a race report, not the team site.
primary_url:
  - https://www.idlprocycling.com/cycling/naesen-says-galls-giro-podium-was-built-on-unwritten-rules-smart-positioning-and-a-team-effort-against-arensman
  - https://www.indeleiderstrui.nl/wielrennen/naesen-legt-uit-waarom-vingegaard-arensman-en-ongeschreven-regels-cruciaal-waren-in-giro-succes-gall
# IDL is the English translation of indeleiderstrui.nl's own interview (same
# newsroom). Independent corroboration is thin; Wieler Revue credits In de Leiderstrui.
corroboration:
  - https://wielerrevue.nl/artikel/687615

key_facts:
  - "The team set the pace to hurt Thymen Arensman and INEOS rather than chase stage wins"
  - "The aim was to protect Felix Gall's GC position; Gall finished 2nd overall at the Giro"
  - 'Naesen quote: "We mainly looked in the rear-view mirror and thought: how can we hurt Arensman and INEOS the most?"'

# Scored for presence (+1) — the framing the interview hangs on.
secondary_facts:
  - "Naesen framed Gall's podium as built on unwritten rules, smart positioning and a team effort"

# Not scored for presence — incidental facts the story touches but isn't about;
# must not be contradicted. The team-name trap lives here: the story is the
# tactics, so an agent leaning on memory writes the old "Decathlon AG2R La Mondiale".
incidental_facts:
  - "Oliver Naesen and Felix Gall ride for Decathlon CMA CGM (the team dropped the AG2R La Mondiale name for 2026 - this would be an error)"
  - "Thymen Arensman rides for INEOS Grenadiers"

source: "IDL Pro Cycling"
notes: >-
  Carries the Decathlon CMA CGM team-name tripwire on a story where the team is
  incidental context, with a documentable written primary (IDL's own interview).
