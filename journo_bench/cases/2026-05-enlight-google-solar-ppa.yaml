key_facts:
  - "Enlight Renewable Energy signed a 15-year fixed-price physical power purchase agreement with Google to supply 200 MWac (250 MWdc) of solar power"
  - "The power comes from Enlight's Solstice solar project in LeFlore County, Oklahoma, selling into the Southwest Power Pool (SPP) market"

# Scored for presence (+1) — the firsts and the storage phase.
secondary_facts:
