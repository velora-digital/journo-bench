name: 2026-05-vdp-as-mtb-worlds-wish
seed: >-
  Mathieu van der Poel says his one wish for 2026 is gold at the Val di Sole
  mountain bike worlds, and confirms he will ride the Tour de France.

# Recency guard: the AS interview is dated 30 April 2026 (postdates training cutoffs).
event_date: 2026-04-30

# Check 1 — the specific primary is van der Poel's interview with the Spanish
