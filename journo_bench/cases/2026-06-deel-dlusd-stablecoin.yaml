name: 2026-06-deel-dlusd-stablecoin
seed: >-
  Deel launched its DLUSD stablecoin wallet, a USD-denominated balance for
  contractors built on Stripe's stack, starting with early access in Argentina.

# Recency guard: announced 3 June 2026 (postdates cutoffs).
event_date: 2026-06-03

# Deel's own product announcement, plus Stripe's newsroom as a co-primary: the
